<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국맥꾸룸 출근부 (실시간 조회 전용)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-print-color-adjust: exact;
            /* 크롬, 사파리, 엣지용 */
            print-color-adjust: exact;
            /* 표준 (파이어폭스 등 미래 호환용) */
        }

        /* 스크롤바 디자인 개선 */
        ::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: white;
            z-index: 20;
            box-shadow: 4px 0 10px -4px rgba(0, 0, 0, 0.1);
            border-right: 2px solid #e5e7eb !important;
            /* [수정] 구분선 강제 적용 */
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        table th,
        table td {
            white-space: nowrap;
        }

        /* 컴팩트 모드용 스타일 */
        .compact-cell {
            padding: 2px 0;
            width: 26px;
            min-width: 26px;
            max-width: 26px;
            font-size: 10px;
        }

        .compact-header {
            padding: 4px 0;
            font-size: 10px;
        }

        /* [증명서] Paper 스타일 */
        .paper {
            width: 210mm;
            min-height: 297mm;
            background: white !important;
            color: black !important;
            padding: 20mm;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* [증명서] 인쇄 스타일 */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            html,
            body {
                width: 210mm;
                min-height: 297mm;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }

            body>* {
                visibility: hidden !important;
                position: absolute !important;
                overflow: hidden !important;
            }

            .paper,
            .paper * {
                visibility: visible !important;
                opacity: 1 !important;
            }

            .paper {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 210mm !important;
                min-height: 297mm !important;
                padding: 20mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                z-index: 99999 !important;
                visibility: visible !important;
            }

            .no-print,
            .no-print * {
                display: none !important;
                visibility: hidden !important;
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        function CustomDialog() {
            const [dialogState, setDialogState] = React.useState({
                isOpen: false,
                type: 'alert', // 'alert', 'confirm', 'prompt'
                message: '',
                defaultValue: '',
                resolve: null
            });
            const [inputValue, setInputValue] = React.useState('');

            React.useEffect(() => {
                window.customAlert = (message) => {
                    return new Promise((resolve) => {
                        setDialogState({ isOpen: true, type: 'alert', message, resolve, defaultValue: '' });
                    });
                };
                window.customConfirm = (message) => {
                    return new Promise((resolve) => {
                        setDialogState({ isOpen: true, type: 'confirm', message, resolve, defaultValue: '' });
                    });
                };
                window.customPrompt = (message, defaultValue = '') => {
                    return new Promise((resolve) => {
                        setInputValue(defaultValue);
                        setDialogState({ isOpen: true, type: 'prompt', message, resolve, defaultValue });
                    });
                };
            }, []);

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && dialogState.isOpen) {
                        handleClose(null);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [dialogState.isOpen, dialogState.resolve]);

            const handleClose = (value) => {
                if (dialogState.resolve) {
                    dialogState.resolve(value);
                }
                setDialogState(prev => ({ ...prev, isOpen: false }));
            };

            const handleKeyDownInput = (e) => {
                if (e.key === 'Enter') {
                    handleClose(inputValue);
                }
            };

            if (!dialogState.isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => handleClose(null)}>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm p-6 animate-fade-in-up" onClick={e => e.stopPropagation()}>
                        <p className="text-gray-800 dark:text-gray-200 text-base mb-6 whitespace-pre-wrap">{dialogState.message}</p>
                        {dialogState.type === 'prompt' && (
                            <input
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyDown={handleKeyDownInput}
                                className="w-full border p-2 rounded mb-4 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                autoFocus
                            />
                        )}
                        <div className="flex justify-end gap-3">
                            {(dialogState.type === 'confirm' || dialogState.type === 'prompt') && (
                                <button
                                    onClick={() => handleClose(null)}
                                    className="px-4 py-2 bg-gray-200 text-gray-800 rounded font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600"
                                >
                                    취소
                                </button>
                            )}
                            <button
                                onClick={() => handleClose(dialogState.type === 'prompt' ? inputValue : true)}
                                className="px-4 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700"
                                autoFocus={dialogState.type !== 'prompt'}
                            >
                                확인
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // =================================================================================
        // [0] 공통 헬퍼 함수 및 아이콘 (최상단 정의 필수)
        // =================================================================================

        // 1. 소수점 스마트 처리 (보고서용 필수)
        const formatSmart = (num) => {
            if (!num) return 0;
            const pNum = parseFloat(num);
            return Number.isInteger(pNum) ? pNum : parseFloat(pNum.toFixed(4));
        };


        // =================================================================================
        // [신규] 증명서 관련 컴포넌트 (index1.html에서 이식)
        // =================================================================================

        /* 화면 폭에 맞춰 내용물 자동 축소 (모바일 A4 미리보기용) */
        const FitScreenWrapper = ({ children }) => {
            const containerRef = useRef(null);
            const [scale, setScale] = useState(1);
            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const containerWidth = containerRef.current.clientWidth;
                        const contentWidth = 794;
                        if (containerWidth > 0 && containerWidth < contentWidth + 20) {
                            setScale((containerWidth - 20) / contentWidth);
                        } else {
                            setScale(1);
                        }
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                setTimeout(handleResize, 100);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            return (
                <div ref={containerRef} className="w-full flex justify-center items-start overflow-hidden origin-top">
                    <div style={{ transform: `scale(${scale})`, transformOrigin: 'top center', width: '794px', transition: 'transform 0.2s ease-out' }}>
                        {children}
                    </div>
                </div>
            );
        };

        /* 증명서 A4 용지 렌더링 */
        function CertificatePaper({ docType, docNum, user, rrnDisplay, address, institution, official, stamp, periodStr, totalDuration, usage, detailPeriod, historyList, issueDateStr }) {
            return (
                <div className="paper bg-white text-black shadow-2xl p-16 min-h-[297mm] w-[210mm] relative box-border flex flex-col justify-between">
                    <div className="relative w-full h-full">
                        <div className="absolute top-0 left-0 text-sm text-gray-500 font-serif">문서번호 : {docNum}</div>
                        <div className="text-center mt-10">
                            <h1 className="text-3xl font-bold underline decoration-2 underline-offset-8 tracking-widest mb-2">{docType}</h1>
                        </div>
                        <div className="flex-1 mt-12">
                            <table className="w-full border-collapse border-2 border-black text-base mb-8">
                                <tbody>
                                    <tr className="h-12"><th className="border border-black bg-gray-100 w-32">성 명</th><td className="border border-black px-4 text-lg font-bold">{user.name}</td><th className="border border-black bg-gray-100 w-32">주민등록번호</th><td className="border border-black px-4 font-mono text-lg tracking-wide">{rrnDisplay}</td></tr>
                                    <tr className="h-12"><th className="border border-black bg-gray-100">주 소</th><td colSpan="3" className="border border-black px-4">{address}</td></tr>
                                    <tr className="h-12">
                                        <th className="border border-black bg-gray-100">소 속</th>
                                        <td className="border border-black px-4 leading-tight py-1">{institution.replace(/ /g, '\n')}</td>
                                        <th className="border border-black bg-gray-100">직 위</th>
                                        <td className="border border-black px-4">{user.rank}</td>
                                    </tr>
                                    <tr className="h-12"><th className="border border-black bg-gray-100">전체 기간</th><td colSpan="3" className="border border-black px-4 font-bold">{periodStr}</td></tr>
                                    <tr className="h-12"><th className="border border-black bg-gray-100">총 재직기간</th><td colSpan="3" className="border border-black px-4 font-bold text-lg">{totalDuration}</td></tr>
                                    <tr className="h-12"><th className="border border-black bg-gray-100">용 도</th><td colSpan="3" className="border border-black px-4">{usage}</td></tr>
                                </tbody>
                            </table>
                            {detailPeriod && historyList && historyList.length > 0 && (
                                <div className="mt-4">
                                    <h4 className="font-bold mb-1 text-sm border-b border-black inline-block">상세 근무 이력</h4>
                                    <table className="w-full border-collapse border border-black text-sm text-center mt-2">
                                        <thead className="bg-gray-100"><tr><th className="border border-black p-1">구분</th><th className="border border-black p-1">시작일</th><th className="border border-black p-1">종료일</th><th className="border border-black p-1">비고</th></tr></thead>
                                        <tbody>
                                            {historyList.map((h, idx) => {
                                                const fmt = d => typeof d === 'string' ? d.split('T')[0] : `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                                return (<tr key={idx}><td className="border border-black p-1">{idx + 1}. {h.type}</td><td className="border border-black p-1">{fmt(h.start)}</td><td className="border border-black p-1">{h.type.includes('현재') ? (h.note === '퇴사' ? fmt(h.end) : '현재') : fmt(h.end)}</td><td className="border border-black p-1">{h.note}</td></tr>);
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            <div className="mt-16 text-center"><p className="text-xl leading-loose">위와 같이 {docType === '경력증명서' ? '재직하였음을' : '재직하고 있음을'} 증명합니다.</p></div>
                        </div>
                        <div className="text-center mb-16 relative">
                            <p className="text-lg mb-8">{issueDateStr}</p>
                            <div className="text-2xl font-bold mb-2">{institution}</div>
                            <h2 className="text-3xl font-bold tracking-widest relative inline-block">{official}{stamp && (<img src={stamp} className="absolute -right-12 -top-5 w-24 h-24 object-contain opacity-90" style={{ mixBlendMode: 'multiply' }} />)}</h2>
                        </div>
                    </div>
                </div>
            );
        }

        /* 증명서 발급 모달 (설정 + 미리보기) */
        function CertificateModal({ user, onClose, settings, onIssue, certificates }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            const [issueDate, setIssueDate] = useState(new Date().toISOString().split('T')[0]);
            const targetDate = useMemo(() => {
                const [y, m, d] = issueDate.split('-').map(Number);
                return new Date(y, m - 1, d);
            }, [issueDate]);
            const issueDateStr = `${targetDate.getFullYear()}년 ${targetDate.getMonth() + 1}월 ${targetDate.getDate()}일`;

            const [footerInfo, setFooterInfo] = useState(() => ({
                institution: settings.lastIssuingAuthority || '영농조합법인 한국맥꾸룸',
                official: settings.lastIssuerName || '대표이사 OOO'
            }));
            const [usage, setUsage] = useState(() => localStorage.getItem('last_cert_usage') || '관공서 제출용');
            const usages = ["관공서 제출용", "금융기관 제출용", "이직/재취업용", "비자 발급용", "대출 신청용", "기타"];
            useEffect(() => { localStorage.setItem('dms_cert_footer', JSON.stringify(footerInfo)); }, [footerInfo]);

            const safeResignDate = user.resignDate ? new Date(user.resignDate) : null;
            const isResigned = safeResignDate && safeResignDate <= targetDate;
            const [docType, setDocType] = useState(isResigned ? '경력증명서' : '재직증명서');
            const [durationFormat, setDurationFormat] = useState('ymd');
            const [rrnOption, setRrnOption] = useState('masked');
            const hasHistory = user.contractHistory && user.contractHistory.length > 0;

            const [inputs, setInputs] = useState({
                docNum: '',
                address: user.address || '',
                detailPeriod: true
            });
            const [showSaveConfirm, setShowSaveConfirm] = useState(false);

            const getNextDocNum = (year) => {
                if (!certificates || certificates.length === 0) return 1;
                const prefix = `제 ${year}-`;
                const sameYearCerts = certificates.filter(c => c.docNum && c.docNum.startsWith(prefix));
                if (sameYearCerts.length === 0) return 1;
                let maxNum = 0;
                sameYearCerts.forEach(c => {
                    try {
                        const parts = c.docNum.replace(prefix, '').replace('호', '');
                        const num = parseInt(parts, 10);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    } catch (e) { }
                });
                return maxNum + 1;
            };

            useEffect(() => {
                const year = targetDate.getFullYear();
                const nextSeq = getNextDocNum(year);
                setInputs(prev => ({ ...prev, docNum: `제 ${year}-${nextSeq}호` }));
            }, [targetDate, certificates]);

            const rrnDisplay = useMemo(() => {
                if (!user.birthDate) return '';
                const parts = user.birthDate.split('-');
                if (parts.length !== 3) return user.birthDate;
                const [yyyy, mm, dd] = parts;
                const rrnFront = `${yyyy.slice(2)}${mm}${dd}`;
                let backFirst = '1';
                const yearNum = parseInt(yyyy);
                if (user.gender === 'female') backFirst = yearNum < 2000 ? '2' : '4';
                else backFirst = yearNum < 2000 ? '1' : '3';
                let rrnBackRest = '******';
                if (rrnOption === 'blank') rrnBackRest = '      ';
                if (rrnOption === 'full' && user.rrnBack && user.rrnBack.length === 7) return `${rrnFront}-${user.rrnBack}`;
                return `${rrnFront}-${backFirst}${rrnBackRest}`;
            }, [user, rrnOption]);

            const finalData = useMemo(() => {
                let list = [];
                if (hasHistory) {
                    user.contractHistory.forEach(h => {
                        list.push({ start: new Date(h.startDate), end: new Date(h.endDate), type: '과거 계약', note: '계약 만료' });
                    });
                }
                const currentStart = new Date(user.joinDate);
                let currentEnd;
                if (isResigned) currentEnd = safeResignDate;
                else {
                    if (docType === '경력증명서') currentEnd = targetDate;
                    else currentEnd = user.contractEndDate ? new Date(user.contractEndDate) : targetDate;
                }
                list.push({ start: currentStart, end: currentEnd, type: '현재', note: isResigned ? '퇴사' : (docType === '재직증명서' ? '재직 중' : '현재') });
                list.sort((a, b) => b.start - a.start);

                let totalDays = 0;
                list.forEach(p => {
                    let calcEnd = p.end;
                    if (p.type === '현재' && !isResigned && p.end > targetDate) calcEnd = targetDate;
                    const diff = calcEnd - p.start;
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
                    totalDays += days > 0 ? days : 0;
                });

                const years = Math.floor(totalDays / 365);
                const months = Math.floor((totalDays % 365) / 30);
                const days = (totalDays % 365) % 30;
                const totalMonths = Math.floor(totalDays / 30);

                let durationStr = '';
                if (durationFormat === 'ymd') durationStr = `${years > 0 ? years + '년 ' : ''}${months > 0 ? months + '개월 ' : ''}${days}일`;
                else if (durationFormat === 'ym') durationStr = `${years > 0 ? years + '년 ' : ''}${months}개월`;
                else if (durationFormat === 'm') durationStr = `${totalMonths}개월`;
                else if (durationFormat === 'd') durationStr = `${totalDays}일`;
                if (durationStr === '') durationStr = '1일';

                const sortedList = [...list].sort((a, b) => a.start - b.start);
                const firstDate = sortedList[0].start;
                const lastDate = sortedList[sortedList.length - 1].end;
                const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

                let periodStr = "";
                if (list.length > 1) periodStr = "상세 근무 이력 참조";
                else {
                    const endStr = (list[0].type === '현재' && !isResigned) ? fmtDate(targetDate) : fmtDate(lastDate);
                    periodStr = `${fmtDate(firstDate)} ~ ${endStr}`;
                }
                return { periodStr, totalDuration: durationStr, historyList: list };
            }, [user, docType, durationFormat, isResigned, hasHistory, targetDate]);

            const handleSaveRequest = () => setShowSaveConfirm(true);

            const executeSave = () => {
                const snapshot = {
                    id: Date.now(),
                    date: issueDate,
                    issueDateStr: issueDateStr,
                    type: docType,
                    docNum: inputs.docNum,
                    usage: usage,
                    targetUser: { name: user.name, rank: user.rank, birthDate: user.birthDate },
                    address: inputs.address,
                    rrnDisplay: rrnDisplay,
                    institution: footerInfo.institution,
                    issuer: footerInfo.official,
                    periodStr: finalData.periodStr,
                    totalDuration: finalData.totalDuration,
                    detailPeriod: inputs.detailPeriod,
                    historyList: finalData.historyList.map(h => ({ type: h.type, start: h.start.toISOString(), end: h.end.toISOString(), note: h.note }))
                };
                if (onIssue) onIssue(snapshot);
                localStorage.setItem('last_cert_usage', usage);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/70 z-[9999] flex justify-center items-start md:items-center p-4 overflow-y-auto">
                    <div className="bg-gray-100 w-full max-w-6xl rounded-xl shadow-2xl flex flex-col md:flex-row h-auto md:h-[90vh] md:overflow-hidden animate-fade-in relative my-10 md:my-0">
                        {/* 좌측 패널 (설정) */}
                        <div className="w-full md:w-96 bg-white border-r p-6 flex flex-col gap-5 no-print md:overflow-y-auto">
                            <div className="flex justify-between items-center border-b pb-4">
                                <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">🖨️ 증명서 설정</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
                            </div>
                            <div className="bg-yellow-50 p-3 rounded border border-yellow-100">
                                <label className="block text-xs font-bold text-yellow-800 mb-1">발급 기준일</label>
                                <input type="date" value={issueDate} onChange={(e) => setIssueDate(e.target.value)} className="w-full border p-2 rounded text-sm font-bold" />
                                <p className="text-[10px] text-gray-500 mt-1">※ 날짜를 변경하면 문서 번호가 해당 연도 기준으로 갱신됩니다.</p>
                            </div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-2">증명서 종류</label><div className="flex bg-gray-100 rounded p-1">{['재직증명서', '경력증명서'].map(type => (<button key={type} onClick={() => setDocType(type)} className={`flex-1 py-2 text-sm font-bold rounded transition-all ${docType === type ? 'bg-white text-indigo-600 shadow' : 'text-gray-500'}`}>{type}</button>))}</div></div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-2">주민번호 표시</label><div className="flex bg-gray-100 rounded p-1"><button onClick={() => setRrnOption('masked')} className={`flex-1 py-1.5 text-xs font-bold rounded ${rrnOption === 'masked' ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`}>마스킹(*)</button><button onClick={() => setRrnOption('blank')} className={`flex-1 py-1.5 text-xs font-bold rounded ${rrnOption === 'blank' ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`}>공백</button><button onClick={() => setRrnOption('full')} disabled={!user.rrnBack} className={`flex-1 py-1.5 text-xs font-bold rounded ${rrnOption === 'full' ? 'bg-white shadow text-indigo-600' : 'text-gray-400 cursor-not-allowed'}`}>전체공개</button></div></div>
                            <div>

        /* 증명서 뷰어 (발급 기록 조회 + 인쇄) */
        function CertificateViewer({ log, onClose, settings }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);

            const [hideStamp, setHideStamp] = useState(false);

            let displayDateStr = log.issueDateStr;

                displayDateStr = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
            }
            const historyList = log.historyList ? log.historyList.map(h => ({ ...h })) : [];

            return (
                <div className="fixed inset-0 bg-black/70 z-[9999] flex justify-center items-center p-4 overflow-y-auto">

                            </div>

                                    <p className="mb-1"><strong>발급일:</strong> {log.date}</p>
                                    <p><strong>대상자:</strong> {log.targetUser.name} ({log.targetUser.rank})</p>
                                </div>
                                <div className="bg-blue-50 text-blue-700 p-3 rounded text-xs border border-blue-100">
                                    ℹ️ 이 문서는 발급 당시의 정보가 보존된 스냅샷입니다.

                                </button>
                                <button onClick={handlePrint} className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 shadow flex justify-center items-center gap-2">

        // 3. 아이콘 컴포넌트
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                chart: "📊", list: "📋", worker: "👷", staff: "👤", info: "✨",
                left: "◀", right: "▶", arrowleft: "←", download: "📥", print: "🖨️",
                switch: "⇄",
                document: "📄", // 보고서 아이콘
                x: "✖"
            };

            // document(PDF) 아이콘은 깨짐 방지를 위해 SVG 사용
            if (name === 'document') {
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                );
            }
            return <span className={className} style={{ fontSize: size, filter: name === 'download' ? 'grayscale(100%)' : 'none' }}>{icons[name] || ""}</span>;
        };

        // 기존 단순 포맷팅 (1자리) - 기존 코드 호환용
        const fmt = (n) => Number(n).toFixed(1).replace(/\.0$/, '');

        const formatManDay = (days, hours) => parseFloat((days + (hours / 8)).toFixed(4));
        // --- [연차 계산 엔진] ---
        const isLeapYear = (y) => (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);

        // 연차 발생 이력 계산
        const calculateGrantHistory = (joinDateStr) => {
            if (!joinDateStr) return [];
            const history = [];
            const joinDate = new Date(joinDateStr);
            const joinYear = joinDate.getFullYear();
            const currentYear = new Date().getFullYear();
            const fmtYMD = (d) => d.toISOString().split('T')[0];

            // 1. [1년차] 입사년도 월차
            let mCount1 = 0;
            let tempDate = new Date(joinDate);
            tempDate.setMonth(tempDate.getMonth() + 1);
            tempDate.setDate(1);

            const start1 = new Date(tempDate);
            let end1 = new Date(tempDate);

            while (tempDate.getFullYear() === joinYear) {
                mCount1++;
                end1 = new Date(tempDate);
                tempDate.setMonth(tempDate.getMonth() + 1);
            }

            if (mCount1 > 0) {
                history.push({
                    grantYear: joinYear,
                    label: "입사년(월차)",
                    days: mCount1,
                    accrualDateStr: `${fmtYMD(start1)} ~ ${fmtYMD(end1)}\n매월 1일(1개씩)`,
                    allowanceDate: `${joinYear + 1}-01-01`
                });
            }

            // 2. [2년차]
            const nextYear = joinYear + 1;
            const maxMonthly = 11;
            const remainingMonthly = maxMonthly - mCount1;

            if (remainingMonthly > 0) {
                const start2 = new Date(nextYear, 0, 1);
                const end2 = new Date(nextYear, 0 + remainingMonthly - 1, 1);
                history.push({
                    grantYear: nextYear,
                    label: "2년차(월차)",
                    days: remainingMonthly,
                    accrualDateStr: `${fmtYMD(start2)} ~ ${fmtYMD(end2)}\n매월 1일(1개씩)`,
                    allowanceDate: `${nextYear + 1}-01-01`
                });
            }

            const calcDate = new Date(nextYear, 0, 1);
            const diffTime = calcDate - joinDate;
            const workDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const daysInYear = (joinYear % 4 === 0 && joinYear % 100 !== 0) || (joinYear % 400 === 0) ? 366 : 365;

            let proRated = (15 * workDays / daysInYear).toFixed(1);
            if (proRated > 15) proRated = 15;

            history.push({
                grantYear: nextYear,
                label: "2년차(비례)",
                days: parseFloat(proRated),
                accrualDateStr: `${nextYear}-01-01`,
                allowanceDate: `${nextYear + 1}-01-01`
            });

            // 3. [3년차 이후]
            let cursorYear = joinYear + 2;
            while (cursorYear <= currentYear + 1) {
                const tenure = cursorYear - joinYear;
                let days = 15 + Math.floor((tenure - 1) / 2);
                if (days > 25) days = 25;

                history.push({
                    grantYear: cursorYear,
                    label: `${tenure + 1}년차`,
                    days: days,
                    accrualDateStr: `${cursorYear}-01-01`,
                    allowanceDate: `${cursorYear + 1}-01-01`
                });
                cursorYear++;
            }
            return history;
        };

        const getLeaveStats = (user, docs, yr) => {
            if (!user || user.id === 'admin') return { total: 0, used: 0 };
            const history = calculateGrantHistory(user.join_date || user.joinDate);
            let grant = 0;
            history.forEach(h => { if (h.grantYear == yr) grant = h.days; });
            const used = (docs || []).filter(d =>
                !d.isDeleted && String(d.authorId) === String(user.id) &&
                d.status === 'approved' && d.type === 'vacation' &&
                d.startDate && d.startDate.startsWith(String(yr))
            ).reduce((acc, cur) => acc + parseFloat(cur.vacationDays || 0), 0);
            return { total: grant, used };
        };

                        if (targetName.length > 3) targetName = targetName.substring(0, 3);
                    }

                    const nameBadge = `<div style="background:#3498db; color:white; border-radius:3px; font-size:${fontSize}; font-weight:bold; height:24px; display:flex; align-items:center; justify-content:center; line-height:${lineHeight}; word-break:break-all; white-space:normal; text-align:center; margin:1px;">${targetName}</div>`;

                    // 4. 행 생성
                    annualHTML += `
                        <tr style="height:30px;">
                            <td>${(idx * annualRowsPerPage) + i + 1}</td>
                            <td style="padding:2px 4px;">${nameBadge}</td>
                            <td style="background-color:#f9f9f9; font-weight:bold; color:#555;">${fmtHTML(grantTotal)}</td>
                            <td style="background-color:#f9f9f9; font-weight:bold; color:#333;">${fmtHTML(totalUsed)}</td>
                            <td style="background-color:#e8f5e9; font-weight:900; color:#2e7d32;">${fmtHTML(remain)}</td>
                            ${monthlyUsed.map(v => `<td style="color:${v > 0 ? '#333' : '#ccc'}; font-weight:${v > 0 ? 'bold' : 'normal'};">${v > 0 ? fmtHTML(v) : '-'}</td>`).join('')}
                        </tr>
                    `;
                });

                annualHTML += `</tbody></table>`;

                pages.push({
                    id: `annual_${idx}`,
                    isLandscape: true,
                    html: annualHTML
                });
            });

            // [최종 수정] 머리글(페이지 번호) 자동 삽입 (표지 제외, 위치: 우측 상단)
            const totalContentPages = pages.length - 1; // 표지 제외한 총 페이지 수
            return pages.map((page, index) => {
                if (index === 0) return page; // 표지 제외

                // 위치 변경: bottom -> top (표와 겹침 방지)
                const footerHtml = `
                    <div style="position:absolute; top:20px; right:25px; font-size:10px; color:#888; font-weight:600;">
                        한국맥꾸룸 ${year}년 ${month}월  ${index} / ${totalContentPages}
                    </div>
                `;
                return {
                    ...page,
                    html: page.html + footerHtml
                };
            });
        };



        // =================================================================================
        // [2] 보고서 뷰어 (ReportViewer) - [최종] 주간 실근로시간(Real Work) 집계 적용
        // =================================================================================
        const ReportViewer = ({ users, activeWorkers, logMap, docMap, mealConfigMap, mealData, year, month, onClose, holidays, customHolidays, minuteMap }) => {
            const { useState, useEffect, useMemo, useRef } = React;
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [pageOrientations, setPageOrientations] = useState({});
            const [showSidebar, setShowSidebar] = useState(window.innerWidth >= 1024);
            const [scale, setScale] = useState(1);
            const viewerRef = useRef(null);
            // [★추가] PDF 다운로드 로딩 상태 관리
            const [isDownloading, setIsDownloading] = useState(false);

            // 식대 설정
            const currentMonthKey = `${year}-${String(month).padStart(2, '0')}`;
            const currentMealConfig = (mealConfigMap && mealConfigMap[`cfg_${currentMonthKey}`]) || { use: false, price: 5000 };
            const useMeal = currentMealConfig.use;
            const mealPrice = Number(currentMealConfig.price);

            const getAllIds = () => users.map(u => String(u.id)).concat(activeWorkers);

            useEffect(() => { if (users) setSelectedIds(new Set(getAllIds())); }, [users, activeWorkers]);

            // 화면 크기 및 배율
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) {
                        if (!showSidebar) setShowSidebar(true);
                    } else {
                        if (showSidebar) setShowSidebar(false);
                    }
                    requestAnimationFrame(calculateScale);
                };
                const calculateScale = () => {
                    if (!viewerRef.current) return;
                    const containerWidth = viewerRef.current.clientWidth - 32;
                    const targetWidth = 794;
                    if (containerWidth > 0 && containerWidth < targetWidth) setScale(containerWidth / targetWidth);
                    else setScale(1);
                };
                calculateScale();
                window.addEventListener('resize', handleResize);
                const timer = setTimeout(calculateScale, 350);
                return () => { window.removeEventListener('resize', handleResize); clearTimeout(timer); };
            }, [showSidebar]);

            // =================================================================================
            // [2] 보고서 뷰어 (ReportViewer) - [최종] 월간/주간 집계 로직 이원화 (ISO Full Week 적용)
            // =================================================================================
            const reportData = useMemo(() => {
                const checkIsHoliday = (ds) => {
                    if ((holidays && holidays[ds]) || (customHolidays && customHolidays[ds])) return true;
                    const [y, m, d] = ds.split('-').map(Number);
                    if ((m === 1 && d === 1) || (m === 3 && d === 1) || (m === 5 && d === 5) || (m === 6 && d === 6) || (m === 8 && d === 15) || (m === 10 && d === 3) || (m === 10 && d === 9) || (m === 12 && d === 25)) return true;
                    return false;
                };
                const targetUsers = users.filter(u => selectedIds.has(String(u.id)));
                const targetDailies = activeWorkers.filter(name => selectedIds.has(name));

                // 1. [월간] 급여/통계용 (1일 ~ 말일)
                const lastDay = new Date(year, month, 0).getDate();
                const monthDates = Array.from({ length: lastDay }, (_, i) => i + 1);

                // 2. [주간] 52시간 관리용 (ISO Full Week: 전월/익월 포함)
                // (1) 이번 달 1일이 속한 주의 월요일 찾기
                const firstDateOfMonth = new Date(year, month - 1, 1);
                const startDay = firstDateOfMonth.getDay(); // 0(일)~6(토)
                const diffStart = firstDateOfMonth.getDate() - (startDay === 0 ? 6 : startDay - 1); // 월요일로 이동
                const reportStartDate = new Date(year, month - 1, diffStart);

                // (2) 이번 달 말일이 속한 주의 일요일 찾기
                const lastDateOfMonth = new Date(year, month, 0);
                const endDay = lastDateOfMonth.getDay();
                const diffEnd = lastDateOfMonth.getDate() + (endDay === 0 ? 0 : 7 - endDay); // 일요일로 이동
                const reportEndDate = new Date(year, month - 1, diffEnd);

                // (3) 주간 분석용 전체 날짜 배열 생성
                const fullWeekDates = [];
                let curr = new Date(reportStartDate);
                while (curr <= reportEndDate) {
                    fullWeekDates.push(new Date(curr));
                    curr.setDate(curr.getDate() + 1);
                }

                const formatSmart = (num) => { if (!num) return 0; const pNum = parseFloat(num); return Number.isInteger(pNum) ? pNum : parseFloat(pNum.toFixed(4)); };

                // [ISO 8601 주차 계산]
                const getISOWeekNumber = (d) => {
                    const date = new Date(d.valueOf());
                    const dayNum = date.getDay() || 7;
                    date.setDate(date.getDate() + 4 - dayNum);
                    const yearStart = new Date(date.getFullYear(), 0, 1);
                    return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
                };

                // 주차 맵핑 (Full Range 기준)
                const weekRanges = {};
                const orderedWeekKeys = [];

                fullWeekDates.forEach(d => {
                    const weekNum = getISOWeekNumber(d);
                    const dateStr = `${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;

                    if (!orderedWeekKeys.includes(weekNum)) orderedWeekKeys.push(weekNum);

                    if (!weekRanges[weekNum]) weekRanges[weekNum] = { start: dateStr, end: dateStr };
                    else weekRanges[weekNum].end = dateStr;
                });

                // ---------------------------------------------------------
                // A. 월간 통계 집계 (Page 1, 2, 4, 5용) - 기존 로직 유지
                // ---------------------------------------------------------
                const stats = { regular: { count: 0, workDays: 0, gongsu: 0, over: 0, list: [] }, daily: { count: 0, workDays: 0, gongsu: 0, list: [], exists: targetDailies.length > 0 }, total: { days: 0, gongsu: 0 } };

                const processMonthly = (target, type) => {
                    let name = (type === 'user') ? target.name : target;
                    let id = (type === 'user') ? String(target.id) : target.trim();
                    let d = 0, h = 0, g = 0, wd = 0, wo = 0, ws = 0, hd = 0, ho = 0, hs = 0, ab = 0, md = 0;

                    // 공수 상세 (평일/특근) 추가
                    let wg = 0, hg = 0;

                    monthDates.forEach(dateNum => {
                        const ds = `${year}-${String(month).padStart(2, '0')}-${String(dateNum).padStart(2, '0')}`;
                        let log = (type === 'user') ? logMap[`user_${id}_${ds}`] : logMap[`daily_${id}_${ds}`];
                        let doc = (type === 'user') ? (docMap && docMap[`user_${id}_${ds}`]) : null;

                        let isWork = false;
                        let dayTime = 0;
                        let dayOver = 0;
                        let dayShort = 0;

                        if (doc && ['vacation', 'full'].includes(doc.leaveType)) {
                            isWork = true; dayTime = 8;
                        } else if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                            let logTime = 0;
                            if (log && log.status !== 'absent') {
                                logTime = 4 + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                                if (logTime < 0) logTime = 0;
                            }
                            dayTime = 4 + logTime;
                            isWork = true;
                            if (dayTime > 8) dayOver = dayTime - 8;
                            else if (dayTime < 8) dayShort = 8 - dayTime;
                        } else if (log) {
                            if (log.status !== 'absent') {
                                isWork = true;
                                dayOver = parseFloat(log.overtime) || 0;
                                dayShort = parseFloat(log.short_time) || 0;
                                dayTime = 8 + dayOver - dayShort;
                            } else {
                                const dow = new Date(year, month - 1, dateNum).getDay();
                                const isRed = checkIsHoliday(ds) || dow === 0;
                                const isSat = dow === 6;
                                if (!isRed && !isSat) ab++;
                            }
                        }

                        if (isWork) {
                            d++; h += dayTime; g += (dayTime / 8);
                            if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                                if (!log || Number(log.is_meal ?? 1) !== 0) md++;
                            } else if (log && Number(log.is_meal ?? 1) !== 0) {
                                md++;
                            }
                            const dow = new Date(year, month - 1, dateNum).getDay();
                            const isRed = checkIsHoliday(ds) || dow === 0;
                            const isSat = dow === 6;

                            const dayG = dayTime / 8;

                            if (isRed || isSat) {
                                hd++; ho += dayOver; hs += dayShort;
                                hg += dayG;
                            } else {
                                wd++; wo += dayOver; ws += dayShort;
                                wg += dayG;
                            }
                        }
                    });

                    let mealCount = 0;
                    const currentMonthKey = `${year}-${String(month).padStart(2, '0')}`;
                    if (useMeal) {
                        const mKey = (type === 'user') ? `u_${id}_${currentMonthKey}` : `d_${id}_${currentMonthKey}`;
                        if (mealData && mealData[mKey] !== undefined) mealCount = mealData[mKey];
                        else mealCount = md;
                    }
                    const mealCost = mealCount * mealPrice;

                    const calcG = (days, over, short) => (days * 8 + over - short) / 8;
                    const pData = {
                        id: id, name, type,
                        t_days: d, t_time: h, t_gongsu: formatSmart(g),
                        w_days: wd, w_basic: wd * 8, w_over: wo, w_short: ws, w_absent: ab, w_gongsu: formatSmart(wg),
                        h_days: hd, h_basic: hd * 8, h_over: ho, h_short: hs, h_gongsu: formatSmart(hg),
                        mealCount, mealCost
                    };
                    if (type === 'user') { stats.regular.count++; stats.regular.workDays += d; stats.regular.gongsu += g; stats.regular.over += (wo + ho); stats.regular.list.push(pData); }
                    else { stats.daily.count++; stats.daily.workDays += d; stats.daily.gongsu += g; stats.daily.list.push(pData); }
                };

                targetUsers.forEach(u => processMonthly(u, 'user'));
                targetDailies.forEach(w => processMonthly(w, 'daily'));

                // ---------------------------------------------------------
                // B. 주간 통계 집계 (Page 3용) - 입퇴사일 체크 적용
                // ---------------------------------------------------------
                const weeklyStats = [];

                const processWeekly = (target, type) => {
                    let name = (type === 'user') ? target.name : target;
                    let id = (type === 'user') ? String(target.id) : target.trim();

                    // [★추가] 입사일/퇴사일 정보 가져오기
                    const joinDate = (type === 'user') ? (target.joinDate || target.join_date) : null;
                    const resignDate = (type === 'user') ? (target.resignation_date) : null;

                    const userWeeks = {};
                    orderedWeekKeys.forEach(w => userWeeks[w] = { work: 0, leave: 0, absent: 0, loss: 0 });

                    fullWeekDates.forEach(dObj => {
                        const yyyy = dObj.getFullYear();
                        const mm = String(dObj.getMonth() + 1).padStart(2, '0');
                        const dd = String(dObj.getDate()).padStart(2, '0');
                        const ds = `${yyyy}-${mm}-${dd}`;

                        // [★Fix] 입사일 이전이거나 퇴사일 이후면 집계에서 즉시 제외
                        if (joinDate && ds < joinDate) return;
                        if (resignDate && ds > resignDate) return;

                        const weekNum = getISOWeekNumber(dObj);
                        if (!userWeeks[weekNum]) return;

                        let log = (type === 'user') ? logMap[`user_${id}_${ds}`] : logMap[`daily_${id}_${ds}`];
                        let doc = (type === 'user') ? (docMap && docMap[`user_${id}_${ds}`]) : null;

                        let realWorkTime = 0;
                        let dayShort = 0;

                        if (doc && ['vacation', 'full'].includes(doc.leaveType)) {
                            userWeeks[weekNum].leave += 1;
                        } else if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                            let logTime = 0;
                            if (log && log.status !== 'absent') {
                                logTime = 4 + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                                if (logTime < 0) logTime = 0;
                            }
                            realWorkTime = logTime;
                            if (!log || log.status === 'absent') realWorkTime = 4;

                            userWeeks[weekNum].leave += 0.5;
                            userWeeks[weekNum].loss -= (parseFloat(log?.short_time) || 0);
                        } else if (log) {
                            if (log.status !== 'absent') {
                                const dayOver = parseFloat(log.overtime) || 0;
                                dayShort = parseFloat(log.short_time) || 0;
                                realWorkTime = 8 + dayOver - dayShort;

                                // [수정] 휴일/주말 여부 확인
                                const dow = dObj.getDay();
                                const isRed = checkIsHoliday(ds) || dow === 0;
                                const isSat = dow === 6;
                                const isHolidayDay = isRed || isSat;

                                // [수정] "평일"에 발생한 조퇴만 변동(Loss)으로 집계 (주말 조퇴는 무시)
                                if (dayShort > 0 && !isHolidayDay) {
                                    userWeeks[weekNum].loss -= dayShort;
                                }
                            } else {
                                const dow = dObj.getDay();
                                const isRed = checkIsHoliday(ds) || dow === 0;
                                const isSat = dow === 6;
                                if (!isRed && !isSat) userWeeks[weekNum].absent += 1;
                            }
                        }
                        userWeeks[weekNum].work += realWorkTime;
                    });

                    weeklyStats.push({ name, type, weeks: userWeeks });
                };

                targetUsers.forEach(u => processWeekly(u, 'user'));
                targetDailies.forEach(w => processWeekly(w, 'daily'));

                // 트렌드 데이터 (월간 기준)
                const trend = monthDates.map(d => {
                    const ds = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    let rCount = 0, dCount = 0, dayOver = 0, dayShort = 0, dayLeave = 0;

                    // [추가] 그래프 분리용 변수
                    let leaveCnt = 0; // 순수 연차(종일) 인원
                    let workCnt = 0;  // 실근무(반차 포함) 인원

                    targetUsers.forEach(u => {
                        // [추가] 입사일/퇴사일 체크 (중복 방지)
                        const joinDate = u.joinDate || u.join_date;
                        const resignDate = u.resignation_date;
                        if (joinDate && ds < joinDate) return;
                        if (resignDate && ds > resignDate) return;

                        const log = logMap[`user_${u.id}_${ds}`];
                        const doc = docMap ? docMap[`user_${u.id}_${ds}`] : null;

                        let isUserCounted = false;
                        let isFullLeave = false; // 종일 연차 여부

                        if (log?.status && log.status !== 'absent') isUserCounted = true;
                        if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                            isUserCounted = true;
                            if (['vacation', 'full'].includes(doc.leaveType)) isFullLeave = true;
                        }

                        if (isUserCounted) {
                            rCount++; // 총 정규직 인원 (근무+연차)

                            // [핵심] 그래프용 분리 집계
                            if (isFullLeave) {
                                leaveCnt++;
                            } else {
                                workCnt++;
                            }
                        }

                        if (log?.status && log.status !== 'absent') { dayOver += (parseFloat(log.overtime) || 0); dayShort += (parseFloat(log.short_time) || 0); }
                        if (doc) { if (['vacation', 'full'].includes(doc.leaveType)) dayLeave += 1; else if (['half', 'am', 'pm'].includes(doc.leaveType)) dayLeave += 0.5; }
                    });

                    targetDailies.forEach(w => {
                        const log = logMap[`daily_${w.trim()}_${ds}`];
                        if (log?.status && log.status !== 'absent') { dCount++; dayOver += (parseFloat(log.overtime) || 0); dayShort += (parseFloat(log.short_time) || 0); }
                    });

                    // workCnt(파랑), leaveCnt(초록) 반환값에 추가
                    return { day: d, fullDate: ds, regular: rCount, daily: dCount, workCnt, leaveCnt, total: rCount + dCount, overtime: dayOver, shortTime: dayShort, leave: dayLeave };
                });

                return {
                    stats, trend, weeklyStats, weekRanges, orderedWeekKeys,
                    totalHeadcount: stats.regular.count + stats.daily.count, totalWorkDays: stats.regular.workDays + stats.daily.workDays, totalGongsu: stats.regular.gongsu + stats.daily.gongsu,
                    avgRegGongsu: stats.regular.count > 0 ? (stats.regular.gongsu / stats.regular.count).toFixed(2) : 0,
                    totalRegOver: stats.regular.over.toFixed(1), logMap: logMap, docMap: docMap,
                    useMeal, mealPrice, mealData,
                    users: users, // [★추가] 입사일 계산을 위해 전체 유저 정보 전달
                    minuteMap // 회의록 아이콘 추가 표기를 위해 데이터 전달
                };
            }, [users, logMap, docMap, selectedIds, year, month, holidays, customHolidays, mealData, useMeal, mealPrice, minuteMap]);


            const reportPages = useMemo(() => getReportPages(reportData, year, month, holidays, customHolidays), [reportData]);

            // [★수정] 브라우저 자체 인쇄 + 가로 페이지 여백(상하좌우) 정밀 보정
            const handleDownload = async () => {
                // 1. 인쇄용 새 창 열기
                const printWindow = window.open('', '_blank', 'width=1200,height=900');

                if (!printWindow) {
                    await window.customAlert("팝업 차단을 해제해 주세요.");
                    return;
                }

                // 2. 인쇄할 HTML 조립
                let contentHtml = '';
                reportPages.forEach(page => {
                    if (page.isLandscape) {
                        // 가로 페이지
                        contentHtml += `<div class="pdf-page-wrapper" style="page-break-after: always;"><div class="pdf-rotate-content"><div class="page-inner">${page.html}</div></div></div>`;
                    } else {
                        // 세로 페이지
                        contentHtml += `<div class="pdf-page-wrapper" style="page-break-after: always;"><div class="pdf-inner-portrait">${page.html}</div></div>`;
                    }
                });

                // 3. 새 창에 HTML 쓰기
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>${year}년_${month}월_근태관리보고서</title>
                        <style>
                            ${REPORT_STYLES}

                            @media print {
                                @page { margin: 0; size: A4; }

                                body {
                                    -webkit-print-color-adjust: exact;
                                    margin: 0;
                                    padding: 0;
                                    background: white;
                                    zoom: 1.4; /* 140% 확대 유지 */
                                }

                                .pdf-page-wrapper { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

                                /* [★핵심 수정] 가로 페이지(Landscape) 위치 강제 보정 */
                                .pdf-rotate-content {
                                    transform-origin: top left;

                                    /* 1. 위쪽 여백이 너무 많음 -> 마이너스 마진으로 위로 당김 */
                                    margin-top: 50px !important;

                                    /* 2. 왼쪽 여백이 너무 좁음 -> 왼쪽 마진을 주어 오른쪽으로 밈 */
                                    margin-left: 50px !important;
                                }
                            }

                            body { background: #f0f0f0; display: flex; justify-content: center; }
                            .report-body { background: white; }
                        </style>
                    </head>
                    <body>
                        <div class="report-body">
                            ${contentHtml}
                        </div>
                        <script>
                            window.onload = function() {
                                setTimeout(function() {
                                    window.print();
                                }, 500);
                            };
                        <\/script>
                    </body>
                    </html>
                `);

                printWindow.document.close();
                printWindow.focus();
            };


            return (
                <div className="fixed inset-0 bg-gray-100 z-50 flex flex-col h-screen font-sans">
                    {/* [★추가] PDF 생성 중 로딩 오버레이 */}
                    {isDownloading && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mb-4"></div>
                            <div className="text-white font-bold text-lg">PDF 생성 중입니다...</div>
                            <div className="text-white/80 text-sm mt-2">잠시만 기다려 주세요 (약 10~30초 소요)</div>
                        </div>
                    )}
                    <div className="bg-white border-b px-4 py-3 flex justify-between items-center shadow-sm shrink-0 h-16">
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowSidebar(!showSidebar)} className={`p-2 rounded-lg transition-colors ${showSidebar ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-100'}`} title={showSidebar ? "메뉴 접기" : "메뉴 펼치기"}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                            </button>
                            <h2 className="text-lg md:text-xl font-bold text-gray-800 truncate">📊 인터랙티브 보고서</h2>
                            <span className="text-xs md:text-sm bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-bold whitespace-nowrap">{year}.{month}</span>
                        </div>
                        <div className="flex gap-2">
                            {/* [★수정] 로딩 상태에 따른 버튼 비활성화 및 스타일 변경 */}
                            <button
                                onClick={handleDownload}
                                disabled={isDownloading}
                                className={`text-white px-3 py-2 rounded-lg shadow font-bold flex items-center gap-2 text-sm transition-colors ${isDownloading ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'}`}
                            >
                                <span>{isDownloading ? '생성 중...' : 'PDF 저장'}</span>
                            </button>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-800 p-2 rounded-full hover:bg-gray-100"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                    </div>
                    <div className="flex flex-1 overflow-hidden relative">
                        <div className={`w-72 bg-white border-r flex flex-col h-full shrink-0 overflow-hidden z-20 absolute md:static shadow-2xl md:shadow-none transition-transform duration-300 ${showSidebar ? 'translate-x-0' : '-translate-x-full md:hidden'}`}>
                            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <span className="font-bold">인원 선택</span>
                                <div className="flex gap-1">
                                    <button onClick={() => setSelectedIds(new Set(getAllIds()))} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 font-bold">전체</button>
                                    <button onClick={() => setSelectedIds(new Set())} className="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300">해제</button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3">
                                <div className="text-xs font-bold text-gray-400 mt-2 mb-1">정규직</div>
                                {users.map(u => (
                                    <label key={u.id} className="flex items-center gap-2 p-1.5 hover:bg-blue-50 rounded cursor-pointer select-none">
                                        <input type="checkbox" checked={selectedIds.has(String(u.id))} onChange={(e) => { const s = new Set(selectedIds); e.target.checked ? s.add(String(u.id)) : s.delete(String(u.id)); setSelectedIds(s); }} />
                                        <span className="text-sm">{u.name}</span>
                                    </label>
                                ))}
                                {activeWorkers.length > 0 && (<>
                                    <div className="text-xs font-bold text-gray-400 mt-4 mb-1">일용직</div>
                                    {activeWorkers.map(dId => (
                                        <label key={dId} className="flex items-center gap-2 p-1.5 hover:bg-orange-50 rounded cursor-pointer select-none">
                                            <input type="checkbox" checked={selectedIds.has(dId)} onChange={(e) => { const s = new Set(selectedIds); e.target.checked ? s.add(dId) : s.delete(dId); setSelectedIds(s); }} />
                                            <span className="text-sm">{dId}</span>
                                        </label>
                                    ))}
                                </>)}
                            </div>
                        </div>
                        <div ref={viewerRef}
                            className="flex-1 overflow-y-auto bg-gray-200 p-4 md:p-8 flex flex-col items-center w-full relative custom-scrollbar"
                            onClick={(e) => {
                                const badge = e.target.closest('.minute-badge');
                                if (badge) {
                                    const dateStr = badge.getAttribute('data-date');
                                    if (dateStr && onMinuteClick) {
                                        onMinuteClick(dateStr);
                                    }
                                }
                            }}>
                            <style>{REPORT_STYLES}</style>
                            <div style={{ transform: `scale(${scale})`, transformOrigin: scale < 1 ? 'top left' : 'top center', width: '100%', display: 'flex', flexDirection: 'column', alignItems: scale < 1 ? 'flex-start' : 'center', justifyContent: 'flex-start', transition: 'transform 0.2s ease-out', minHeight: '100%', paddingBottom: '80px' }}>
                                <div style={{ width: 'fit-content' }}>
                                    {reportPages.map(page => {
                                        const isLand = pageOrientations[page.id] === 'landscape' || (pageOrientations[page.id] === undefined && page.isDefaultLandscape) || page.isLandscape;
                                        const paperClass = isLand ? 'web-paper-landscape' : 'web-paper-portrait';
                                        return (<div key={page.id} className={paperClass}><div className="page-inner" dangerouslySetInnerHTML={{ __html: page.html }} /></div>);
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };





        // [컴포넌트 1] 통계 대시보드 (최종 수정본: 특근 정밀 계산 및 문서 우선 처리 적용)
        function StatsDashboard({
            users, attendanceLogs, year, month, holidays, customHolidays,
            dailyLogs, dailyWorkerNames, docs,
            /* 식대 변수 받기 */
            useMeal, mealPrice, mealData, mealConfigMap,
            minuteMap, onMinuteClick
        }) {
            const fmt = (n) => Number(n).toFixed(1).replace(/\.0$/, '');
            const fmt4 = (n) => parseFloat(Number(n).toFixed(4));
            const formatManDay = (days, hours) => {
                const val = days + (hours / 8);
                return parseFloat(val.toFixed(4));
            };

            // 1. 식대 통계
            const mealStats = useMemo(() => {
                let mTotal = 0;
                let yTotal = 0;

                const getMealSetting = (ym) => {
                    return mealConfigMap && mealConfigMap[`cfg_${ym}`] ? mealConfigMap[`cfg_${ym}`] : { use: false, price: 5000 };
                };

                // 1. users meal data from logs / mealData
                users.forEach(u => {
                    for(let i=1; i<=12; i++) {
                        const ym = `${year}-${String(i).padStart(2, '0')}`;
                        const key = `u_${u.id}_${ym}`;
                        let count = 0;
                        const setting = getMealSetting(ym);
                        if (!setting.use) continue;

                        if (mealData && mealData[key] !== undefined) {
                            count = mealData[key];
                        } else {
                            // sum log.is_meal for this month manually to avoid circular dependencies
                            let mSum = 0;
                            const end = new Date(year, i, 0);
                            for (let d = 1; d <= end.getDate(); d++) {
                                const ds = `${ym}-${String(d).padStart(2, '0')}`;
                                const log = attendanceLogs.find(l => l.user_id === u.id && l.date === ds);
                                const doc = docs.find(d => !d.isDeleted && d.authorId === u.id && d.status === 'approved' && d.startDate <= ds && d.endDate >= ds);

                                let isWork = 0;
                                if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) isWork = 1;
                                else if (log && log.status !== 'vacation' && log.status !== 'absent') isWork = 1;

                                if (isWork) {
                                    if (!log || Number(log.is_meal ?? 1) !== 0) mSum++;
                                }
                            }
                            count = mSum;
                        }
                        const cost = count * Number(setting.price);
                        yTotal += cost;
                        if (i === month) mTotal += cost;
                    }
                });

                // 2. daily meal data
                const dNamesSet = new Set();
                dailyLogs.forEach(l => { if (l.date.startsWith(String(year))) dNamesSet.add(l.worker_name); });
                Array.from(dNamesSet).forEach(name => {
                    for(let i=1; i<=12; i++) {
                        const ym = `${year}-${String(i).padStart(2, '0')}`;
                        const key = `${ym}_d_${name}`;
                        let count = 0;
                        const setting = getMealSetting(ym);
                        if (!setting.use) continue;

                        if (mealData && mealData[key] !== undefined) {
                            count = mealData[key];
                        } else {
                            let mSum = 0;
                            dailyLogs.forEach(log => {
                                if (log.worker_name === name && log.date.startsWith(ym)) {
                                    let h = log.hours ? parseFloat(log.hours) : 0;
                                    if (!h && log.status !== 'absent') {
                                        const bd = parseFloat(log.workDays) || 1;
                                        h = (bd * 8) + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                                    }
                                    let days = parseFloat(log.workDays) || 0;
                                    if (days === 0 && h > 0) days = h / 8;
                                    if (!isNaN(h) && (h > 0 || days > 0)) {
                                        if (Number(log.is_meal ?? 1) !== 0) mSum += days;
                                    }
                                }
                            });
                            count = mSum;
                        }
                        const cost = count * Number(setting.price);
                        yTotal += cost;
                        if (i === month) mTotal += cost;
                    }
                });

                return { monthTotal: mTotal, yearTotal: yTotal };
            }, [users, dailyLogs, attendanceLogs, docs, mealData, mealConfigMap, year, month]);


            // 2. 정규직 근태 통계 (핵심 로직 수정됨)
            const statsData = useMemo(() => {
                // (1) 공휴일 체크 헬퍼
                const checkIsHoliday = (ds) => {
                    if ((holidays && holidays[ds]) || (customHolidays && customHolidays[ds])) return true;
                    const [y, m, d] = ds.split('-').map(Number);
                    if ((m === 1 && d === 1) || (m === 3 && d === 1) || (m === 5 && d === 5) || (m === 6 && d === 6) || (m === 8 && d === 15) || (m === 10 && d === 3) || (m === 10 && d === 9) || (m === 12 && d === 25)) return true;
                    return false;
                };

                // (2) 데이터 매핑 (성능 최적화)
                const lMap = {};
                (attendanceLogs || []).forEach(l => lMap[`${l.user_id}_${l.date}`] = l);

                const dMap = {};
                (docs || []).forEach(doc => {
                    if (doc.status !== 'approved' || doc.isDeleted) return;
                    const s = new Date(doc.startDate);
                    const e = new Date(doc.endDate);
                    for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
                        const ds = d.toISOString().split('T')[0];
                        dMap[`${doc.authorId}_${ds}`] = doc;
                    }
                });

                // (3) 분석 기간 설정 (1월 1일 ~ 12월 31일)
                const dates = [];
                const start = new Date(year, 0, 1);
                const end = new Date(year, 11, 31);
                const currentMonthPrefix = `${year}-${String(month).padStart(2, '0')}`;

                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    dates.push(d.toISOString().split('T')[0]);
                }

                // (4) 유저별 통계 계산
                return users.filter(u => {
                    if (u.id === 'admin' || u.exclude_attendance) return false;

                    const viewMonth = currentMonthPrefix;
                    const joinDate = u.joinDate || u.join_date;
                    if (joinDate && viewMonth < joinDate.substring(0, 7)) return false;
                    if (u.resignation_date) {
                        const resignMonth = u.resignation_date.substring(0, 7);
                        if (viewMonth > resignMonth) return false;
                    }
                    return true;
                }).map(u => {
                    let m = { work: 0, over: 0, holiD: 0, holiH: 0, short: 0, absent: 0, mealDays: 0 };
                    let y = { work: 0, over: 0, holiD: 0, holiH: 0, short: 0, absent: 0, mealDays: 0 };

                    dates.forEach(ds => {
                        // 입/퇴사일 체크
                        if ((u.joinDate || u.join_date) && ds < (u.joinDate || u.join_date)) return;
                        if (u.resignation_date && ds > u.resignation_date) return;

                        const isMonthly = ds.startsWith(currentMonthPrefix);
                        const isRed = checkIsHoliday(ds);
                        const day = new Date(ds).getDay();
                        const isWeekend = (day === 0 || day === 6);
                        const isHoliday = isRed || isWeekend;

                        const log = lMap[`${u.id}_${ds}`];
                        const doc = dMap[`${u.id}_${ds}`];

                        let d_work = 0, d_over = 0, d_short = 0, d_holiD = 0, d_holiH = 0;
                        let isAbsent = false;

                        // [A] 문서(Doc)가 있는 경우 (우선 처리 - 휴일 반차 버그 해결)
                        if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                            d_work = 1;
                            if (!log || Number(log.is_meal ?? 1) !== 0) {
                                y.mealDays++;
                                if (isMonthly) m.mealDays++;
                            }

                            if (isHoliday) {
                                d_holiD = 1;
                                if (!['vacation', 'full'].includes(doc.leaveType)) { // 반차인 경우
                                    let worked = 0;
                                    if (log && log.status !== 'absent') {
                                        worked = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                                        if (worked < 0) worked = 0;
                                    }
                                    // [핵심] 특근 시간 = (4시간 + 실근무) - 8시간 (순수 변동분)
                                    d_holiH = (worked + 4 - 8);
                                }
                            } else { // 평일
                                if (['half', 'am', 'pm'].includes(doc.leaveType)) {
                                    let worked = 0;
                                    if (log && log.status !== 'absent') {
                                        worked = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                                        if (worked < 0) worked = 0;
                                    }
                                    const total = worked + 4;
                                    if (total > 8) d_over = total - 8;
                                    else if (total < 8) d_short = 8 - total;
                                }
                            }
                        }
                        // [B] 로그(Log)만 있는 경우
                        else if (log) {
                            if (log.status === 'absent') {
                                isAbsent = true;
                            } else if (log.status !== 'vacation') {
                                d_work = 1;
                                if (Number(log.is_meal ?? 1) !== 0) {
                                    y.mealDays++;
                                    if (isMonthly) m.mealDays++;
                                }
                                const ov = parseFloat(log.overtime) || 0;
                                const sh = parseFloat(log.short_time) || 0;
                                const logH = log.status.includes('holiday') || (log.status === 'weekday' && isHoliday);

                                if (logH) {
                                    d_holiD = 1;
                                    // [핵심] 특근 시간 = 연장 - 조퇴 (순수 변동분)
                                    d_holiH = ov - sh;
                                } else {
                                    d_over = ov;
                                    d_short = sh;
                                }
                            }
                        }

                        // 누적
                        if (isAbsent) {
                            if (!isHoliday) { // 평일 결근만
                                y.absent++;
                                if (isMonthly) m.absent++;
                            }
                        } else if (d_work) {
                            y.work += d_work; y.over += d_over; y.short += d_short; y.holiD += d_holiD; y.holiH += d_holiH;
                            if (isMonthly) {
                                m.work += d_work; m.over += d_over; m.short += d_short; m.holiD += d_holiD; m.holiH += d_holiH;
                            }
                        }
                    });

                    // 식대 및 연차
                    let m_meal = 0;
                    if (useMeal) {
                        const key = `u_${u.id}_${currentMonthPrefix}`;
                        const count = (mealData && mealData[key] !== undefined) ? mealData[key] : m.mealDays;
                        m_meal = count * mealPrice;
                    }
                    const leave = typeof getLeaveStats === 'function' ? getLeaveStats(u, docs, year) : { total: 0, used: 0 };

                    return { ...u, leaveTotal: leave.total, leaveUsed: leave.used, m, y, m_meal };
                }).sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            }, [users, attendanceLogs, year, month, holidays, customHolidays, docs, useMeal, mealData, mealPrice]);


            // 3. 일용직 통계 계산 (공수 0 오류 수정됨)
            const dailySummary = useMemo(() => {
                const monthKey = `${year}-${String(month).padStart(2, '0')}`;
                const workers = (dailyWorkerNames && dailyWorkerNames[monthKey]) || [];

                let m_days = 0; let m_hours = 0;
                let y_days = 0; let y_hours = 0;

                // (1) 월간
                const list = workers.map(name => {
                    let dSum = 0; let hSum = 0;
