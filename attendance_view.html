                    (dailyLogs || []).forEach(log => {
                        const logName = String(log.workerName || log.worker_name || "").trim();
                        if (logName !== name.trim() || !log.date || !log.date.startsWith(monthKey)) return;

                        let h = 0;
                        if (log.hours) {
                            h = parseFloat(log.hours);
                        } else if (log.status !== 'absent') {
                            const baseDay = parseFloat(log.workDays) || 1;
                            h = (baseDay * 8) + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                        }

                        let days = parseFloat(log.workDays) || 0;
                        if (days === 0 && h > 0) days = h / 8; // 시간 기반 역산

                        if (!isNaN(h) && (h > 0 || days > 0)) {
                            hSum += h; dSum += days;
                        }
                    });
                    m_days += dSum; m_hours += hSum;
                    return { name, workDays: dSum, totalHours: hSum };
                });

                // (2) 연간
                (dailyLogs || []).forEach(log => {
                    if (log.date && log.date.startsWith(String(year))) {
                        let h = 0;
                        if (log.hours) {
                            h = parseFloat(log.hours);
                        } else if (log.status !== 'absent') {
                            const baseDay = parseFloat(log.workDays) || 1;
                            h = (baseDay * 8) + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                        }
                        let days = parseFloat(log.workDays) || 0;
                        if (days === 0 && h > 0) days = h / 8;

                        if (!isNaN(h) && (h > 0 || days > 0)) {
                            y_days += days; y_hours += h;
                        }
                    }
                });

                return { list, m_days, m_hours, y_days, y_hours };
            }, [dailyLogs, dailyWorkerNames, year, month, useMeal, mealData, mealPrice]);


            // 4. 최종 합계 (Summary 객체)
            const summary = {
                m_work: statsData.reduce((a, c) => a + c.m.work, 0),
                y_work: statsData.reduce((a, c) => a + c.y.work, 0),
                m_over: statsData.reduce((a, c) => a + c.m.over, 0),
                y_over: statsData.reduce((a, c) => a + c.y.over, 0),
                m_short: statsData.reduce((a, c) => a + c.m.short, 0),
                y_short: statsData.reduce((a, c) => a + c.y.short, 0),
                m_holiD: statsData.reduce((a, c) => a + c.m.holiD, 0),
                m_holiH: statsData.reduce((a, c) => a + c.m.holiH, 0),
                y_holiD: statsData.reduce((a, c) => a + c.y.holiD, 0),
                y_holiH: statsData.reduce((a, c) => a + c.y.holiH, 0),
                unused: statsData.reduce((a, c) => a + (c.leaveTotal - c.leaveUsed), 0),
                totalGrant: statsData.reduce((a, c) => a + c.leaveTotal, 0),
                totalUsed: statsData.reduce((a, c) => a + c.leaveUsed, 0),
                totalMeal: statsData.reduce((a, c) => a + (c.m_meal || 0), 0) + (dailySummary.list.reduce((a, c) => a + (c.m_meal || 0), 0))
            };

            const burnRate = summary.totalGrant > 0 ? ((summary.totalUsed / summary.totalGrant) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-6 animate-fade-in">
                    {/* 상단 카드 영역 */}
                    <div className={`grid grid-cols-2 md:grid-cols-3 ${useMeal ? 'lg:grid-cols-7' : 'lg:grid-cols-6'} gap-3 text-center`}>
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-indigo-500">
                            <div className="text-[10px] font-bold text-gray-400">총 근무일</div>
                            <div className="text-xl font-black">{summary.m_work}일</div>
                            <div className="text-[10px] text-indigo-500 bg-indigo-50 rounded">누적: {summary.y_work}일</div>
                        </div>
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-blue-500">
                            <div className="text-[10px] font-bold text-gray-400">연장 근무</div>
                            <div className="text-xl font-black text-blue-600">{fmt(summary.m_over)}h</div>
                            <div className="text-[10px] text-blue-500 bg-blue-50 rounded">누적: {fmt(summary.y_over)}h</div>
                        </div>
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-purple-500">
                            <div className="text-[10px] font-bold text-gray-400">특근 (월간 합계)</div>
                            <div className="text-sm font-black text-purple-600 mt-1 flex flex-col items-center justify-center h-8 leading-none">
                                <span>{summary.m_holiD}일 / {fmt(summary.m_holiH)}h</span>
                                <span className="text-[11px] font-bold">({formatManDay(summary.m_holiD, summary.m_holiH)} 공수)</span>
                            </div>
                            <div className="text-[10px] text-purple-500 font-bold mt-1 bg-purple-50 py-0.5 rounded px-1">누적: {formatManDay(summary.y_holiD, summary.y_holiH)}공수</div>
                        </div>
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-orange-500">
                            <div className="text-[10px] font-bold text-gray-400">평일조퇴 시간</div>
                            <div className="text-xl font-black text-orange-600">{fmt(summary.m_short)}h</div>
                            <div className="text-[10px] text-orange-600 bg-orange-50 rounded">누적: {fmt(summary.y_short)}h</div>
                        </div>

                        {/* 미사용 연차 및 소진율 */}
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-emerald-600">
                            <div className="text-[10px] font-bold text-gray-400">미사용 연차</div>
                            <div className="text-xl font-black text-emerald-700">{fmt(summary.unused)}일</div>
                            <div className="text-[10px] text-emerald-600 bg-emerald-50 rounded font-bold">전사 소진율: {burnRate}%</div>
                        </div>

                        {/* 일용직 공수 */}
                        <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-orange-400">
                            <div className="text-[10px] font-bold text-gray-400 text-center">일용직 공수 (시간)</div>
                            <div className="text-xl font-black text-orange-600 flex items-baseline justify-center gap-1">
                                <span>{fmt4(dailySummary.m_days)}공수</span>
                                <span className="text-xs text-orange-400 font-bold">({fmt(dailySummary.m_hours)}h)</span>
                            </div>
                            <div className="text-[10px] text-orange-500 bg-orange-50 rounded px-1 mt-1 font-bold text-center">
                                누적: {fmt4(dailySummary.y_days)}공수 ({fmt(dailySummary.y_hours)}h)
                            </div>
                        </div>

                        {useMeal && (
                            <div className="bg-white p-3 rounded-lg shadow-sm border-t-4 border-green-600 animate-fade-in">
                                <div className="text-[10px] font-bold text-gray-400">총 식대 ({month}월)</div>
                                <div className="text-lg font-black text-green-700 tracking-tight">
                                    {(mealStats.monthTotal / 10000).toFixed(1)}<span className="text-xs">만원</span>
                                </div>
                                <div className="text-[10px] text-green-600 bg-green-50 rounded px-1 mt-1 truncate" title={`연간 누적: ${mealStats.yearTotal.toLocaleString()}원`}>
                                    누적: {(mealStats.yearTotal / 10000).toFixed(0)}만원
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 정규직 테이블 */}
                    <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                        <div className="p-3 bg-gray-50 border-b font-bold text-gray-700 flex items-center gap-2 text-sm">
                            <Icon name="staff" /> 정규직/계약직 근태 및 연차 현황
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs text-center border-collapse">
                                <thead>
                                    <tr className="bg-gray-100/80 text-gray-500 font-bold border-b">
                                        <th className="p-2 sticky-col border-r w-48 text-left pl-4" rowSpan="2">성명 / 연차</th>
                                        <th className="p-1 border-r bg-blue-50/30 text-blue-700" colSpan={useMeal ? 9 : 7}>월 실적</th>
                                        <th className="p-1 bg-indigo-50/30 text-indigo-700" colSpan="5">연 누적 (YTD)</th>
                                    </tr>
                                    <tr className="bg-gray-50 text-gray-500 font-bold border-b text-[10px]">
                                        <th className="p-1 border-r">근무(일)</th>
                                        <th className="p-1 border-r">연장(H)</th>
                                        <th className="p-1 border-r">특근(일)</th>
                                        <th className="p-1 border-r">특근(H)</th>
                                        <th className="p-1 border-r text-purple-600 bg-purple-50/20">특근(공수)</th>
                                        <th className="p-1 border-r text-orange-600">평일조퇴(H)</th>
                                        <th className="p-1 border-r text-red-500 bg-red-50/20">결근(D)</th>

                                        {useMeal && <th className="p-1 border-r text-green-700 bg-green-50/30">식대(원)</th>}
                                        {useMeal && <th className="p-1 border-r text-green-700 bg-green-50/30">식수</th>}

                                        <th className="p-1 border-r">누적연장</th>
                                        <th className="p-1 border-r text-purple-600 bg-purple-50/20">누적특근(공수)</th>
                                        <th className="p-1 border-r text-orange-600">평일누적조퇴</th>
                                        <th className="p-1 border-r">누적일수</th>
                                        <th className="p-1 text-red-500 bg-red-50/20">누적결근</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {statsData.map(u => {
                                        const total = Math.ceil(u.leaveTotal);
                                        const used = Math.ceil(u.leaveUsed);
                                        const remain = u.leaveTotal - u.leaveUsed;
                                        return (
                                            <tr key={u.id} className="hover:bg-gray-50/50">
                                                <td className="p-2 pl-4 text-left border-r bg-white sticky left-0 z-10">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-bold text-gray-900">{u.name} <span className="text-[9px] text-gray-400 font-normal">{u.rank}</span></span>
                                                    </div>
                                                    <div className="text-[9px] text-gray-500 leading-tight">
                                                        <span className="mr-1">발생:{fmt(u.leaveTotal)}</span>
                                                        <span className="mr-1 text-gray-400">|</span>
                                                        <span className="mr-1">사용:{fmt(u.leaveUsed)}</span>
                                                        <span className="mr-1 text-gray-400">|</span>
                                                        <span className="font-bold text-emerald-600">잔여:{fmt(remain)}</span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-0.5 mt-1 opacity-50">
                                                        {total > 0 ? Array.from({ length: total }).map((_, i) => (
                                                            <div key={i} className={`h-1 w-1 rounded-full ${i < used ? 'bg-red-400' : 'bg-gray-300'}`}></div>
                                                        )) : null}
                                                    </div>
                                                </td>
                                                <td className="p-1 font-bold">{u.m.work}</td>
                                                <td className="p-1 text-blue-600">{fmt(u.m.over)}</td>
                                                <td className="p-1 text-gray-400">{u.m.holiD || '-'}</td>
                                                <td className="p-1 text-purple-600 font-bold">{fmt(u.m.holiH)}</td>
                                                <td className="p-1 text-purple-700 font-bold bg-purple-50/10">{formatManDay(u.m.holiD, u.m.holiH)}</td>
                                                <td className="p-1 border-r text-orange-600">{fmt(u.m.short)}</td>
                                                <td className="p-1 border-r text-red-500 font-bold bg-red-50/10">{u.m.absent}</td>

                                                {useMeal && <td className="p-1 border-r text-green-700 font-bold bg-green-50/10">{(u.m_meal / 10000).toFixed(1)}만</td>}
                                                {useMeal && <td className="p-1 border-r text-green-600 text-[9px] bg-green-50/10">{(u.m_meal / mealPrice).toFixed(0)}</td>}

                                                <td className="p-1 text-indigo-700 bg-indigo-50/10">{fmt(u.y.over)}</td>
                                                <td className="p-1 text-purple-700 bg-purple-50/10">{formatManDay(u.y.holiD, u.y.holiH)}</td>
                                                <td className="p-1 text-orange-700 bg-orange-50/10">{fmt(u.y.short)}</td>
                                                <td className="p-1 font-bold text-gray-800 bg-gray-50/30">{u.y.work}</td>
                                                <td className="p-1 font-bold text-red-500 bg-red-50/10">{u.y.absent}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 일용직 리포트 */}
                    <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                        <div className="p-3 bg-orange-50 border-b font-bold text-orange-800 flex items-center gap-2 text-sm">
                            <Icon name="worker" /> 일용직 근무 리포트 ({month}월)
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs text-center border-collapse">
                                <thead className="bg-gray-50 text-gray-500 font-bold border-b">
                                    <tr>
                                        <th className="p-2 text-left pl-6">성명</th>
                                        <th className="p-2">근무 일수 (공수)</th>
                                        <th className="p-2">총 근무 시간</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {dailySummary.list.length === 0 ? (
                                        <tr><td colSpan="3" className="p-6 text-gray-400">기록이 없습니다.</td></tr>
                                    ) : dailySummary.list.map((w, i) => (
                                        <tr key={i} className="hover:bg-orange-50/30">
                                            <td className="p-2 pl-6 text-left font-bold text-gray-800">{w.name}</td>
                                            <td className="p-2 font-bold text-gray-600">{fmt4(w.workDays)}공수</td>
                                            <td className="p-2 font-bold text-orange-600">{fmt(w.totalHours)}시간</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // [신규 컴포넌트] 구간 비교 분석 시스템 (Seasonal Insight) - [최종] 상세 테이블 분석 모드
        function SeasonalAnalysis({ users, attendanceLogs, dailyLogs, mealData, mealConfigMap }) {
            const today = new Date();
            const thisYear = today.getFullYear();
            const lastYear = thisYear - 1;

            const [rangeA, setRangeA] = React.useState({ start: `${thisYear}-01`, end: `${thisYear}-03` });
            const [rangeB, setRangeB] = React.useState({ start: `${lastYear}-01`, end: `${lastYear}-03` });
            const [loading, setLoading] = React.useState(false);
            const [result, setResult] = React.useState(null);

            // [수정] 시즌 비교 시 두 기간 중 하나라도 식대 사용 설정이 켜져 있는지 확인
            const useMeal = React.useMemo(() => {
                const checkRange = (startStr, endStr) => {
                    let curr = new Date(startStr + "-01");
                    const end = new Date(endStr + "-01");
                    while (curr <= end) {
                        const ym = `${curr.getFullYear()}-${String(curr.getMonth() + 1).padStart(2, '0')}`;
                        if (mealConfigMap && mealConfigMap[`cfg_${ym}`] && mealConfigMap[`cfg_${ym}`].use) {
                            return true;
                        }
                        curr.setMonth(curr.getMonth() + 1);
                    }
                    return false;
                };
                return checkRange(rangeA.start, rangeA.end) || checkRange(rangeB.start, rangeB.end);
            }, [rangeA, rangeB, mealConfigMap]);

            // [핵심] 상세 데이터 집계 함수
            const aggregateRange = (startStr, endStr) => {
                // 초기값
                const agg = {
                    regGongsu: 0, dailyGongsu: 0, totalGongsu: 0,
                    totalOver: 0, totalShort: 0,
                    holidayWorkDays: 0, // 휴일 가동일수 (하루라도 출근했으면 1일)
                    uniqueWorkDates: new Set(), // 실제 가동일수 계산용
                    totalMeal: 0,
                    avgHeadcount: 0
                };

                // 날짜 범위 체크 헬퍼
                const isTarget = (dateStr) => {
                    if (!dateStr) return false;
                    const ym = dateStr.substring(0, 7);
                    return ym >= startStr && ym <= endStr;
                };

                // 가동일 체크용 임시 Set
                const holidayWorkDates = new Set();

                // 1. 정규직 집계
                (attendanceLogs || []).forEach(log => {
                    if (isTarget(log.date) && log.status !== 'absent' && log.status !== 'vacation') {
                        // 공수 계산 (기본 1일)
                        agg.regGongsu += 1;
                        agg.uniqueWorkDates.add(log.date);

                        // 연장/조퇴
                        agg.totalOver += (parseFloat(log.overtime) || 0);
                        agg.totalShort += (parseFloat(log.short_time) || 0);

                        // 휴일 작업 여부 (status에 holiday 포함되거나, 일요일 등 체크 로직 필요하나 여기선 status 의존)
                        if (log.status && (log.status.includes('holiday') || new Date(log.date).getDay() === 0)) {
                            holidayWorkDates.add(log.date);
                        }
                    }
                });

                // 2. 일용직 집계
                (dailyLogs || []).forEach(log => {
                    if (isTarget(log.date) && log.status !== 'absent') {
                        // 공수 계산 (workDays가 있으면 쓰고, 없으면 시간/8)
                        let d = parseFloat(log.workDays) || 0;
                        if (d === 0) {
                            let h = 0;
                            if (log.hours) h = parseFloat(log.hours);
                            else h = (8 + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0));
                            d = h / 8;
                        }
                        agg.dailyGongsu += d;
                        agg.uniqueWorkDates.add(log.date);

                        agg.totalOver += (parseFloat(log.overtime) || 0);

                        // 휴일 작업 체크
                        if (log.status && (log.status.includes('holiday') || new Date(log.date).getDay() === 0)) {
                            holidayWorkDates.add(log.date);
                        }
                    }
                });

                // 3. 식대 집계
                let totalCost = 0;

                // Helper to get meal setting for a month
                const getMealSetting = (ym) => {
                    return mealConfigMap && mealConfigMap[`cfg_${ym}`] ? mealConfigMap[`cfg_${ym}`] : { use: false, price: 5000 };
                };

                // Group meal days by month to apply correct price and 'use' setting
                const mealDaysByMonth = {};

                // 정직원 식수 계산
                attendanceLogs.forEach(log => {
                    const ym = log.date.substring(0, 7);
                    if (ym >= startStr && ym <= endStr) {
                        const setting = getMealSetting(ym);
                        if (setting.use) {
                            if (log.status !== 'absent' && log.status !== 'vacation' && log.status !== 'half') {
                                if (Number(log.is_meal ?? 1) !== 0) {
                                    mealDaysByMonth[ym] = (mealDaysByMonth[ym] || 0) + 1;
                                }
                            }
                        }
                    }
                });

                // 일용직 식수 계산
                dailyLogs.forEach(log => {
                    const ym = log.date.substring(0, 7);
                    if (ym >= startStr && ym <= endStr) {
                        const setting = getMealSetting(ym);
                        if (setting.use) {
                            if (log.status !== 'absent') {
                                let h = log.hours ? parseFloat(log.hours) : 0;
                                if (!h) {
                                    const bd = parseFloat(log.workDays) || 1;
                                    h = (bd * 8) + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                                }
                                let days = parseFloat(log.workDays) || 0;
                                if (days === 0 && h > 0) days = h / 8;
                                if (!isNaN(h) && (h > 0 || days > 0)) {
                                    if (Number(log.is_meal ?? 1) !== 0) {
                                        mealDaysByMonth[ym] = (mealDaysByMonth[ym] || 0) + days;
                                    }
                                }
                            }
                        }
                    }
                });

                // mealData 오버라이드
                if (mealData) {
                    Object.entries(mealData).forEach(([key, count]) => {
                        const parts = key.split('_');
                        if (parts.length >= 3) {
                            const type = parts[0];
                            const id = parts[1];
                            const ym = parts[2];
                            if (ym >= startStr && ym <= endStr) {
                                const setting = getMealSetting(ym);
                                if (setting.use) {
                                    let defaultCount = 0;
                                    if (type === 'u') {
                                        attendanceLogs.forEach(log => {
                                            if (log.user_id === id && log.date.startsWith(ym)) {
                                                if (log.status !== 'absent' && log.status !== 'vacation' && log.status !== 'half') {
                                                    if (Number(log.is_meal ?? 1) !== 0) defaultCount++;
                                                }
                                            }
                                        });
                                    } else {
                                        dailyLogs.forEach(log => {
                                            if (log.worker_name === id && log.date.startsWith(ym)) {
                                                if (log.status !== 'absent') {
                                                    let h = log.hours ? parseFloat(log.hours) : 0;
                                                    if (!h) {
                                                        const bd = parseFloat(log.workDays) || 1;
                                                        h = (bd * 8) + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0);
                                                    }
                                                    let days = parseFloat(log.workDays) || 0;
                                                    if (days === 0 && h > 0) days = h / 8;
                                                    if (!isNaN(h) && (h > 0 || days > 0)) {
                                                        if (Number(log.is_meal ?? 1) !== 0) defaultCount += days;
                                                    }
                                                }
                                            }
                                        });
                                    }
                                    mealDaysByMonth[ym] = (mealDaysByMonth[ym] || 0) - defaultCount + count;
                                }
                            }
                        }
                    });
                }

                Object.entries(mealDaysByMonth).forEach(([ym, count]) => {
                    const setting = getMealSetting(ym);
                    totalCost += count * Number(setting.price);
                });

                agg.totalMeal = totalCost;

                // [최종 계산]
                agg.totalGongsu = agg.regGongsu + agg.dailyGongsu;
                agg.holidayWorkDays = holidayWorkDates.size;

                // 일평균 출력 인원 = 총 공수 / 실제 가동일수
                const operatingDays = agg.uniqueWorkDates.size || 1;
                agg.avgHeadcount = (agg.totalGongsu / operatingDays).toFixed(1);

                // 일용직 비율
                agg.dailyRatio = agg.totalGongsu > 0 ? ((agg.dailyGongsu / agg.totalGongsu) * 100).toFixed(1) : 0;

                return agg;
            };

            const runAnalysis = () => {
                setLoading(true);
                setTimeout(() => {
                    const resA = aggregateRange(rangeA.start, rangeA.end);
                    const resB = aggregateRange(rangeB.start, rangeB.end);
                    setResult({ A: resA, B: resB });
                    setLoading(false);
                }, 100);
            };

            // 증감 표시 컴포넌트
            const DiffCell = ({ valA, valB, type = 'normal', suffix = '' }) => {
                if (!valB || valB === 0) return <span className="text-gray-400 text-xs">-</span>;
                const diff = valA - valB;
                const pct = ((diff / valB) * 100).toFixed(1);

                // type: 'cost'(비용/연장) -> 줄어들면(음수) 좋음(파랑)
                // type: 'efficiency'(효율/매출) -> 늘어나면(양수) 좋음(파랑)
                // type: 'neutral'(중립) -> 그냥 증감만 표시

                let colorClass = "text-gray-500";
                let icon = diff > 0 ? '▲' : '▼';

                if (diff !== 0) {
                    if (type === 'cost') colorClass = diff > 0 ? "text-red-600" : "text-blue-600";
                    else if (type === 'efficiency') colorClass = diff > 0 ? "text-blue-600" : "text-red-600";
                    else colorClass = diff > 0 ? "text-orange-600" : "text-gray-600";
                }

                return (
                    <div className={`text-xs font-bold ${colorClass}`}>
                        {diff === 0 ? '-' : `${icon} ${Math.abs(diff).toLocaleString()}${suffix} (${Math.abs(pct)}%)`}
                    </div>
                );
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    {/* 1. 컨트롤 패널 */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-indigo-100">
                        <div className="flex flex-col md:flex-row gap-6 items-end justify-between">
                            <div className="flex gap-6 w-full">
                                <div className="flex-1">
                                    <label className="block text-xs font-bold text-indigo-600 mb-1">🟦 분석 대상 (Target)</label>
                                    <div className="flex items-center gap-2">
                                        <input type="month" value={rangeA.start} onChange={e => setRangeA({ ...rangeA, start: e.target.value })} className="border rounded p-1.5 text-sm w-full font-bold text-indigo-700 bg-indigo-50" />
                                        <span className="text-gray-400">~</span>
                                        <input type="month" value={rangeA.end} onChange={e => setRangeA({ ...rangeA, end: e.target.value })} className="border rounded p-1.5 text-sm w-full font-bold text-indigo-700 bg-indigo-50" />
                                    </div>
                                </div>
                                <div className="flex-1">
                                    <label className="block text-xs font-bold text-gray-500 mb-1">⬜ 비교 기준 (Baseline)</label>
                                    <div className="flex items-center gap-2">
                                        <input type="month" value={rangeB.start} onChange={e => setRangeB({ ...rangeB, start: e.target.value })} className="border rounded p-1.5 text-sm w-full text-gray-600 bg-gray-50" />
                                        <span className="text-gray-400">~</span>
                                        <input type="month" value={rangeB.end} onChange={e => setRangeB({ ...rangeB, end: e.target.value })} className="border rounded p-1.5 text-sm w-full text-gray-600 bg-gray-50" />
                                    </div>
                                </div>
                            </div>
                            <button onClick={runAnalysis} disabled={loading} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-bold shadow-md transition-all disabled:opacity-50 whitespace-nowrap h-[38px] flex items-center gap-2">
                                {loading ? '분석 중...' : <><span>📊</span> 비교 분석 실행</>}
                            </button>
                        </div>
                    </div>

                    {/* 2. 결과 테이블 */}
                    {result && (
                        <div className="animate-fade-in">
                            <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                                <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                                    <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                        <span>📈 시즌 비교 분석 리포트</span>
                                    </h3>
                                    <span className="text-xs text-gray-400">* 데이터 기반 자동 추산치입니다.</span>
                                </div>

                                <table className="w-full text-sm text-center">
                                    <thead className="bg-gray-100 text-gray-600 font-bold">
                                        <tr>
                                            <th className="p-3 w-1/4 text-left pl-6">구분 (Category)</th>
                                            <th className="p-3 w-1/4 bg-indigo-50 text-indigo-700">🟦 분석 대상 (Target)</th>
                                            <th className="p-3 w-1/4">⬜ 비교 기준 (Base)</th>
                                            <th className="p-3 w-1/4 bg-gray-50">📊 증감 (Diff)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {/* 섹션 1: 인력 투입 */}
                                        <tr className="bg-gray-50/50"><td colSpan="4" className="py-1 px-4 text-xs font-bold text-left text-gray-400">1. 인력 투입 (Volume)</td></tr>
                                        <tr className="hover:bg-gray-50">
                                            <td className="p-3 text-left pl-6 font-bold text-gray-700">총 공수 합계</td>
                                            <td className="p-3 font-bold text-indigo-600 text-lg">{result.A.totalGongsu.toLocaleString()} <span className="text-xs font-normal">공</span></td>
                                            <td className="p-3 text-gray-600">{result.B.totalGongsu.toLocaleString()} 공</td>
                                            <td className="p-3"><DiffCell valA={result.A.totalGongsu} valB={result.B.totalGongsu} type="efficiency" suffix="공" /></td>
                                        </tr>
                                        <tr className="hover:bg-gray-50">

        // [컴포넌트 1.5] 사원 정보 상세 모달 (ESC 기능 + 캘린더 데이터 정확도 향상)
        function UserModal({ user, year, month, onClose, docs, attendanceLogs, mealData, mealPrice, useMeal, settings, certificates, onAddCertLog, onDeleteCertLog }) {
            const [activeTab, setActiveTab] = useState('basic');
            const [expandedYear, setExpandedYear] = useState(null);
            const [viewingDoc, setViewingDoc] = useState(null);

            // [증명서] 모달 상태
            const [showCertModal, setShowCertModal] = useState(false);
            const [viewingCertLog, setViewingCertLog] = useState(null);

            // [증명서] 발급 완료 핸들러
            const handleDirectIssue = (snapshot) => {
                if (onAddCertLog) {
                    onAddCertLog(snapshot);
                }
                // 발급 후 즉시 뷰어 열기
                setViewingCertLog(snapshot);
            };

            const currentMonthKey = `${year}-${String(month).padStart(2, '0')}`;
            const fmt = (n) => Number(n).toFixed(1).replace(/\.0$/, '');

            // [추가] ESC 키 이벤트 (증명서 뷰어 -> 문서 닫기 -> 모달 닫기 순서)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        if (viewingCertLog) setViewingCertLog(null);
                        else if (showCertModal) setShowCertModal(false);
                        else if (viewingDoc) setViewingDoc(null);
                        else onClose();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [onClose, viewingDoc, showCertModal, viewingCertLog]);

            // [수정] 당월 근태 통계 (수식 정밀화: 특근 공수 및 조퇴 분리)
            const monthStats = useMemo(() => {
                let s = { work: 0, over: 0, holiDays: 0, holiHours: 0, short: 0, absent: 0, mealCnt: 0, mealCost: 0, mealDays: 0 };

                const daysInMonth = new Date(year, month, 0).getDate();
                const allDates = Array.from({ length: daysInMonth }, (_, i) => i + 1);

                allDates.forEach(d => {
                    const dateStr = `${currentMonthKey}-${String(d).padStart(2, '0')}`;
                    const dateObj = new Date(dateStr);
                    const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6; // 주말 여부

                    // 해당 날짜 로그 찾기
                    const log = (attendanceLogs || []).find(l => String(l.user_id) === String(user.id) && l.date === dateStr);
                    // 해당 날짜 문서 찾기
                    const doc = (docs || []).find(doc =>
                        !doc.isDeleted && String(doc.authorId) === String(user.id) &&
                        doc.status === 'approved' &&
                        doc.startDate <= dateStr && doc.endDate >= dateStr
                    );

                    // A. 문서가 있는 경우 (우선 처리)
                    if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                        s.work++;
                        if (!log || Number(log.is_meal ?? 1) !== 0) {
                            s.mealDays++;
                        }

                        if (isWeekend) { // 주말/휴일인 경우
                            s.holiDays++;

                            if (['vacation', 'full'].includes(doc.leaveType)) {
                                // [수정] 주말 연차(종일): 1공수(8H) 인정, 추가 시간 없음. (Pass)
                            } else {
                                // 반차: (4시간 + 실근무)
                                let worked = 0;
                                if (log && log.status !== 'absent') {
                                    worked = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                                    if (worked < 0) worked = 0;
                                }
                                const totalCredit = worked + 4;

                                // [수정] 특근 시간(H)에는 8시간과의 "차이"만 반영
                                // 예: 4시간 근무 시 -> 4 - 8 = -4H (0.5공수)
                                s.holiHours += (totalCredit - 8);
                            }
                        } else {
                            // 평일인 경우
                            if (['half', 'am', 'pm'].includes(doc.leaveType)) {
                                let worked = 0;
                                if (log && log.status !== 'absent') {
                                    worked = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                                }
                                const total = worked + 4;
                                if (total < 8) s.short += (8 - total);
                                else if (total > 8) s.over += (total - 8);
                            }
                        }
                    }
                    // B. 문서 없고 로그만 있는 경우
                    else if (log) {
                        if (log.status === 'absent') {
                            s.absent++;
                        } else if (log.status !== 'vacation') {
                            s.work++;
                            if (Number(log.is_meal ?? 1) !== 0) {
                                s.mealDays++;
                            }
                            const ov = parseFloat(log.overtime) || 0;
                            const sh = parseFloat(log.short_time) || 0;
                            const isH = (log.status.includes('holiday') || (log.status === 'weekday' && isWeekend));

                            if (isH) {
                                s.holiDays++;
                                // [수정] 특근 시: 연장 더하고 조퇴 뺌
                                s.holiHours += (ov - sh);
                            } else {
                                // [수정] 평일 시: 연장과 조퇴 각각 합산
                                s.over += ov;
                                s.short += sh;
                            }
                        }
                    }
                });

                if (useMeal && mealData) {
                    const key = `${currentMonthKey}_u_${user.id}`;
                    const val = mealData[key] !== undefined ? mealData[key] : (mealData[`u_${user.id}_${currentMonthKey}`] !== undefined ? mealData[`u_${user.id}_${currentMonthKey}`] : s.mealDays);
                    s.mealCnt = val;
                    s.mealCost = s.mealCnt * mealPrice;
                }
                return s;
            }, [user, attendanceLogs, docs, currentMonthKey, mealData, useMeal, mealPrice]);



            // [수정] 연차 이력 데이터 가공 (사용 내역 매핑 & 토글 기능 복구)
            const leaveHistory = useMemo(() => {
                if (!user.joinDate && !user.join_date) return [];
                const jDate = user.joinDate || user.join_date;

                // 1. 연차 발생 리스트 계산
                const grantList = typeof calculateGrantHistory === 'function' ? calculateGrantHistory(jDate) : [];

                // 2. 해당 유저의 전체 사용 휴가 문서 가져오기 (연도별 그룹핑을 위해 미리 필터링)
                const userDocs = (docs || []).filter(d =>

                    // 4. [핵심] 사용 내역 표시 위치 결정 (중복 방지)
                    // 한 연도에 '월차', '비례' 등이 섞여 있을 때, 어디에 사용 내역을 보여줄지 결정합니다.

            const minutes = minuteMap && minuteMap[date] ? minuteMap[date] : [];
            const [viewType, setViewType] = React.useState('location'); // 'location' | 'person'

            return (

                            ) : (

                                    {minutes.map((m, idx) => {
                                        // 장소 및 인원 그룹핑
                                        let assignments = {};
                                        try {
                                            assignments = typeof m.assignments === 'string' ? JSON.parse(m.assignments || '{}') : (m.assignments || {});
                                        } catch (e) {
                                            assignments = {};
                                        }

                                        const locMap = {};
                                        const userMap = {};

                                        Object.entries(assignments).forEach(([uid, locs]) => {
                                            const u = (users || []).find(x => String(x.id) === String(uid));
                                            const userName = u ? `${u.name} ${u.rank}` : `사원(${uid})`;
                                            const locArray = Array.isArray(locs) ? locs : [locs];

                                            // 인원별 세팅
                                            userMap[userName] = locArray.filter(Boolean);

                                            locArray.forEach(loc => {

        }


        // [컴포넌트 2] 메인 뷰 (연차 자동 연동 + 공가/병가 시각적 표시)
        function AttendanceView({ users, attendanceLogs, year, month, setYear, setMonth, holidays, customHolidays, attendanceNotes, dailyLogs, dailyWorkerNames, docs, mealConfigMap, mealData, settings, minuteMap, certificates, onAddCertLog, onDeleteCertLog }) {
            const [showDash, setShowDash] = useState(false);
            const [statsMode, setStatsMode] = React.useState('monthly');
            const [selectedUser, setSelectedUser] = useState(null);
            const [isTransposed, setIsTransposed] = useState(false);

            // [증명서 대장] 상태
            const [showCertHistory, setShowCertHistory] = useState(false);
            const [viewCertLog, setViewCertLog] = useState(null);
            const [deleteTargetCertId, setDeleteTargetCertId] = useState(null);

            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            // [추가] 회의록 조회를 위한 선택된 날짜 상태
            const [selectedDateMinute, setSelectedDateMinute] = useState(null);
            const [mobilePeriod, setMobilePeriod] = useState(0);

            const daysInMonth = new Date(year, month, 0).getDate();
            const dates = Array.from({ length: daysInMonth }, (_, i) => i + 1);
            const currentMonthKey = `${year}-${String(month).padStart(2, '0')}`;
            const todayKey = new Date().toISOString().split('T')[0];

            /* 식대 설정 */
            const currentMealConfig = (mealConfigMap && mealConfigMap[`cfg_${currentMonthKey}`]) || { use: false, price: 5000 };
            const useMeal = currentMealConfig.use;
            const mealPrice = Number(currentMealConfig.price);
            // ▼▼▼ [여기 추가] 보고서 화면을 킬지 말지 결정하는 스위치 ▼▼▼
            const [showReport, setShowReport] = React.useState(false);



            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                const today = new Date();
                if (today.getFullYear() === year && (today.getMonth() + 1) === month) {
                    const d = today.getDate();
                    if (d <= 10) setMobilePeriod(0);
                    else if (d <= 20) setMobilePeriod(1);
                    else setMobilePeriod(2);
                } else {
                    setMobilePeriod(0);
                }
                return () => window.removeEventListener('resize', handleResize);
            }, [year, month]);

            const visibleDates = useMemo(() => {
                if (!isMobile || isTransposed) return dates;
                if (mobilePeriod === 0) return dates.filter(d => d <= 10);
                if (mobilePeriod === 1) return dates.filter(d => d > 10 && d <= 20);
                return dates.filter(d => d > 20);
            }, [isMobile, mobilePeriod, dates, isTransposed]);

            const logMap = useMemo(() => {
                const map = {};
                (attendanceLogs || []).forEach(log => { map[`user_${String(log.user_id)}_${log.date}`] = log; });
                (dailyLogs || []).forEach(log => {
                    const name = String(log.workerName || log.worker_name || "").trim();
                    map[`daily_${name}_${log.date}`] = log;
                });
                return map;
            }, [attendanceLogs, dailyLogs]);



            // [신규] 연차/반차 문서 매핑 (자동 연동용)
            const docMap = useMemo(() => {
                const map = {};
                (docs || []).forEach(doc => {
                    if (doc.status !== 'approved' || doc.isDeleted) return;
                    const start = new Date(doc.startDate);
                    const end = new Date(doc.endDate);
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        const dateStr = d.toISOString().split('T')[0];
                        map[`user_${doc.authorId}_${dateStr}`] = doc;
                    }
                });
                return map;
            }, [docs]);

            const handlePrevMonth = () => { if (month === 1) { setYear(y => y - 1); setMonth(12); } else { setMonth(m => m - 1); } };
            const handleNextMonth = () => { if (month === 12) { setYear(y => y + 1); setMonth(1); } else { setMonth(m => m + 1); } };

            // [수정] 휴일 체크 함수 (토요일 포함)
            const checkIsHoliday = (dateStr) => {
                const dateObj = new Date(dateStr);
                const day = dateObj.getDay();
                // 일요일(0) 또는 토요일(6)이면 휴일
                if (day === 0 || day === 6) return true;

                if (holidays && holidays[dateStr]) return true;
                if (customHolidays && customHolidays[dateStr]) return true;
                const [y, m, d] = dateStr.split('-').map(Number);
                if ((m === 1 && d === 1) || (m === 3 && d === 1) || (m === 5 && d === 5) || (m === 6 && d === 6) || (m === 8 && d === 15) || (m === 10 && d === 3) || (m === 10 && d === 9) || (m === 12 && d === 25)) return true;
                return false;
            };

            // [수정 1] 유저 필터링 (입사 월 이전에는 명단에서 아예 제외)
            const filteredUsers = useMemo(() => {
                return users.filter(u => {
                    if (u.id === 'admin' || u.exclude_attendance) return false;

                    // 현재 조회 중인 년-월 (예: "2025-08")
                    const viewMonthStr = `${year}-${String(month).padStart(2, '0')}`;
                    const joinDate = u.joinDate || u.join_date; // 예: "2025-08-20"

                    // [핵심] 조회 월이 입사 월보다 과거면 숨김 ("2025-07" < "2025-08")
                    if (joinDate && viewMonthStr < joinDate.substring(0, 7)) return false;

                    // 퇴사 월 이후면 숨김
                    if (u.resignation_date && viewMonthStr > u.resignation_date.substring(0, 7)) return false;

                    return true;
                }).sort((a, b) => (a.sortOrder || 9999) - (b.sortOrder || 9999));
            }, [users, year, month]);

            const activeWorkers = useMemo(() => {
                if (!dailyWorkerNames) return [];
                const names = dailyWorkerNames[currentMonthKey] || [];
                return Array.from(new Set(names)).sort();
            }, [dailyWorkerNames, currentMonthKey]);

            const transposedColumns = useMemo(() => {
                const regular = filteredUsers.map(u => ({ ...u, type: 'user', label: u.name }));
                const daily = activeWorkers.map(name => ({ id: name, name: name, type: 'daily', label: name, isDaily: true }));
                return [...regular, ...daily];
            }, [filteredUsers, activeWorkers]);

            const dailySummary = useMemo(() => {
                const monthKey = `${year}-${String(month).padStart(2, '0')}`;
                const workers = (dailyWorkerNames && dailyWorkerNames[monthKey]) || [];
                let m_days = 0;
                const list = workers.map(name => {
                    let dSum = 0; let hSum = 0;
                    (dailyLogs || []).forEach(log => {
                        const logName = String(log.workerName || log.worker_name || "").trim();
                        if (logName !== name.trim() || !log.date || !log.date.startsWith(monthKey)) return;
                        let h = log.hours ? parseFloat(log.hours) : (log.status !== 'absent' ? (8 + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0)) : 0);
                        if (h > 0) { hSum += h; dSum += (h / 8); }
                    });
                    m_days += dSum;
                    return { name, workDays: dSum, totalHours: hSum };
                });
                return { list, m_days };
            }, [dailyLogs, dailyWorkerNames, year, month]);

            // [수정] 통계 집계 (특근 공수 계산 정밀화: (연장-조퇴) 반영)
            const getSummary = (id, type = 'user') => {
                let s = { work: 0, holiD: 0, holiOver: 0, holiShort: 0, over: 0, short: 0, absent: 0, mealDays: 0 };

                dates.forEach(d => {
                    const ds = `${currentMonthKey}-${String(d).padStart(2, '0')}`;
                    const log = logMap[`${type}_${id}_${ds}`];
                    const doc = (type === 'user') ? docMap[`user_${id}_${ds}`] : null;

                    const isRed = checkIsHoliday(ds); // 주말 또는 공휴일 여부

                    // 1. 연차/반차 문서가 있는 경우
                    if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                        s.work++; // 근무일수 인정
                        if (!log || Number(log.is_meal ?? 1) !== 0) {
                            s.mealDays++;
                        }

                        if (isRed) {
                            s.holiD++; // 특근 일수 +1

                            if (['vacation', 'full'].includes(doc.leaveType)) {
                                // 연차(종일): 8시간 인정 (변동 없음 -> s.holiH 변동 없음)
                                // 결과: 1일 + 0H = 1공수
                            } else {
                                // 반차: (4시간 + 실근무) 계산
                                let realWork = 0;
                                if (log && log.status !== 'absent') {
                                    // 반차의 short_time은 4시간 기준 미달분이므로
                                    // 실근무 = 4 - 조퇴 + 연장
                                    realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                                    if (realWork < 0) realWork = 0;
                                }
                                const totalCredit = 4 + realWork;

                                // [수정] 8시간과의 차이(Net)만 holiH에 반영
                                // 예: 4시간 근무 -> 4 - 8 = -4H (0.5공수)
                                // 예: 10시간 근무 -> 10 - 8 = +2H (1.25공수)
                                if (totalCredit > 8) s.holiOver += (totalCredit - 8);
                                else if (totalCredit < 8) s.holiShort += (8 - totalCredit);

                            }
                        } else {
                            // 평일 반차 (연장/조퇴만 별도 집계)
                            let realWork = 0;
                            if (log && log.status !== 'absent') {
                                realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                            }
                            const totalCredit = realWork + 4;

                            if (totalCredit < 8) s.short += (8 - totalCredit);
                            else if (totalCredit > 8) s.over += (totalCredit - 8);
                        }
                        return;
                    }

                    // 2. 로그 기반 계산 (문서 없음)
                    if (!log) return;

                    const over = parseFloat(log.overtime) || 0;
                    const short = parseFloat(log.short_time) || 0;

                    if (log.status === 'absent') {
                        s.absent++;
                    } else if (log.status !== 'vacation' && log.status !== 'half') {
                        const isH = (log.status.includes('holiday') || (log.status === 'weekday' && isRed));
                        s.work++;
                        if (Number(log.is_meal ?? 1) !== 0) {
                            s.mealDays++;
                        }

                        if (isH) {
                            s.holiD++;
                            // [수정] 특근 공수 계산 시: 연장 시간은 더하고(+), 조퇴 시간은 뺌(-)
                            // 공식: 1공수(8H) + (over - short)/8
                            s.holiOver += over;
                            s.holiShort += short;

                        } else {
                            s.over += over;
                            s.short += short;
                        }
                    }
                });
                return s;
            };



            const downloadExcel = async () => {
                // 1. 워크북 생성
                const workbook = new ExcelJS.Workbook();

                // =========================================================================
                // [0] 헬퍼 함수 정의 (참조 오류 방지)
                // =========================================================================

                // 1. 셀 텍스트 생성 (수정: 문서 우선 확인 및 반차 변동 표기)
                const getCellText = (log, user, dateStr) => {
                    // 퇴사자 처리
                    if (user) {
                        const joinDate = user.joinDate || user.join_date;
                        const resignDate = user.resignation_date || user.resignation_date; // 필드명 보정
                        if (joinDate && dateStr < joinDate) return null;
                        if (resignDate && dateStr > resignDate) return null;
                    }

                    // [우선순위 1] 결재된 문서(Doc) 확인
                    const doc = user ? docMap[`user_${user.id}_${dateStr}`] : null;

                    if (doc && ['vacation', 'full'].includes(doc.leaveType)) {
                        return '휴'; // 종일 연차
                    }

                    if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                        // 반차: 기본 4시간 인정 + 실근무시간(4 - 조퇴 + 연장)
                        // ※ 출근부 화면의 로직과 동일하게 맞춤
                        let realWork = 0;
                        if (log && log.status !== 'absent') {
                            // 로그상의 short_time은 '반차 근무시간(4h)' 기준의 미달 시간임
                            realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                        }

                        // 총 인정 시간 = 반차 4h + 실근무
                        const totalCredit = 4 + realWork;

                        // 1. 정상 근무(8h) -> "반"
                        if (totalCredit === 8) return '반';

                        // 2. 변동 발생 -> "반+N" or "반-N"
                        let sub = '';
                        if (totalCredit > 8) sub = `+${parseFloat((totalCredit - 8).toFixed(1))}`;
                        else if (totalCredit < 8) sub = `-${parseFloat((8 - totalCredit).toFixed(1))}`;

                        return '반' + sub;
                    }
                    // [우선순위 2] 출퇴근 기록(Log) 확인
                    if (!log) return null;

                    if (log.status === 'absent') return '결근';
                    if (log.status === 'vacation') return '휴'; // 문서 없이 로그만 있는 경우

                    // 일반 근무 / 특근
                    const isHoliday = log.status && (log.status.includes('holiday') || log.status === 'holiday_work');
                    let sub = '';
                    const over = parseFloat(log.overtime) || 0;
                    const short = parseFloat(log.short_time) || 0;

                    if (over > 0) sub += `+${over}`;
                    if (short > 0) sub += `-${short}`;

                    return (isHoliday ? '특' : 'O') + sub + (Number(log.is_meal ?? 1) === 0 ? '(X식)' : '');
                };

                // 2. 식대 계산
                const getMealCountSafe = (s, target, type) => {
                    let key = (type === 'user') ? `${currentMonthKey}_u_${target.id}` : `${currentMonthKey}_d_${target}`;
                    if (mealData && mealData[key] !== undefined) return mealData[key];
                    return s ? s.mealDays : 0;
                };

                // 3. 휴일 조퇴 계산 (특근 조퇴용)
                const getHolidayShortTime = (target, type) => {
                    let sum = 0;
                    dates.forEach(d => {
                        const ds = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const isRed = checkIsHoliday(ds) || new Date(year, month - 1, d).getDay() === 0;
                        const isSat = new Date(year, month - 1, d).getDay() === 6;
                        if (isRed || isSat) {
                            let log = (type === 'user') ? logMap[`user_${target.id}_${ds}`] : logMap[`daily_${target.trim()}_${ds}`];
                            if (log && log.short_time) sum += parseFloat(log.short_time);
                        }
                    });
                    return sum;
                };


                // =========================================================================
                // [1] 데이터 정밀 집계 (Dashboard Data Aggregation)
                // =========================================================================

                // 집계용 객체 초기화
                const stats = {
                    regular: {
                        count: filteredUsers.length, workDays: 0, realTime: 0, totalGongsu: 0,
                        weekday: { days: 0, basic: 0, over: 0, short: 0, absent: 0, gongsu: 0 },
                        holiday: { days: 0, basic: 0, over: 0, short: 0, gongsu: 0 }
                    },
                    daily: {
                        count: activeWorkers.length, workDays: 0, realTime: 0, totalGongsu: 0
                    }
                };

                // 통합 집계 함수 (수정: 문서 기반 근무 인정 로직 추가)
                const aggregateStats = (target, type) => {
                    const dest = (type === 'user') ? stats.regular : stats.daily;

                    dates.forEach(d => {
                        const ds = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        let log = (type === 'user') ? logMap[`user_${target.id}_${ds}`] : logMap[`daily_${target.trim()}_${ds}`];
                        let doc = (type === 'user') ? docMap[`user_${target.id}_${ds}`] : null;

                        // 일별 집계 변수
                        let d_work = 0;      // 근무일수 (0 or 1)
                        let dayRealTime = 0; // 실근무시간
                        let d_basic = 0;     // 기본시간

                            if (log && log.status !== 'absent') {
                                // 반차 사용일의 log.short_time은 4시간 기준 미달분임
                                realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);

                            dayRealTime = 4 + realWork;

                                d_basic = 8;
                                d_over = dayRealTime - 8; // 8시간 초과분은 연장
                            } else {
                                d_basic = 8;
                                d_short = 8 - dayRealTime; // 8시간 미달분은 조퇴
                            }
                        }

                const calculateTotalHours = (s) => { const w = (s.work || 0) - (s.holiD || 0); const b = w > 0 ? (w * 8) : 0; const over = parseFloat(s.over) || 0; const sh = parseFloat(s.short) || 0; const weekdayWork = b + over - sh; const hb = (parseFloat(s.holiD) || 0) * 8; const hover = parseFloat(s.holiOver) || 0; const hsh = parseFloat(s.holiShort) || 0; const holidayWork = hb + hover - hsh; return parseFloat((weekdayWork + holidayWork).toFixed(2)); };

                                                        <td className="bg-orange-50/30 font-bold border-r text-orange-600 text-xs">{fmt(s.short)}</td>
                                                        <td className="bg-red-50/30 font-bold text-red-600 text-xs">{s.absent}</td>
                                                        {useMeal && (() => {
                                                            const key = `d_${name}_${currentMonthKey}`;
                                                            const count = mealData && mealData[key] !== undefined ? mealData[key] : s.mealDays;
                                                            return (
                                                                <>
                                                                    <td className="bg-green-50/30 border-l border-green-100 text-green-700 text-[10px] font-bold">{((count * mealPrice) / 10000).toFixed(1)}만</td>
                                                                    <td className="bg-green-50/30 border-r border-green-100 text-green-600 text-[10px]">({count}식)</td>
                                                                </>
                                                            );
                                                        })()}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        )}

                        {selectedUser && (
                            <UserModal
                                user={selectedUser} year={year} month={month} onClose={() => setSelectedUser(null)}
                                docs={docs} attendanceLogs={attendanceLogs} mealData={mealData} mealPrice={mealPrice}
                                useMeal={useMeal} settings={settings}
                                certificates={certificates} onAddCertLog={onAddCertLog} onDeleteCertLog={onDeleteCertLog}
                            />
                        )}

                        {/* [추가] 회의록 모달 */}
                        {selectedDateMinute && (
                            <MeetingMinuteViewerModal
                                date={selectedDateMinute}
                                minuteMap={minuteMap}
                                users={users}
                                onClose={() => setSelectedDateMinute(null)}
                            />
                        )}
                    </div>
                </React.Fragment>
            );
        }

        // =================================================================================
        // [4] 메인 실행 함수 (App) - 파일 맨 아래에 위치
        // =================================================================================
        const App = () => {
            // ★ [핵심 수정] React Hook을 함수 내부에서 직접 정의하여 "undefined" 오류 해결
            const { useState, useEffect } = React;

            const [data, setData] = useState(null);
            const [year, setYear] = useState(new Date().getFullYear());
            const [month, setMonth] = useState(new Date().getMonth() + 1);

            // [추가] 공휴일 상태 및 캐싱 로직
            const [publicHolidays, setPublicHolidays] = useState({});
            const [fetchedYears, setFetchedYears] = useState(new Set());

            useEffect(() => {
                // 보내주신 fetch 경로 및 로직 그대로 유지
                fetch('api.php?action=fetch_all')
                    .then(res => res.json())
                    .then(res => {
                        // 데이터 파싱 로직 유지
                        let pw = {}; try { pw = res.dailyWorkerNames ? (typeof res.dailyWorkerNames === 'string' ? JSON.parse(res.dailyWorkerNames) : res.dailyWorkerNames) : {}; } catch (e) { }
                        let pn = {}; try { pn = res.attendanceNotes ? (typeof res.attendanceNotes === 'string' ? JSON.parse(res.attendanceNotes) : res.attendanceNotes) : {}; } catch (e) { }

                        // [분석 1] 회의록 데이터 파싱 및 Map 생성
                        const apiMinutes = res.meeting_minutes || [];
                        const tmpMinuteMap = {};
                        apiMinutes.forEach(m => {
                            if (!tmpMinuteMap[m.date]) tmpMinuteMap[m.date] = [];
                            tmpMinuteMap[m.date].push(m);
                        });

                        // [증명서] certificates 파싱
                        let certs = [];
                        try {
                            certs = res.certificates ? (typeof res.certificates === 'string' ? JSON.parse(res.certificates) : res.certificates) : [];
                            if (!Array.isArray(certs)) certs = [];
                        } catch (e) { certs = []; }

                        setData({
                            users: res.users || [],
                            attendanceLogs: res.attendanceLogs || res.attendance_logs || [],
                            dailyLogs: res.dailyLogs || res.daily_logs || [],
                            docs: res.docs || [],
                            dailyWorkerNames: pw,
                            holidays: res.holidays || {},
                            customHolidays: res.customHolidays || {},
                            attendanceNotes: pn,
                            mealConfigMap: res.mealConfigMap || {},
                            mealData: res.mealData || {},
                            settings: res.settings || {},
                            meeting_minutes: apiMinutes,
                            minuteMap: tmpMinuteMap,
                            certificates: certs
                        });
                    })
                    .catch(async err => {
                        console.error("데이터 로딩 실패:", err);
                        await window.customAlert("데이터를 불러오는 중 오류가 발생했습니다.");
                    });
            }, []);

            // [추가] 연도 변경 시 공휴일 가져오기 (index1.html과 동일한 로직 및 동일 캐시 활용)
            useEffect(() => {
                const fetchHolidays = async (y) => {
                    if (fetchedYears.has(y)) return;

                    const cacheKey = `dms_holidays_v2_${y}`;
                    const cached = localStorage.getItem(cacheKey);

                    if (cached) {
                        setPublicHolidays(prev => ({ ...prev, ...JSON.parse(cached) }));
                        setFetchedYears(prev => new Set(prev).add(y));
                        return;
                    }

                    try {
                        const response = await fetch(`https://date.nager.at/api/v3/publicholidays/${y}/KR`);
                        if (!response.ok) throw new Error('API Error');
                        const holidayData = await response.json();

                        const newHolidays = {};
                        holidayData.forEach(item => { newHolidays[item.date] = item.localName; });

                        setPublicHolidays(prev => {
                            const updated = { ...prev, ...newHolidays };
                            localStorage.setItem(cacheKey, JSON.stringify(updated));
                            return updated;
                        });
                        setFetchedYears(prev => new Set(prev).add(y));
                    } catch (error) {
                        console.error(`Failed to fetch holidays for ${y}`, error);
                        setFetchedYears(prev => new Set(prev).add(y));
                    }
                };

                // 이전 달의 연도가 다를 수 있으므로 앞뒤 연도도 가져오는 것이 좋지만 현재 연도 기준으로 가져옴
                fetchHolidays(year);

                // 연말/연초를 대비하여 현재 달에 따라 전후 연도 공휴일도 가져옴
                if (month === 12) fetchHolidays(year + 1);
                if (month === 1) fetchHolidays(year - 1);
            }, [year, month, fetchedYears]);

            // [증명서] 전용 API를 통한 추가/삭제 함수
            const addCertificateLog = async (snapshot) => {
                try {
                    const res = await fetch('api.php?action=add_certificate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(snapshot)
                    });
                    const result = await res.json();
                    if (result.success) {
                        setData(prev => ({
                            ...prev,
                            certificates: [snapshot, ...(prev.certificates || [])],
                            settings: {
                                ...prev.settings,
                                ...(snapshot.institution ? { lastIssuingAuthority: snapshot.institution } : {}),
                                ...(snapshot.issuer ? { lastIssuerName: snapshot.issuer } : {})
                            }
                        }));
                    } else {
                        await window.customAlert("증명서 저장 실패: " + (result.message || ""));
                    }
                } catch (err) {
                    console.error('증명서 저장 오류:', err);
                    await window.customAlert("증명서 저장 중 오류가 발생했습니다.");
                }
            };

            const deleteCertificateLog = async (id) => {
                try {
                    const res = await fetch('api.php?action=delete_certificate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    const result = await res.json();
                    if (result.success) {
                        setData(prev => ({
                            ...prev,
                            certificates: (prev.certificates || []).filter(c => String(c.id) !== String(id))
                        }));
                    }
                } catch (err) {
                    console.error('증명서 삭제 오류:', err);
                }
            };

            if (!data) return <div className="flex h-screen items-center justify-center font-bold text-gray-300 animate-pulse tracking-widest uppercase text-xs">Loading...</div>;

            return (
                <div className="max-w-[1600px] mx-auto p-2 md:p-4">
                    {/* 헤더 영역 */}
                    <header className="mb-6 flex items-center gap-3 border-b pb-4">
                        <img
                            src="맥로고_기움.png"
                            alt="한국맥꾸룸 로고"
                            className="h-10 w-auto object-contain"
                            onError={(e) => { e.target.style.display = 'none'; }}
                        />
                        <div className="flex items-end gap-2">
                            <h1 className="text-2xl font-black text-gray-900 tracking-tighter leading-none">한국맥꾸룸</h1>
                            <span className="text-sm text-gray-400 font-bold mb-0.5">mcgguroom</span>
                        </div>
                    </header>

                    {/* AttendanceView에 데이터 및 날짜 상태 전달 */}
                    <AttendanceView
                        {...data}
                        holidays={{ ...data.holidays, ...publicHolidays }}
                        year={year}
                        month={month}
                        setYear={setYear}
                        setMonth={setMonth}
                        certificates={data.certificates || []}
                        onAddCertLog={addCertificateLog}
                        onDeleteCertLog={deleteCertificateLog}
                    />
                </div>
            );
        };

        // React 앱 시작
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <React.Fragment>
                <CustomDialog />
                <App />
            </React.Fragment>
        );
    </script>
</body>

</html>
