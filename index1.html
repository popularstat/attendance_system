        /* [수정] CertificateViewer: PDF 버튼 삭제 및 도장 제어 유지 */
        function CertificateViewer({ log, onClose, settings }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            // 도장 숨김 상태 관리
            const [hideStamp, setHideStamp] = useState(false);

            const handlePrint = () => {
                // Electron 환경이면 PDF 저장을 유도하거나, 일반 웹이면 인쇄창 호출
                if (window.electronAPI) {
                    window.electronAPI.printToPDF(`${log.type}_${log.targetUser.name}_${log.date}`);
                } else {
                    window.print();
                }
            };

            let displayDateStr = log.issueDateStr;
            if (!displayDateStr) {
                const d = new Date(log.date);
                displayDateStr = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
            }

            const historyList = log.historyList ? log.historyList.map(h => ({ ...h })) : [];

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex justify-center items-center p-4 overflow-y-auto">
                    <div className="bg-gray-100 dark:bg-gray-900 w-full max-w-6xl rounded-xl shadow-2xl flex flex-col md:flex-row h-[90vh] overflow-hidden animate-fade-in-up relative">

                        {/* 좌측 패널 (설정 및 정보) */}
                        <div className="w-full md:w-80 bg-white dark:bg-gray-800 border-r dark:border-gray-700 p-6 flex flex-col gap-6 no-print overflow-y-auto">
                            <div className="flex justify-between items-center border-b pb-4 dark:border-gray-700">
                                <h3 className="font-bold text-lg text-gray-800 dark:text-white flex items-center gap-2"><FileText size={20} /> 발급 기록 조회</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><X /></button>
                            </div>

                            <div className="space-y-4 text-sm text-gray-600 dark:text-gray-300">
                                <div className="bg-gray-50 dark:bg-gray-700 p-3 rounded border border-gray-200 dark:border-gray-600">
                                    <p className="mb-1"><strong>문서번호:</strong> <span className="font-mono text-indigo-600 dark:text-indigo-400">{log.docNum}</span></p>
                                    <p className="mb-1"><strong>발급일:</strong> {log.date}</p>
                                    <p><strong>대상자:</strong> {log.targetUser.name} ({log.targetUser.rank})</p>
                                </div>
                                <div className="bg-blue-50 text-blue-700 p-3 rounded text-xs border border-blue-100">
                                    ℹ️ 이 문서는 발급 당시의 정보가 보존된 스냅샷입니다.
                                </div>
                            </div>

                            <div className="mt-auto pt-4 flex flex-col gap-2">
                                {/* 도장 숨김 토글 버튼 */}
                                <button
                                    onClick={() => setHideStamp(!hideStamp)}
                                    className={`w-full py-2.5 rounded-lg text-sm font-bold border transition-all flex items-center justify-center gap-2 ${hideStamp ? 'bg-slate-700 text-white border-slate-700 hover:bg-slate-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50 dark:bg-gray-700 dark:text-white dark:border-gray-600'}`}
                                >
                                    {hideStamp ? <><Ban size={16} /> 도장 숨김 (현재 안보임)</> : <><Stamp size={16} /> 도장 표시 (현재 보임)</>}
                                </button>

                                {/* [수정] PDF 저장 버튼 삭제됨, 인쇄하기 버튼만 유지 */}
                                <button onClick={handlePrint} className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 shadow flex justify-center items-center gap-2">
                                    <Printer size={18} /> 인쇄하기
                                </button>
                            </div>
                        </div>

                        {/* 우측 미리보기 */}
                        <div className="flex-1 bg-gray-500 p-4 md:p-8 overflow-auto flex justify-center items-start">
                            <FitScreenWrapper>
                                <CertificatePaper
                                    docType={log.type}
                                    docNum={log.docNum}
                                    user={log.targetUser}
                                    rrnDisplay={log.rrnDisplay}
                                    address={log.address}
                                    institution={log.institution}
                                    official={log.issuer}

                                    /* 도장 숨김 여부 전달 */
                                    stamp={hideStamp ? null : settings.stampApproved}

                                    periodStr={log.periodStr}
                                    totalDuration={log.totalDuration}
                                    usage={log.usage}
                                    detailPeriod={log.detailPeriod}
                                    historyList={historyList}
                                    issueDateStr={displayDateStr}
                                />
                            </FitScreenWrapper>
                        </div>
                    </div>
                </div>
            );
        }

        /* [수정 15] ContractManagerModal: 저장 시 Native Confirm 제거 및 커스텀 모달 적용 */
        function ContractManagerModal({ user, onClose, onUpdateUser }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            const [viewTarget, setViewTarget] = useState('current');

            // [신규] 저장 확인용 모달 상태
            const [showSaveConfirm, setShowSaveConfirm] = useState(false);

            const getTargetData = () => {
                if (viewTarget === 'current') {
                    return { logs: user.contractLogs || {}, startDate: user.joinDate, endDate: user.contractEndDate, title: '현재 계약' };
                } else {
                    const history = user.contractHistory[viewTarget];
                    return { logs: history.logs || {}, startDate: history.startDate, endDate: history.endDate, title: history.period };
                }
            };

            const targetData = getTargetData();
            const [logs, setLogs] = useState(targetData.logs);

            useEffect(() => { setLogs(getTargetData().logs); }, [viewTarget, user]);

            const formatYMD = (d) => {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const contractMonths = useMemo(() => {
                if (!targetData.startDate) return [];
                const join = new Date(targetData.startDate);
                const end = targetData.endDate ? new Date(targetData.endDate) : new Date(join.getFullYear() + 1, join.getMonth(), join.getDate() - 1);

                const list = [];
                let cursor = new Date(join);
                cursor.setDate(1);

                let safety = 0;
                while (safety < 24) {
                    const currentMonthEnd = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0);
                    if (cursor > end && cursor.getMonth() !== end.getMonth()) break;

                    const year = cursor.getFullYear();
                    const month = cursor.getMonth() + 1;
                    const key = `${year}-${String(month).padStart(2, '0')}`;

                    const monthStart = new Date(year, month - 1, 1);
                    const monthEnd = new Date(year, month, 0);

                    const activeStart = monthStart < new Date(targetData.startDate) ? new Date(targetData.startDate) : monthStart;
                    const activeEnd = monthEnd > end ? end : monthEnd;

                    list.push({ key, year, month, start: activeStart, end: activeEnd });

                    cursor.setMonth(cursor.getMonth() + 1);
                    if (cursor > end && cursor.getDate() !== end.getDate()) break;
                    safety++;
                }
                return list;
            }, [targetData.startDate, targetData.endDate]);

            const handleToggle = (monthData) => {
                const key = monthData.key;
                const currentLog = logs[key] || {};
                const isFull = !currentLog.isFullAttendance;
                let newData = { ...currentLog, isFullAttendance: isFull };

                let effectiveEndDate = targetData.endDate ? new Date(targetData.endDate) : new Date();
                effectiveEndDate.setHours(0, 0, 0, 0);

                if (isFull) {
                    const currentMonthEnd = new Date(monthData.year, monthData.month, 0);
                    const isLastMonth = currentMonthEnd >= effectiveEndDate;

                    if (isLastMonth) {
                        newData.granted = 0;
                        newData.validUntil = '-';
                    } else {
                        newData.granted = 1;
                        //const expiry = new Date(monthData.year, monthData.month + 2, 0);
                        //if (expiry > effectiveEndDate) newData.validUntil = formatYMD(effectiveEndDate);
                        //else newData.validUntil = formatYMD(expiry);
                        newData.validUntil = formatYMD(effectiveEndDate);
                    }
                    newData.missedDates = '';
                } else {
                    newData.granted = 0;
                    newData.validUntil = '';
                }
                setLogs({ ...logs, [key]: newData });
            };

            const handleMissedChange = (key, value) => {
                setLogs({ ...logs, [key]: { ...logs[key], missedDates: value } });
            };

            // [수정] 저장 버튼 클릭 시 모달 열기 (confirm 제거)
            const handleSaveRequest = () => {
                setShowSaveConfirm(true);
            };

            // [수정] 실제 저장 로직 (alert 제거)
            const executeSave = () => {
                let updatedUser = { ...user };

                let totalGranted = 0;
                Object.values(logs).forEach(l => { if (l.isFullAttendance) totalGranted += (l.granted || 0); });

                if (viewTarget === 'current') {
                    updatedUser.contractLogs = logs;
                    updatedUser.leaveTotal = totalGranted;
                } else {
                    const newHistory = [...user.contractHistory];
                    newHistory[viewTarget] = { ...newHistory[viewTarget], logs: logs };
                    updatedUser.contractHistory = newHistory;
                }

                onUpdateUser(updatedUser);
                setShowSaveConfirm(false);
                // alert 없이 조용히 모달 닫기 (필요하다면 onClose 호출)
                // onClose(); // 연속 작업을 위해 닫지 않음
            };

            const fmtDate = (d) => d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex justify-center items-center p-4">
                    <div className="bg-white dark:bg-gray-800 w-full max-w-4xl rounded-xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden animate-fade-in-up">
                        <div className="p-5 border-b flex justify-between items-center bg-indigo-600 text-white">
                            <div>
                                <h2 className="text-xl font-bold flex items-center gap-2"><ClipboardList size={20} /> 계약직 근태 관리</h2>
                                <p className="text-xs opacity-80 mt-1">{user.name} - {targetData.title}</p>
                            </div>
                            <button onClick={onClose}><X /></button>
                        </div>

                        <div className="bg-indigo-50 dark:bg-indigo-900/30 p-3 border-b border-indigo-100 dark:border-indigo-800 flex items-center gap-3 justify-center">
                            <span className="text-sm font-bold text-indigo-800 dark:text-indigo-200">편집할 계약 기간:</span>
                            <select className="border p-1.5 rounded text-sm font-bold dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={viewTarget} onChange={(e) => setViewTarget(e.target.value)}>
                                <option value="current">현재 (진행 중)</option>
                                {user.contractHistory && user.contractHistory.map((h, idx) => (
                                    <option key={idx} value={idx}>[과거] {h.period} ({h.startDate} ~)</option>
                                ))}
                            </select>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 bg-gray-50 dark:bg-gray-900">
                            {viewTarget !== 'current' && (
                                <div className="bg-orange-100 text-orange-800 p-2 text-center text-xs font-bold mb-4 rounded border border-orange-200">
                                    ⚠️ 과거 계약 기록을 수정 중입니다. 신중하게 변경해주세요.
                                </div>
                            )}
                            <table className="w-full text-sm text-left border-collapse bg-white dark:bg-gray-800 shadow-sm rounded-lg overflow-hidden">
                                <thead className="bg-gray-100 dark:bg-gray-700 dark:text-gray-200">
                                    <tr>
                                        <th className="p-3 border dark:border-gray-600 w-20">월</th>
                                        <th className="p-3 border dark:border-gray-600">기간</th>
                                        <th className="p-3 border dark:border-gray-600 text-center w-24">만근 여부</th>
                                        <th className="p-3 border dark:border-gray-600">결근/특이사항</th>
                                        <th className="p-3 border dark:border-gray-600 text-center w-16">발생</th>
                                        <th className="p-3 border dark:border-gray-600 text-center w-28">사용 기한</th>
                                        <th className="p-3 border dark:border-gray-600 text-center w-20">상태</th>
                                    </tr>
                                </thead>
                                <tbody className="dark:text-gray-300">
                                    {contractMonths.map((m) => {
                                        const log = logs[m.key] || {};
                                        const isFull = log.isFullAttendance;
                                        const isUsed = log.isUsed;
                                        const isExpired = log.validUntil && log.validUntil !== '-' && new Date(new Date().toDateString()) > new Date(log.validUntil);

                                        return (
                                            <tr key={m.key} className="hover:bg-gray-50 dark:hover:bg-gray-700">
                                                <td className="p-3 border dark:border-gray-600 font-bold text-center">{m.month}월</td>
                                                <td className="p-3 border dark:border-gray-600 text-xs text-gray-500 dark:text-gray-400">{fmtDate(m.start)} ~ {fmtDate(m.end)}</td>
                                                <td className="p-3 border dark:border-gray-600 text-center">
                                                    <button onClick={() => handleToggle(m)} className={`px-2 py-1 rounded text-xs font-bold transition-colors ${isFull ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-gray-100 text-gray-400 border hover:bg-gray-200'}`}>
                                                        {isFull ? 'O 승인' : 'X'}
                                                    </button>
                                                </td>
                                                <td className="p-3 border dark:border-gray-600">
                                                    <input type="text" placeholder={isFull ? "-" : "사유 입력"} className="w-full bg-transparent focus:outline-none text-xs" value={log.missedDates || ''} onChange={(e) => handleMissedChange(m.key, e.target.value)} />
                                                </td>
                                                <td className="p-3 border dark:border-gray-600 text-center font-bold text-blue-600 dark:text-blue-400">
                                                    {isFull ? (log.granted > 0 ? '+1' : '-') : ''}
                                                </td>
                                                <td className="p-3 border dark:border-gray-600 text-center text-xs">
                                                    {isFull ? log.validUntil : ''}
                                                </td>
                                                <td className="p-3 border dark:border-gray-600 text-center text-xs">
                                                    {isUsed ? <span className="text-blue-600 font-bold">사용됨</span> : (isFull && log.granted > 0 ? (isExpired ? <span className="text-red-500">소멸</span> : <span className="text-green-600">존재</span>) : '-')}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        <div className="p-4 border-t bg-gray-50 dark:bg-gray-800 flex justify-end gap-2">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">닫기</button>
                            <button onClick={handleSaveRequest} className="px-6 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow">저장</button>
                        </div>
                    </div>

                    {/* [신규] 저장 확인 모달 */}
                    {showSaveConfirm && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex justify-center items-center p-4 backdrop-blur-sm" onClick={() => setShowSaveConfirm(false)}>
                            <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-xl shadow-2xl p-6 transform scale-100 animate-fade-in-up border-t-4 border-indigo-600" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-4 text-indigo-600">
                                    <div className="bg-indigo-100 p-2 rounded-full"><Save size={24} /></div>
                                    <h3 className="text-lg font-bold dark:text-indigo-400">변경사항 저장</h3>
                                </div>
                                <p className="text-gray-600 dark:text-gray-300 mb-6 text-sm">
                                    근태 기록을 저장하시겠습니까?<br />
                                    (연차 발생 및 유효기간이 자동으로 갱신됩니다.)
                                </p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowSaveConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                    <button onClick={executeSave} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow">저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function NavButton({ icon: Icon, label, active, onClick }) {
            return <button onClick={onClick} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${active ? 'bg-orange-600 text-white shadow' : 'text-slate-300 hover:bg-slate-700'}`}><Icon size={18} /> <span className="font-medium">{label}</span></button>;
        }

        /* [수정됨] StatCard: 외부에서 변수(statScope, thisYear)와 함수(onClick)를 props로 받음 */
        const StatCard = ({ title, countInfo, statusKey, colorClass, icon: Icon, statScope, thisYear, onClick }) => (
            <div
                onClick={(e) => onClick(statusKey, 'all', e)}
                className={`bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 cursor-pointer group overflow-hidden relative transition-all duration-300 ease-out hover:-translate-y-1 hover:shadow-xl hover:border-indigo-400 dark:hover:border-indigo-500 active:scale-95`}
            >
                <div className={`p-4 flex justify-between items-center border-b border-gray-100 dark:border-gray-700 ${colorClass}`}>
                    <div>
                        {/* statScope와 thisYear를 props로 사용 */}
                        <span className="text-xs font-bold uppercase tracking-wider opacity-70">
                            {statScope === 'year' ? thisYear : 'ALL TIME'} {title}
                        </span>
                        <div className="text-3xl font-extrabold mt-1">{countInfo.total}</div>
                    </div>
                    <div className="p-3 rounded-full bg-white/20 dark:bg-white/10 group-hover:scale-110 transition-transform duration-300">
                        <Icon size={24} />
                    </div>
                </div>
                <div className="flex divide-x divide-gray-100 dark:divide-gray-700 bg-gray-50 dark:bg-gray-900/50">
                    <div
                        onClick={(e) => onClick(statusKey, 'annual', e)}
                        className="flex-1 p-2 text-center hover:bg-indigo-50 dark:hover:bg-gray-700 transition-colors"
                    >
                        <span className="text-[10px] text-gray-500 dark:text-gray-400 block">연차류</span>
                        <span className="text-sm font-bold text-green-600 dark:text-green-400">{countInfo.annual}</span>
                    </div>
                    <div
                        onClick={(e) => onClick(statusKey, 'other', e)}
                        className="flex-1 p-2 text-center hover:bg-amber-50 dark:hover:bg-gray-700 transition-colors"
                    >
                        <span className="text-[10px] text-gray-500 dark:text-gray-400 block">경조사/병가/기타</span>
                        <span className="text-sm font-bold text-amber-500 dark:text-amber-400">{countInfo.other}</span>
                    </div>
                </div>
            </div>
        );


        /* [수정 40] Dashboard: 모바일 카드 뷰 + PC 테이블 뷰 (반응형 적용) */
        function Dashboard({ docs, users, setView, onSelectDoc, getLeaveStats, holidays, fetchHolidays, settings }) {
            const safeUsers = users || [];
            const today = new Date();
            const thisYear = today.getFullYear();
            const todayStr = today.toISOString().split('T')[0];

            const [statScope, setStatScope] = useState('year');
            const [isBatchPrinting, setIsBatchPrinting] = useState(false);
            const [printingDocs, setPrintingDocs] = useState([]);
            const [batchHideStamps, setBatchHideStamps] = useState(true);

            const [dashboardModal, setDashboardModal] = useState({ type: null, msg: '' });

            const deletedCount = useMemo(() => docs.filter(d => d.isDeleted).length, [docs]);
            const allActiveDocs = useMemo(() => (docs || []).filter(d => !d.isDeleted), [docs]);

            const { dataMinDate, dataMaxDate } = useMemo(() => {
                if (allActiveDocs.length === 0) return { dataMinDate: `${thisYear}-01-01`, dataMaxDate: todayStr };
                const dates = allActiveDocs.map(d => d.createdAt).sort();
                return { dataMinDate: dates[0], dataMaxDate: dates[dates.length - 1] };
            }, [allActiveDocs, thisYear, todayStr]);

            const uniqueRanks = useMemo(() => {
                const ranks = allActiveDocs.map(d => d.authorRank).filter(r => r);
                return [...new Set(ranks)].sort();
            }, [allActiveDocs]);

            const [searchParams, setSearchParams] = useState({
                dateType: 'createdAt', startDate: `${thisYear}-01-01`, endDate: `${thisYear}-12-31`,
                status: [], authorIds: [], ranks: [], leaveTypeGroups: [], keyword: ''
            });

            const [appliedParams, setAppliedParams] = useState(searchParams);
            const [dropdownOpen, setDropdownOpen] = useState({ author: false, rank: false, status: false, leaveType: false });
            const [selectedFilterId, setSelectedFilterId] = useState('');

            const stats = useMemo(() => {
                const targetDocs = statScope === 'year' ? allActiveDocs.filter(d => d.createdAt.startsWith(String(thisYear))) : allActiveDocs;
                const calc = (status) => {
                    const docsByStatus = status === 'all' ? targetDocs : targetDocs.filter(d => d.status === status);
                    const annualCount = docsByStatus.filter(d => ['full', 'am', 'pm'].includes(d.leaveType)).length;
                    const otherCount = docsByStatus.length - annualCount;
                    return { total: docsByStatus.length, annual: annualCount, other: otherCount };
                };
                return { all: calc('all'), pending: calc('pending'), approved: calc('approved'), rejected: calc('rejected') };
            }, [allActiveDocs, thisYear, statScope]);

            const filteredDocs = useMemo(() => {
                return allActiveDocs.filter(doc => {
                    const targetDate = appliedParams.dateType === 'startDate' ? (doc.startDate || doc.createdAt) : doc.createdAt;
                    if (targetDate < appliedParams.startDate || targetDate > appliedParams.endDate) return false;
                    if (appliedParams.status.length > 0 && !appliedParams.status.includes(doc.status)) return false;
                    if (appliedParams.authorIds.length > 0 && !appliedParams.authorIds.includes(doc.authorId)) return false;
                    if (appliedParams.ranks.length > 0 && !appliedParams.ranks.includes(doc.authorRank)) return false;
                    if (appliedParams.leaveTypeGroups.length > 0 && doc.type === 'vacation') {
                        const isAnnualType = ['full', 'am', 'pm'].includes(doc.leaveType);
                        const matchAnnual = appliedParams.leaveTypeGroups.includes('annual') && isAnnualType;
                        const matchOther = appliedParams.leaveTypeGroups.includes('other') && !isAnnualType;
                        if (!matchAnnual && !matchOther) return false;
                    }
                    if (appliedParams.keyword) {
                        const lowerKey = appliedParams.keyword.toLowerCase();
                        if (!((doc.title || '').toLowerCase().includes(lowerKey) || (doc.content || '').toLowerCase().includes(lowerKey) || (doc.authorName || '').toLowerCase().includes(lowerKey))) return false;
                    }
                    return true;
                }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }, [allActiveDocs, appliedParams]);

            const handleSearch = () => { setAppliedParams({ ...searchParams }); };
            const handleReset = () => { const r = { dateType: 'createdAt', startDate: dataMinDate, endDate: dataMaxDate, status: [], authorIds: [], ranks: [], leaveTypeGroups: [], keyword: '' }; setSearchParams(r); setAppliedParams(r); setSelectedFilterId(''); };
            const handleCardClick = (status, typeGroup = 'all', e) => { if (e) e.stopPropagation(); const start = statScope === 'year' ? `${thisYear}-01-01` : dataMinDate; const end = statScope === 'year' ? `${thisYear}-12-31` : dataMaxDate; const p = { dateType: 'createdAt', startDate: start, endDate: end, status: status === 'all' ? [] : [status], authorIds: [], ranks: [], leaveTypeGroups: typeGroup === 'all' ? [] : [typeGroup], keyword: '' }; setSearchParams(p); setAppliedParams(p); setSelectedFilterId(''); };
            const toggleSelection = (field, value) => { setSearchParams(prev => { const list = prev[field]; return { ...prev, [field]: list.includes(value) ? list.filter(i => i !== value) : [...list, value] }; }); };

            const handleDownloadExcel = () => {
                if (filteredDocs.length === 0) {
                    setDashboardModal({ type: 'alert', msg: '다운로드할 데이터가 없습니다.' });
                    return;
                }
                let csvContent = "문서번호,상태,종류,제목,기안자,직급,기안일,승인일,시작일,종료일,사용일수,유형,상세내용\n";
                filteredDocs.forEach(doc => {
                    const statusMap = { 'pending': '대기', 'approved': '승인', 'rejected': '반려' };
                    const typeMap = { 'vacation': '휴가신청', 'general': '일반품의' };
                    const leaveTypeName = doc.type === 'vacation' ? (LEAVE_TYPES[doc.leaveType]?.label || doc.leaveType) : '-';
                    const cleanTitle = (doc.title || '').replace(/"/g, '""');
                    const cleanContent = (doc.content || '').replace(/"/g, '""');
                    const row = [
                        doc.id, statusMap[doc.status] || doc.status, typeMap[doc.type] || '기타', `"${cleanTitle}"`,
                        doc.authorName || '', doc.authorRank || '', doc.createdAt || '', doc.approvedAt || '-',
                        doc.startDate || '-', doc.endDate || '-', doc.vacationDays ? `${doc.vacationDays}` : '-',
                        leaveTypeName, `"${cleanContent}"`
                    ];
                    csvContent += row.join(",") + "\n";
                });
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `문서목록_${appliedParams.startDate}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleBatchPdfRequest = () => {
                if (filteredDocs.length === 0) {
                    setDashboardModal({ type: 'alert', msg: '저장할 문서가 없습니다.' });
                    return;
                }
                if (filteredDocs.length > 50) {
                    setDashboardModal({ type: 'confirm_batch', msg: `${filteredDocs.length}건의 문서를 PDF로 저장합니다.\n시간이 다소 걸릴 수 있습니다. 계속하시겠습니까?` });
                } else {
                    executeBatchPdf();
                }
            };

            const executeBatchPdf = () => {
                setDashboardModal({ type: null, msg: '' });
                setIsBatchPrinting(true);
                setPrintingDocs(filteredDocs);
                setTimeout(async () => {
                    if (window.electronAPI) { await window.electronAPI.printToPDF(`문서일괄저장_${appliedParams.startDate}_${filteredDocs.length}건`); } else { window.print(); }
                    setIsBatchPrinting(false);
                    setPrintingDocs([]);
                }, 1000);
            };

            if (isBatchPrinting) {
                return ReactDOM.createPortal(
                    <div id="print-mount" className="bg-gray-100 min-h-screen">
                        {printingDocs.map((doc) => (
                            <DocPaper key={doc.id} doc={doc} users={users} settings={settings} holidays={holidays} fetchHolidays={fetchHolidays} getLeaveStats={getLeaveStats} hideStamps={batchHideStamps} />
                        ))}
                    </div>,
                    document.body
                );
            }

            const commonBtnClass = "px-3 py-2 rounded-lg text-sm font-bold transition-all shadow-sm border flex items-center gap-1.5 h-[38px] active:scale-95";
            const neutralBtn = `${commonBtnClass} bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700`;

            // 상태에 따른 뱃지 스타일 헬퍼
            const getStatusStyle = (status) => {
                if (status === 'approved') return 'bg-green-100 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-300 dark:border-green-800';
                if (status === 'rejected') return 'bg-red-100 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800';
                return 'bg-orange-100 text-orange-700 border-orange-200 dark:bg-orange-900/30 dark:text-orange-300 dark:border-orange-800';
            };
            const getStatusLabel = (status) => {
                if (status === 'approved') return '승인';
                if (status === 'rejected') return '반려';
                return '대기';
            };

            return (
                <div className="space-y-6 mb-20" onClick={() => setDropdownOpen({ author: false, rank: false, status: false, leaveType: false })}>
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100">문서함</h2>
                        <div className="flex gap-2 items-center">

                            {/* [수정] 휴지통 버튼: 모바일에서도 노출 (공간 절약을 위해 모바일엔 글자 숨김) */}
                            <button onClick={() => setView('trash')} className={`${neutralBtn} hover:text-red-500 hover:border-red-200 dark:hover:text-red-400 dark:hover:border-red-900`}>
                                <Trash2 size={16} />
                                <span className="hidden md:inline">휴지통</span>
                                <span className="bg-gray-100 dark:bg-gray-700 px-1.5 rounded-full text-xs ml-0 md:ml-1">{deletedCount}</span>
                            </button>

                            {/* PC 전용 버튼들 (엑셀, PDF) - 모바일 숨김 */}
                            <div className="hidden md:flex gap-2">
                                <button onClick={handleDownloadExcel} className={`${neutralBtn} hover:text-green-600 hover:border-green-200 dark:hover:text-green-400 dark:hover:border-green-900`}>
                                    <Save size={16} /> 엑셀
                                </button>
                                <div className="pdf-group isolate mr-2">
                                    <label className="pdf-toggle" title={!batchHideStamps ? "도장 포함됨" : "도장 없음"}>
                                        <input type="checkbox" checked={!batchHideStamps} onChange={() => setBatchHideStamps(!batchHideStamps)} />
                                        <div className="icon-box"><Stamp size={18} /></div>
                                    </label>
                                    <button type="button" onClick={handleBatchPdfRequest} className="pdf-btn">
                                        <FileText size={16} /> PDF 저장
                                    </button>
                                </div>
                            </div>

                            {/* 작성 버튼 (항상 보임) */}
                            <button onClick={() => setView('write')} className="px-4 py-2 rounded-lg text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 dark:bg-indigo-600 dark:hover:bg-indigo-500 shadow-md transition-all flex items-center gap-1.5 h-[38px] ml-2">
                                <Plus size={16} strokeWidth={3} /> <span className="whitespace-nowrap">작성</span>
                            </button>
                        </div>
                    </div>

                    {/* 통계 카드 (기존 유지 - 자동 반응형) */}
                    <div className="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg w-fit border dark:border-gray-700">
                        <button onClick={() => setStatScope('year')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${statScope === 'year' ? 'bg-white text-indigo-600 shadow' : 'text-gray-500 hover:text-gray-700'}`}>📅 {thisYear}년 현황</button>
                        <button onClick={() => setStatScope('all')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${statScope === 'all' ? 'bg-white text-indigo-600 shadow' : 'text-gray-500 hover:text-gray-700'}`}>📁 전체 누적 현황</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-fade-in">
                        <StatCard title="전체 문서" countInfo={stats.all} statusKey="all" colorClass="bg-slate-800 text-white dark:bg-slate-700" icon={FolderOpen} statScope={statScope} thisYear={thisYear} onClick={handleCardClick} />
                        <StatCard title="전체 대기" countInfo={stats.pending} statusKey="pending" colorClass="bg-white text-orange-600 dark:bg-gray-800 border-l-4 border-l-orange-500" icon={Hourglass} statScope={statScope} thisYear={thisYear} onClick={handleCardClick} />
                        <StatCard title="전체 승인" countInfo={stats.approved} statusKey="approved" colorClass="bg-white text-green-600 dark:bg-gray-800 border-l-4 border-l-green-500" icon={Stamp} statScope={statScope} thisYear={thisYear} onClick={handleCardClick} />
                        <StatCard title="전체 반려" countInfo={stats.rejected} statusKey="rejected" colorClass="bg-white text-red-500 dark:bg-gray-800 border-l-4 border-l-red-500" icon={Ban} statScope={statScope} thisYear={thisYear} onClick={handleCardClick} />
                    </div>

                    {/* 검색 및 필터 영역 (기존 유지 - 자동 반응형) */}
                    <div className="bg-gray-100 dark:bg-gray-800 p-5 rounded-lg border border-gray-300 dark:border-gray-700">
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end mt-2">
                            {/* 조회 기간 필터 */}
                            <div className="md:col-span-4 flex flex-col gap-1">
                                <label className="text-xs font-bold text-gray-500">조회 기간</label>

                                {/* [수정] 모바일: 세로(col), PC: 가로(row) 배치 */}
                                <div className="flex flex-col md:flex-row gap-2">

                                    {/* 기준 선택 (모바일: 100% 너비, PC: 고정 너비) */}
                                    <select
                                        className="border p-2 rounded text-sm w-full md:w-28 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                        value={searchParams.dateType}
                                        onChange={e => setSearchParams({ ...searchParams, dateType: e.target.value })}
                                    >
                                        <option value="createdAt">📅 기안일</option>
                                        <option value="startDate">🚀 시작일</option>
                                    </select>

                                    {/* 날짜 입력 그룹 (모바일: 100% 너비, PC: 유동적) */}
                                    <div className="flex gap-2 flex-1 items-center">
                                        <input
                                            type="date"
                                            className="border p-2 rounded text-sm w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                            value={searchParams.startDate}
                                            onChange={e => setSearchParams({ ...searchParams, startDate: e.target.value })}
                                        />
                                        <span className="text-gray-400">~</span>
                                        <input
                                            type="date"
                                            className="border p-2 rounded text-sm w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                            value={searchParams.endDate}
                                            onChange={e => setSearchParams({ ...searchParams, endDate: e.target.value })}
                                        />
                                    </div>
                                </div>
                            </div>
                            {/* 나머지 필터 버튼들 (기존 코드와 동일) */}
                            <div className="md:col-span-2 relative"><label className="text-xs font-bold text-gray-500 block mb-1">문서 상태</label><button type="button" onClick={(e) => { e.stopPropagation(); setDropdownOpen({ ...dropdownOpen, status: !dropdownOpen.status }); }} className="w-full border p-2 rounded text-sm bg-white text-left flex justify-between items-center dark:bg-gray-700 dark:border-gray-600 dark:text-white h-[38px]"><span className="truncate">{searchParams.status.length === 0 ? '전체 상태' : `${searchParams.status.length}개 선택됨`}</span><ChevronDown size={14} /></button>{dropdownOpen.status && (<div className="absolute top-full left-0 w-full mt-1 bg-white border rounded shadow-xl z-20 p-2 dark:bg-gray-800 dark:border-gray-600" onClick={e => e.stopPropagation()}>{['pending', 'approved', 'rejected'].map(st => (<label key={st} className="flex items-center gap-2 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded cursor-pointer"><input type="checkbox" checked={searchParams.status.includes(st)} onChange={() => toggleSelection('status', st)} /><span className="text-sm dark:text-gray-200">{st === 'pending' ? '대기' : st === 'approved' ? '승인' : '반려'}</span></label>))}</div>)}</div>
                            <div className="md:col-span-2 relative"><label className="text-xs font-bold text-gray-500 block mb-1">휴가 유형</label><button type="button" onClick={(e) => { e.stopPropagation(); setDropdownOpen({ ...dropdownOpen, leaveType: !dropdownOpen.leaveType }); }} className="w-full border p-2 rounded text-sm bg-white text-left flex justify-between items-center dark:bg-gray-700 dark:border-gray-600 dark:text-white h-[38px]"><span className="truncate">{searchParams.leaveTypeGroups.length === 0 ? '전체 유형' : `${searchParams.leaveTypeGroups.length}개 선택됨`}</span><ChevronDown size={14} /></button>{dropdownOpen.leaveType && (<div className="absolute top-full left-0 w-full mt-1 bg-white border rounded shadow-xl z-20 p-2 dark:bg-gray-800 dark:border-gray-600" onClick={e => e.stopPropagation()}><label className="flex items-center gap-2 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded cursor-pointer"><input type="checkbox" checked={searchParams.leaveTypeGroups.includes('annual')} onChange={() => toggleSelection('leaveTypeGroups', 'annual')} /><span className="text-sm dark:text-gray-200">연차류 (연차/반차)</span></label><label className="flex items-center gap-2 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded cursor-pointer"><input type="checkbox" checked={searchParams.leaveTypeGroups.includes('other')} onChange={() => toggleSelection('leaveTypeGroups', 'other')} /><span className="text-sm dark:text-gray-200">기타류 (경조사/병가)</span></label></div>)}</div>
                            <div className="md:col-span-2 relative"><label className="text-xs font-bold text-gray-500 block mb-1">직급</label><button type="button" onClick={(e) => { e.stopPropagation(); setDropdownOpen({ ...dropdownOpen, rank: !dropdownOpen.rank }); }} className="w-full border p-2 rounded text-sm bg-white text-left flex justify-between items-center dark:bg-gray-700 dark:border-gray-600 dark:text-white h-[38px]"><span className="truncate">{searchParams.ranks.length === 0 ? '전체 직급' : `${searchParams.ranks.length}개 선택됨`}</span><ChevronDown size={14} /></button>{dropdownOpen.rank && (<div className="absolute top-full left-0 w-full mt-1 bg-white border rounded shadow-xl z-20 p-2 dark:bg-gray-800 dark:border-gray-600 max-h-60 overflow-y-auto" onClick={e => e.stopPropagation()}>{uniqueRanks.map(rank => (<label key={rank} className="flex items-center gap-2 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded cursor-pointer"><input type="checkbox" checked={searchParams.ranks.includes(rank)} onChange={() => toggleSelection('ranks', rank)} /><span className="text-sm dark:text-gray-200">{rank}</span></label>))}</div>)}</div>

                    </div>

                    {/* 통합 커스텀 모달 (대시보드용) */}
                    {dashboardModal.type && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm" onClick={() => setDashboardModal({ type: null, msg: '' })}>
                            <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-xl shadow-2xl p-6 transform scale-100 animate-fade-in-up border-t-4 border-indigo-600" onClick={e => e.stopPropagation()}>

                                        <>
                                            <button onClick={() => setDashboardModal({ type: null, msg: '' })} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                            <button onClick={executeBatchPdf} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow">계속 진행</button>
                                        </>

                                        <button onClick={() => setDashboardModal({ type: null, msg: '' })} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow">확인</button>
