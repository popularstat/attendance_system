        }

        function TeamCalendar({ docs, users, holidays, fetchHolidays, onOpenDoc, events, setEvents }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [hoveredItemId, setHoveredItemId] = useState(null);
            const [selectedEvent, setSelectedEvent] = useState(null);

            // [수정/삭제 관련 상태]
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState(null);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const yearOptions = useMemo(() => {
                const years = [];
                for (let i = year - 5; i <= year + 5; i++) years.push(i);
                return years;
            }, [year]);
            const monthOptions = Array.from({ length: 12 }, (_, i) => i);

            // [헤더 조작 핸들러]
            const handleYearChange = (e) => setCurrentDate(new Date(Number(e.target.value), month, 1));
            const handleMonthChange = (e) => setCurrentDate(new Date(year, Number(e.target.value), 1));
            const handlePrevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const handleNextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const handleTodayClick = () => {
                const now = new Date();
                setCurrentDate(now);
                setSelectedDate(now);
            };

            // [이벤트 수정/삭제 핸들러]
            const handleEditStart = () => {
                setEditForm({ ...selectedEvent });
                setIsEditing(true);
            };

            const handleEditSave = (e) => {
                e.preventDefault();
                setEvents(prev => prev.map(evt => evt.id === editForm.id ? editForm : evt));
                setSelectedEvent(editForm);
                setIsEditing(false);
            };

            const handleDeleteEvent = () => {
                setEvents(prev => prev.filter(e => e.id !== selectedEvent.id));
                setShowDeleteConfirm(false);
                setSelectedEvent(null);
            };

            const toggleUser = (userId) => {
                const currentTarget = editForm.target || [];
                const newTarget = currentTarget.includes(userId)
                    ? currentTarget.filter(id => id !== userId)
                    : [...currentTarget, userId];
                setEditForm({ ...editForm, target: newTarget });
            };

            useEffect(() => { fetchHolidays(year); }, [year, fetchHolidays]);

            const fmt = (y, m, d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
            const getFirstDayOfMonth = (y, m) => new Date(y, m, 1).getDay();

            const weeks = useMemo(() => {
                const daysInMonth = getDaysInMonth(year, month);
                const firstDayDay = getFirstDayOfMonth(year, month);
                const weekList = [];
                let currentWeek = [];
                for (let i = 0; i < firstDayDay; i++) currentWeek.push(null);
                for (let d = 1; d <= daysInMonth; d++) {
                    currentWeek.push(fmt(year, month, d));
                    if (currentWeek.length === 7) { weekList.push(currentWeek); currentWeek = []; }
                }
                if (currentWeek.length > 0) { while (currentWeek.length < 7) currentWeek.push(null); weekList.push(currentWeek); }
                return weekList;
            }, [year, month]);

            const getItemsForWeek = (weekDates) => {
                const weekStartStr = weekDates[0] || fmt(year, month, 1);
                const weekEndStr = weekDates[6] || fmt(year, month, getDaysInMonth(year, month));
                let items = [];
                events.forEach(evt => {
                    if (evt.endDate < weekStartStr || evt.startDate > weekEndStr) return;
                    items.push({ type: 'event', id: evt.id, title: evt.title, startDate: evt.startDate, endDate: evt.endDate, data: evt, priority: 1 });
                });
                const activeDocs = docs.filter(d => !d.isDeleted && (d.status === 'approved' || d.status === 'pending') && d.type === 'vacation');
                activeDocs.forEach(doc => {
                    if (doc.endDate < weekStartStr || doc.startDate > weekEndStr) return;
                    const user = users.find(u => u.id === doc.authorId);
                    items.push({
                        type: 'vacation', id: doc.id,
                        title: `${user ? user.rank : ''} ${user ? user.name : doc.authorName}`,
                        subTitle: doc.leaveType !== 'full' ? (doc.leaveType === 'am' ? '(오전)' : '(오후)') : '',
                        startDate: doc.startDate, endDate: doc.endDate, status: doc.status,
                        leaveType: doc.leaveType, authorId: doc.authorId, data: doc, priority: 2
                    });
                });
                items.sort((a, b) => {
                    if (a.priority !== b.priority) return a.priority - b.priority;
                    const durA = new Date(a.endDate) - new Date(a.startDate);
                    const durB = new Date(b.endDate) - new Date(b.startDate);
                    return durB - durA || a.startDate.localeCompare(b.startDate);
                });
                const filledSlots = [];
                const processedItems = items.map(item => {
                    let startIdx = 0, endIdx = 6;
                    const sIndex = weekDates.findIndex(d => d === item.startDate);
                    if (sIndex !== -1) startIdx = sIndex;
                    const eIndex = weekDates.findIndex(d => d === item.endDate);
                    if (eIndex !== -1) endIdx = eIndex;
                    const colStart = startIdx + 1;
                    const colSpan = (endIdx - startIdx) + 1;
                    let rowIndex = 0;
                    while (true) {
                        if (!filledSlots[rowIndex]) filledSlots[rowIndex] = new Array(7).fill(false);
                        let isClear = true;
                        for (let i = startIdx; i <= endIdx; i++) { if (filledSlots[rowIndex][i]) { isClear = false; break; } }
                        if (isClear) { for (let i = startIdx; i <= endIdx; i++) filledSlots[rowIndex][i] = true; break; }
                        rowIndex++;
                    }
                    return { ...item, colStart, colSpan, rowIndex };
                }).filter(i => i);
                return { items: processedItems, maxRows: filledSlots.length };
            };

            // 팝업 렌더링 (상세/수정 전환)
            const renderPopup = () => {
                if (!selectedEvent) return null;
                const evt = isEditing ? editForm : selectedEvent;

                return (
                    <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm" onClick={async () => { if (!isEditing) setSelectedEvent(null); }}>
                        <div className="bg-white dark:bg-gray-800 w-full max-w-lg rounded-xl shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="p-6 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 flex justify-between items-start">
                                <div className="w-full">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="bg-purple-600 text-white px-2.5 py-0.5 rounded-full text-xs font-bold shadow-sm">EVENT</span>
                                        {isEditing && <span className="text-orange-500 font-bold text-xs">[수정 중]</span>}
                                    </div>
                                    {isEditing ? (
                                        <input type="text" value={editForm.title} onChange={e => setEditForm({ ...editForm, title: e.target.value })} className="text-xl font-bold bg-white dark:bg-gray-700 border p-1 rounded w-full dark:text-white" />
                                    ) : (
                                        <h3 className="text-2xl font-bold text-gray-900 dark:text-white leading-tight">{evt.title}</h3>
                                    )}
                                </div>
                                <button onClick={async () => { setSelectedEvent(null); setIsEditing(false); }} className="text-gray-400 hover:text-gray-600 ml-4"><X size={24} /></button>
                            </div>

                            <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto custom-scrollbar">
                                {isEditing ? (
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-bold text-gray-400">시작일</label><input type="date" value={editForm.startDate} onChange={e => setEditForm({ ...editForm, startDate: e.target.value })} className="w-full border p-2 rounded text-sm dark:bg-gray-700" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400">종료일</label><input type="date" value={editForm.endDate} onChange={e => setEditForm({ ...editForm, endDate: e.target.value })} className="w-full border p-2 rounded text-sm dark:bg-gray-700" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-bold text-gray-400">장소</label><input type="text" value={editForm.location} onChange={e => setEditForm({ ...editForm, location: e.target.value })} className="w-full border p-2 rounded text-sm dark:bg-gray-700" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400">시작시간</label><input type="text" value={editForm.startTime} onChange={e => setEditForm({ ...editForm, startTime: e.target.value })} placeholder="09:00" className="w-full border p-2 rounded text-sm dark:bg-gray-700" /></div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400">참여 인원</label>
                                            <div className="flex flex-wrap gap-1 mt-1">
                                                {users.filter(u => u.id !== 'admin').map(u => (
                                                    <button key={u.id} onClick={() => toggleUser(u.id)} className={`px-2 py-1 rounded-full text-[10px] border ${editForm.target.includes(u.id) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200'}`}>
                                                        {u.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div><label className="text-[10px] font-bold text-gray-400">비고</label><textarea value={editForm.note} onChange={e => setEditForm({ ...editForm, note: e.target.value })} className="w-full border p-2 rounded text-sm h-20 dark:bg-gray-700" /></div>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-3 text-gray-600 dark:text-gray-300">
                                            <Calendar size={18} className="text-purple-500" />
                                            <span className="font-medium">{evt.startDate} {evt.startDate !== evt.endDate && `~ ${evt.endDate}`}</span>
                                        </div>
                                        {evt.location && <div className="flex items-center gap-3 text-gray-600 dark:text-gray-300">📍 <span className="font-medium">{evt.location}</span></div>}
                                        <div className="bg-gray-50 dark:bg-gray-900/50 p-3 rounded-lg text-sm whitespace-pre-wrap min-h-[60px]">{evt.note || "상세 내용 없음"}</div>
                                    </div>
                                )}
                            </div>

                            <div className="p-4 bg-gray-50 dark:bg-gray-900 flex justify-between gap-2">
                                {isEditing ? (
                                    <>
                                        <button onClick={() => setIsEditing(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">취소</button>
                                        <button onClick={handleEditSave} className="flex-1 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow-lg">수정사항 저장</button>
                                    </>
                                ) : (
                                    <>
                                        <button onClick={() => setShowDeleteConfirm(true)} className="px-4 py-2 bg-red-50 text-red-600 rounded-lg font-bold border border-red-100 hover:bg-red-100">삭제</button>
                                        <div className="flex gap-2 flex-1">
                                            <button onClick={handleEditStart} className="flex-1 bg-white border border-gray-300 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-50 flex justify-center items-center gap-2">
                                                <PenTool size={16} /> 수정하기
                                            </button>
                                            <button onClick={() => setSelectedEvent(null)} className="px-6 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-700">닫기</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {showDeleteConfirm && (
                            <div className="fixed inset-0 bg-black/60 z-[60] flex justify-center items-center p-4" onClick={(e) => { e.stopPropagation(); setShowDeleteConfirm(false); }}>
                                <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl max-w-xs w-full" onClick={e => e.stopPropagation()}>
                                    <h4 className="text-lg font-bold mb-4">행사 일정을 삭제할까요?</h4>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowDeleteConfirm(false)} className="flex-1 py-2 bg-gray-100 rounded-lg font-bold">취소</button>
                                        <button onClick={handleDeleteEvent} className="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">삭제</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col relative select-none">
                    {/* [통합 헤더 영역] 모바일 3줄 / PC 1줄 레이아웃 적용 */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 shrink-0 gap-3 md:gap-0">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2 self-start md:self-center">
                            <Layout /> <span className="whitespace-nowrap">통합 캘린더</span>
                        </h2>

                        <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                            {/* 1라인: 연도 */}
                            <div className="relative w-full md:w-auto">
                                <select value={year} onChange={handleYearChange} className="appearance-none w-full md:w-28 bg-white dark:bg-gray-800 border dark:border-gray-700 px-4 py-2 rounded-lg shadow-sm font-bold text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    {yearOptions.map(y => <option key={y} value={y}>{y}년</option>)}
                                </select>
                                <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><ChevronDown size={14} /></div>
                            </div>

                            {/* 2라인: 월 (화살표 포함) */}
                            <div className="flex items-center gap-1 w-full md:w-auto justify-center">
                                <button onClick={handlePrevMonth} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full text-gray-600 dark:text-gray-400">
                                    <ChevronDown className="rotate-90" size={20} />
                                </button>
                                <div className="relative flex-1 md:flex-none">
                                    <select value={month} onChange={handleMonthChange} className="appearance-none w-full md:w-24 bg-white dark:bg-gray-800 border dark:border-gray-700 px-4 py-2 rounded-lg shadow-sm font-bold text-center text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                        {monthOptions.map(m => <option key={m} value={m}>{m + 1}월</option>)}
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><ChevronDown size={14} /></div>
                                </div>
                                <button onClick={handleNextMonth} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full text-gray-600 dark:text-gray-400">
                                    <ChevronDown className="-rotate-90" size={20} />
                                </button>
                            </div>

                            {/* 3라인: 오늘 버튼 */}
                            <button onClick={handleTodayClick} className="w-full md:w-auto px-6 py-2 bg-indigo-600 text-white font-bold rounded-lg shadow-sm hover:bg-indigo-700 whitespace-nowrap">오늘</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar bg-white dark:bg-gray-800 rounded-lg shadow border dark:border-gray-700">
                        <div className="grid grid-cols-7 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-center font-bold py-2 text-sm text-gray-600 dark:text-gray-300">
                            <div className="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div className="text-blue-500">토</div>
                        </div>
                        <div className="flex flex-col min-h-full">
                            {weeks.map((week, wIdx) => {
                                const { items, maxRows } = getItemsForWeek(week);
                                const minHeightPx = Math.max(80, (maxRows * 28) + 24);
                                return (
                                    <div key={wIdx} className="relative border-b dark:border-gray-700 w-full flex-1" style={{ minHeight: `${minHeightPx}px` }}>
                                        <div className="absolute inset-0 grid grid-cols-7 w-full h-full">
                                            {week.map((dateStr, dIdx) => {
                                                const dayNum = dateStr ? parseInt(dateStr.split('-')[2]) : '';
                                                const isSun = dIdx === 0; const isSat = dIdx === 6;
                                                const holidayName = dateStr && holidays[dateStr];
                                                return (
                                                    <div key={dIdx} className={`border-r p-1 dark:border-gray-700 ${!dateStr ? 'bg-gray-50 dark:bg-gray-900/50' : ''}`}>
                                                        {dateStr && (
                                                            <div className="flex justify-between items-start">
                                                                <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${dateStr === fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()) ? 'bg-indigo-600 text-white' : (isSun || holidayName ? 'text-red-500' : (isSat ? 'text-blue-500' : 'text-gray-700 dark:text-gray-300'))}`}>{dayNum}</span>
                                                                {holidayName && <span className="text-[10px] text-red-500 font-bold truncate max-w-[50px]">{holidayName}</span>}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="absolute inset-0 grid grid-cols-7 w-full h-full pointer-events-none mt-8 px-1">
                                            {items.map(item => {
                                                const isHovered = hoveredItemId === item.id;
                                                let styleClass = item.type === 'event'
                                                    ? `bg-purple-600 text-white rounded-md shadow-sm ${isHovered ? 'bg-purple-500 scale-[1.01] z-20 shadow-md' : 'opacity-90'}`
                                                    : `bg-green-100 text-green-900 border-green-600 border-[3px] rounded-md ${isHovered ? 'scale-[1.01] z-20 shadow-md' : ''}`;

                                                return (
                                                    <div key={`${item.type}-${item.id}`} className={`pointer-events-auto cursor-pointer transition-all absolute w-full ${styleClass}`} style={{ gridColumnStart: item.colStart, gridColumnEnd: `span ${item.colSpan}`, top: `${item.rowIndex * 28}px`, height: '24px', left: '2px', right: '2px', width: 'auto' }} onMouseEnter={() => setHoveredItemId(item.id)} onMouseLeave={() => setHoveredItemId(null)} onClick={(e) => { e.stopPropagation(); if (item.type === 'event') setSelectedEvent(item.data); else onOpenDoc(item.id); }}>
                                                        <div className="flex items-center gap-1 px-1.5 w-full h-full overflow-hidden">
                                                            <span className="font-bold truncate text-[11px]">{item.title}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    {renderPopup()}
                </div>
            );
        }

        /* [NAS 전용 수정] MonthlyReport: 순번 조정 및 api.php 저장 */
        function MonthlyReport({ docs, users, onUpdateUsers, reportFilter, onUpdateReportFilter }) {
            const [year, setYear] = useState(new Date().getFullYear());
            const [month, setMonth] = useState(new Date().getMonth() + 1);
            const [isFilterOpen, setIsFilterOpen] = useState(false);

            // 순서 편집 모드 및 임시 저장 상태
            const [isEditMode, setIsEditMode] = useState(false);
            const [tempOrders, setTempOrders] = useState({});

            // [수정] 이름 필터 (기존 직급 필터 대체)
            // reportFilter는 부모로부터 전달받은 배열 (이름 목록)

            const activeUsers = useMemo(() => {
                const todayStr = new Date().toISOString().split('T')[0];
                return users.filter(u => {
                    if (u.id === 'admin') return false;
                    const isResigned = u.resignDate && u.resignDate !== "" && u.resignDate <= todayStr;
                    const isExpired = u.isContract && u.contractEndDate && u.contractEndDate !== "" && u.contractEndDate < todayStr;
                    return !(isResigned || isExpired);
                });
            }, [users]);

            const allNames = useMemo(() => {
                return activeUsers.map(u => u.name).sort();
            }, [activeUsers]);

            // 필터 초기화: 저장된 필터가 없으면 전체 선택
            useEffect(() => {
                if ((!reportFilter || reportFilter.length === 0) && allNames.length > 0) {
                    // 단, 한 번이라도 저장이 된 적이 있는지 체크하는 로직이 필요할 수 있음
                    // 여기서는 reportFilter가 비어있으면 전체 이름으로 초기화
                    // 하지만 사용자가 의도적으로 다 해제했을 수도 있으므로,
                    // 앱 로딩 시 한 번만 수행되도록 하거나, App의 initData에서 처리하는 것이 좋음.
                }
            }, [allNames]);

            // [편집 모드 진입] 현재 순번을 입력창에 매핑
            useEffect(() => {
                if (isEditMode) {
                    const initialOrders = {};
                    users.forEach(user => {
                        const val = user.reportOrder;
                        initialOrders[user.id] = (val !== undefined && val !== null) ? String(val) : "";
                    });
                    setTempOrders(initialOrders);
                }
            }, [isEditMode, users]);

            // [데이터 필터링 및 정렬]
            const reportData = useMemo(() => {
                const todayStr = new Date().toISOString().split('T')[0];

                // 실제 적용할 필터 목록 (서버 로드 전이면 전체 선택 상태로 간주)
                const currentFilter = (reportFilter === null) ? allNames : reportFilter;

                // 1. 필터링
                const filtered = activeUsers.filter(u => {
                    if (currentFilter && currentFilter.length > 0) {
                        return currentFilter.includes(u.name);
                    }
                    return false; // 필터가 비어있으면(모두 해제) 아무도 표시 안 함
                });

                // 2. 정렬 (순번 오름차순 -> 이름 오름차순)
                const sorted = filtered.sort((a, b) => {
                    const orderA = (a.reportOrder !== undefined && a.reportOrder !== "" && a.reportOrder !== null) ? Number(a.reportOrder) : 9999;
                    const orderB = (b.reportOrder !== undefined && b.reportOrder !== "" && b.reportOrder !== null) ? Number(b.reportOrder) : 9999;

                    if (orderA !== orderB) return orderA - orderB;
                    return a.name.localeCompare(b.name);
                });

                // 3. 데이터 가공
                const targetMonthPrefix = `${year}-${String(month).padStart(2, '0')}`;
                return sorted.map(user => {
                    const userDocs = docs.filter(d =>
                        !d.isDeleted && d.status === 'approved' && d.authorId === user.id &&
                        d.type === 'vacation' && d.startDate.startsWith(targetMonthPrefix)
                    ).sort((a, b) => a.startDate.localeCompare(b.startDate));

                    let annualUsed = 0; let otherUsed = 0; const details = [];
                    userDocs.forEach(doc => {
                        const days = parseFloat(doc.vacationDays) || 0;
                        const typeInfo = LEAVE_TYPES[doc.leaveType] || LEAVE_TYPES.full;
                        if (typeInfo.deduct) annualUsed += days; else otherUsed += days;
                        const dateRange = doc.startDate === doc.endDate ? doc.startDate : `${doc.startDate} ~ ${doc.endDate}`;
                        details.push(`${dateRange}(${typeInfo.label.substr(0, 2)})`);
                    });

                    // [수정] totalUsed (합계) 속성 추가
                    return { ...user, annualUsed, otherUsed, totalUsed: annualUsed + otherUsed, detailStr: details.join(', ') };
                });
            }, [docs, users, year, month, reportFilter]);

            // [핵심] NAS(api.php) 저장 함수
            const saveOrders = async () => {
                const c = await window.customConfirm("순서를 저장하시겠습니까?"); if (!c) return;

                // 1. 화면 즉시 반영 (Optimistic Update)
                const newUsers = users.map(u => {
                    if (tempOrders[u.id] !== undefined) {
                        const val = tempOrders[u.id];
                        const newOrder = (val === "" || val === null) ? 9999 : Number(val);
                        return { ...u, reportOrder: newOrder };
                    }
                    return u;
                });

                if (onUpdateUsers) {
                    onUpdateUsers(newUsers); // 화면 갱신
                } else {
                    await window.customAlert("오류: App 컴포넌트에서 onUpdateUsers가 전달되지 않았습니다.");
                    return;
                }

                setIsEditMode(false);

                // 2. api.php로 데이터 전송 (MySQL 저장)
                try {
                    const response = await fetch('api.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            users: newUsers // 변경된 전체 사용자 목록 전송
                        })
                    });

                    if (!response.ok) throw new Error('Network response was not ok');
                    const resData = await response.json();

                    if (resData.success) {
                        console.log("DB 저장 완료");
                    } else {
                        await window.customAlert("저장 실패: " + (resData.message || "알 수 없는 오류"));
                    }
                } catch (err) {
                    console.error("API 저장 오류:", err);
                    await window.customAlert("저장 중 오류가 발생했습니다.");
                }
            };

            const toggleNameFilter = (name) => {
                const current = (reportFilter === null) ? allNames : reportFilter;
                const next = current.includes(name)
                    ? current.filter(n => n !== name)
                    : [...current, name];
                onUpdateReportFilter(next);
            };
            const toggleAllNames = () => {
                const current = (reportFilter === null) ? allNames : reportFilter;
                const next = current.length === allNames.length ? [] : [...allNames];
                onUpdateReportFilter(next);
            };

            // [추가] 이름 축약 로직
            const formatDisplayName = (name) => {
                if (!name) return "";
                if (name.length >= 5) {
                    const match = name.match(/\((.*?)\)/);
                    if (match && match[1]) {
                        return match[1]; // 괄호 안의 텍스트 반환
                    }
                }
                return name;
            };

            const handlePdfPreview = async () => {
                if (window.electronAPI) {
                    await window.electronAPI.printToPDF(`근태마감보고서_${year}년_${month}월`);
                } else {
                    window.print();
                }
            };

            // 아이콘 안전 정의
            const icons = window.LucideReact || {};
            const Printer = icons.Printer || (() => <span>🖨️</span>);
            const List = icons.List || (() => <span>≡</span>);
            const ChevronDown = icons.ChevronDown || (() => <span>▼</span>);
            const Settings = icons.Settings || (() => <span>⚙️</span>);
            const Check = icons.Check || (() => <span>✔️</span>);
            const FileText = icons.FileText || (() => <span>📄</span>);

            return (
                <div className="space-y-6 mb-20" onClick={() => setIsFilterOpen(false)}>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4 no-print">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2 self-start md:self-center">
                            <Printer size={24} /> <span className="whitespace-nowrap">월별 근태 보고서</span>
                        </h2>

                        <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-end">
                            {/* 순서 조정 버튼 */}
                            <button
                                onClick={() => setIsEditMode(!isEditMode)}
                                className={`flex items-center gap-2 px-4 py-2 rounded shadow border text-sm font-bold transition-all ${isEditMode ? 'bg-orange-500 text-white border-orange-600' : 'bg-white dark:bg-gray-800 dark:text-gray-200 dark:border-gray-600'}`}
                            >
                                {isEditMode ? <Check size={16} /> : <Settings size={16} />}
                                {isEditMode ? '조정 완료' : '순서 조정'}
                            </button>

                            {isEditMode && (
                                <button onClick={saveOrders} className="bg-blue-600 text-white px-4 py-2 rounded shadow text-sm font-bold hover:bg-blue-700 animate-pulse">
                                    저장하기
                                </button>
                            )}

                            {/* 이름 필터 */}
                            <div className="relative z-30">
                                <button
                                    onClick={(e) => { e.stopPropagation(); setIsFilterOpen(!isFilterOpen); }}
                                    className="flex justify-between items-center gap-2 bg-white dark:bg-gray-800 dark:text-white px-4 py-2 rounded shadow border dark:border-gray-600 text-sm font-bold"
                                >
                                    <span className="flex items-center gap-2"><Users size={16} /> 이름 ({(reportFilter === null ? allNames : reportFilter).length})</span>
                                    <ChevronDown size={14} />
                                </button>
                                {isFilterOpen && (
                                    <div className="absolute top-full right-0 mt-1 w-56 bg-white dark:bg-gray-700 border dark:border-gray-600 rounded-lg shadow-xl p-2" onClick={e => e.stopPropagation()}>
                                        <div className="flex justify-between items-center mb-2 px-2 border-b pb-2 dark:border-gray-600">
                                            <span className="text-xs font-bold text-gray-500 dark:text-gray-300">이름 선택</span>
                                            <button onClick={toggleAllNames} className="text-xs text-blue-600 hover:underline dark:text-blue-400">
                                                {(reportFilter === null ? allNames : reportFilter).length === allNames.length ? '해제' : '전체'}
                                            </button>
                                        </div>
                                        <div className="max-h-60 overflow-y-auto space-y-1 custom-scrollbar">
                                            {allNames.map(name => {
                                                const isChecked = (reportFilter === null) ? true : reportFilter.includes(name);
                                                return (
                                                    <label key={name} className="flex items-center gap-2 px-2 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 rounded cursor-pointer text-sm dark:text-white">
                                                        <input
                                                            type="checkbox"
                                                            checked={isChecked}
                                                            onChange={() => toggleNameFilter(name)}
                                                            className="rounded text-indigo-600 focus:ring-indigo-500"
                                                        />
                                                        <span>{name}</span>
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 날짜 선택 및 버튼 */}
                            <div className="flex items-center gap-2 bg-white dark:bg-gray-800 dark:border-gray-600 p-2 rounded shadow border">
                                <div className="flex items-center gap-1 bg-gray-100 dark:bg-gray-700 rounded px-2 py-1">
                                    <button onClick={() => setYear(year - 1)} className="p-1 hover:bg-gray-200 rounded dark:hover:bg-gray-600 dark:text-white"><ChevronDown size={14} className="rotate-90" /></button>
                                    <span className="font-bold w-12 text-center dark:text-white text-sm">{year}</span>
                                    <button onClick={() => setYear(year + 1)} className="p-1 hover:bg-gray-200 rounded dark:hover:bg-gray-600 dark:text-white"><ChevronDown size={14} className="-rotate-90" /></button>
                                </div>
                                <select value={month} onChange={(e) => setMonth(Number(e.target.value))} className="font-bold bg-transparent outline-none cursor-pointer dark:text-white text-sm px-1 dark:[&>option]:bg-gray-800">
                                    {Array.from({ length: 12 }, (_, i) => i + 1).map(m => (
                                        <option key={m} value={m}>{m}월</option>
                                    ))}
                                </select>
                                <div className="w-px h-4 bg-gray-300 mx-1"></div>
                                <button onClick={handlePdfPreview} className="text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 font-bold text-sm px-1 flex items-center gap-1"><FileText size={14} /> PDF</button>
                                <button onClick={() => window.print()} className="text-slate-700 hover:text-slate-900 dark:text-slate-300 font-bold text-sm px-1 flex items-center gap-1"><Printer size={14} /> 인쇄</button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-gray-200 dark:bg-gray-900 p-4 md:p-8 flex justify-center overflow-hidden rounded-lg min-h-[500px]">
                        <FitScreenWrapper>
                            <div className="paper bg-white text-black shadow-2xl p-10 min-h-[297mm] w-[210mm] relative box-border">
                                <div className="text-center border-b-2 border-black pb-4 mb-6">
                                    <h1 className="text-3xl font-extrabold underline decoration-double decoration-1 underline-offset-4">
                                        {year}년 {month}월 근태 마감 보고서
                                    </h1>
                                    <p className="text-sm mt-2 text-gray-600">작성일: {new Date().toLocaleDateString()}</p>
                                </div>

                                <div className="flex justify-end mb-8">
                                    <div className="flex border border-black text-center">
                                        <div className="w-20"><div className="bg-gray-100 border-b border-black py-1 text-xs font-bold">작성</div><div className="h-16"></div></div>
                                        <div className="w-20 border-l border-black"><div className="bg-gray-100 border-b border-black py-1 text-xs font-bold">검토</div><div className="h-16"></div></div>

        /* [수정 6] TrashView: 휴지통 관리 (안전한 커스텀 모달 적용) */
        function TrashView({ docs, onRestore, onPermDelete, onEmptyTrash, onBack }) {

        /* [수정 23] DocWriter: 모바일 반응형 입력 폼 적용 (세로 배치) */
        function DocWriter({ users, settings, onSubmit, onCancel, getLeaveStats, editTarget, holidays }) {
            const type = 'vacation';
            const [docDate, setDocDate] = useState(editTarget ? editTarget.createdAt : getToday());
            const [authorId, setAuthorId] = useState(editTarget ? editTarget.authorId : '');
            const [formData, setFormData] = useState({
                title: editTarget ? editTarget.title : '연차 신청합니다',
                content: editTarget ? editTarget.content : '',
                startDate: editTarget ? editTarget.startDate : getToday(),
                endDate: editTarget ? editTarget.endDate : getToday(),
                leaveType: editTarget ? editTarget.leaveType : 'full',
                vacationDays: editTarget ? editTarget.vacationDays : 1
            });
            const [leaveInfo, setLeaveInfo] = useState(null);

            const presets = settings.approvalLinePresets || [];
            const [lineMode, setLineMode] = useState(() => {
                if (editTarget && editTarget.approvalLineSnapshot && editTarget.approvalLineSnapshot.length > 0) return 'manual';
                return presets.length > 0 ? 'preset' : 'manual';
            });
            const [selectedPresetId, setSelectedPresetId] = useState('');

            const [manualAppr1, setManualAppr1] = useState(editTarget?.approvalLineSnapshot?.[0] || '');
            const [manualAppr2, setManualAppr2] = useState(editTarget?.approvalLineSnapshot?.[1] || '');

            const [warningModal, setWarningModal] = useState(null);
            const [formError, setFormError] = useState('');

            useEffect(() => { if (!manualAppr1) setManualAppr2(''); }, [manualAppr1]);

            useEffect(() => {
                if (authorId) {
                    const targetYear = new Date(formData.startDate).getFullYear();
                    const stats = getLeaveStats(authorId, targetYear);
                    setLeaveInfo({ ...stats, year: targetYear });
                } else {
                    setLeaveInfo(null);
                }
            }, [authorId, formData.startDate, getLeaveStats]);

            // [수정] 휴가 일수 계산 (평일만 카운트)
            useEffect(() => {
                const typeInfo = LEAVE_TYPES[formData.leaveType];

                // 1. 반차(0.5일) 등 고정값이 있는 경우
                if (typeInfo && typeInfo.val) {
                    setFormData(prev => ({ ...prev, vacationDays: typeInfo.val }));
                }
                else {
                    // 2. 일반 연차(일수 계산)
                    if (!formData.startDate || !formData.endDate) return;

                    const start = new Date(formData.startDate);
                    const end = new Date(formData.endDate);

                    // 종료일이 시작일보다 앞서면 0일 처리
                    if (end < start) {
                        setFormData(prev => ({ ...prev, vacationDays: 0 }));
                        return;
                    }

                    let count = 0;
                    let curDate = new Date(start);

                    while (curDate <= end) {
                        const year = curDate.getFullYear();
                        const month = String(curDate.getMonth() + 1).padStart(2, '0');
                        const day = String(curDate.getDate()).padStart(2, '0');
                        const dateStr = `${year}-${month}-${day}`;

                        const dayOfWeek = curDate.getDay(); // 0:일, 6:토

                        // (1) 주말 체크
                        const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

                        // (2) 공휴일 체크 (넘겨받은 holidays 객체 확인)
                        // holidays[dateStr]에 값이 있으면(공휴일 이름 등) true로 인식
                        const isHoliday = (holidays && holidays[dateStr]);

                        // 주말도 아니고, 공휴일도 아닐 때만 카운트 증가
                        if (!isWeekend && !isHoliday) {
                            count++;
                        }

                        // 다음 날짜로 이동
                        curDate.setDate(curDate.getDate() + 1);
                    }

                    setFormData(prev => ({ ...prev, vacationDays: count }));
                }
            }, [formData.startDate, formData.endDate, formData.leaveType, holidays]); // 의존성 배열에 holidays 필수

            const executeSubmit = () => {
                let finalApprovalLine = [];
                if (lineMode === 'preset') {
                    const preset = presets.find(p => p.id == selectedPresetId);
                    if (preset) finalApprovalLine = preset.line;
                } else {
                    if (manualAppr1) finalApprovalLine.push(manualAppr1);
                    if (manualAppr2) finalApprovalLine.push(manualAppr2);
                }

                const author = users.find(u => u.id === authorId);
                onSubmit({
                    type, authorId, authorName: author.name, authorRank: author.rank,
                    approvalLine: finalApprovalLine,
                    createdAt: docDate,
                    ...formData
                });
                setWarningModal(null);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setFormError('');

                if (!authorId) { setFormError('기안자를 선택해주세요.'); return; }
                if (lineMode === 'preset' && !selectedPresetId) { setFormError('자주 쓰는 결재선을 선택해주세요.'); return; }

                const typeInfo = LEAVE_TYPES[formData.leaveType];
                if (typeInfo && typeInfo.deduct) {
                    const originalUsed = editTarget ? parseFloat(editTarget.vacationDays) : 0;
                    const realRemain = (leaveInfo ? (leaveInfo.remain + originalUsed) : 0);

                    if (formData.vacationDays > realRemain) {
                        setWarningModal({ remain: realRemain, request: formData.vacationDays });
                        return;
                    }
                }
                executeSubmit();
            }

            const getApproverOptions = (excludeId) => {
                return users.filter(u => u.id !== 'admin' && u.id !== authorId && u.id !== excludeId);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-lg shadow-lg dark:bg-gray-800 dark:text-gray-100 relative mb-20">
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                        <Calendar className="text-indigo-600" /> {editTarget ? '문서 수정' : '휴가 신청서 작성'}
                    </h2>

                    {editTarget && (
                        <div className="mb-4 p-3 bg-orange-50 border border-orange-200 rounded text-sm text-orange-800 dark:bg-orange-900/30 dark:border-orange-800 dark:text-orange-200">
                            📢 문서를 수정하면 결재 진행 상태는 '대기'로 유지되지만, 내용은 변경됩니다.
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-4">
                        {/* [반응형 수정] 모바일(기본): 1열, PC(md): 2열 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-bold mb-1">기안자 (신청자)</label>
                                <select className="w-full border p-2 rounded bg-white text-black dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={authorId} onChange={e => setAuthorId(e.target.value)} required disabled={!!editTarget}>
                                    <option value="">-- 본인 이름 선택 --</option>
                                    {users.filter(u => u.id !== 'admin').map(u => <option key={u.id} value={u.id}>{u.name} ({u.rank})</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-1 text-gray-700 dark:text-gray-300">기안 일자</label>
                                <input type="date" className="w-full border p-2 rounded bg-white text-black dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={docDate} onChange={(e) => setDocDate(e.target.value)} required />
                            </div>
                        </div>

                        {leaveInfo && (
                            <div className="text-right">
                                <p className="text-xs text-blue-600 dark:text-blue-300 font-bold">[{leaveInfo.year}년] 잔여 연차: {(leaveInfo.remain).toFixed(1)}일</p>
                            </div>
                        )}

                        <div className="bg-gray-50 dark:bg-gray-900 p-4 rounded border dark:border-gray-700">
                            <label className="block text-sm font-bold mb-2 flex items-center gap-2"><Users size={16} /> 결재 라인 지정</label>
                            <div className="flex gap-4 mb-3 text-sm">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="lineMode" checked={lineMode === 'preset'} onChange={() => setLineMode('preset')} disabled={presets.length === 0} /> 자주 쓰는 결재선</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="lineMode" checked={lineMode === 'manual'} onChange={() => setLineMode('manual')} /> 직접 지정</label>
                            </div>
                            {lineMode === 'preset' ? (
                                <select className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={selectedPresetId} onChange={e => setSelectedPresetId(e.target.value)}>
                                    <option value="">-- 결재선 선택 --</option>
                                    {presets.map(p => (<option key={p.id} value={p.id}>{p.name} ({p.line.map(uid => users.find(u => u.id === uid)?.name).join(' → ')})</option>))}
                                </select>
                            ) : (
                                <div className="space-y-3">
                                    {/* [반응형 수정] 결재선 선택 폼 개선 */}
                                    <div className="flex flex-col md:grid md:grid-cols-3 gap-1 md:gap-2 md:items-center text-sm">
                                        <div className="font-bold text-gray-500">1차 검토자</div>
                                        <div className="md:col-span-2">
                                            <select className="border p-2 rounded w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={manualAppr1} onChange={e => setManualAppr1(e.target.value)}>
                                                <option value="">(검토자 없음)</option>
                                                {getApproverOptions(null).map(u => <option key={u.id} value={u.id}>{u.name} ({u.rank})</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex flex-col md:grid md:grid-cols-3 gap-1 md:gap-2 md:items-center text-sm">
                                        <div className="font-bold text-gray-500">2차 검토자</div>
                                        <div className="md:col-span-2">
                                            <select className="border p-2 rounded w-full dark:bg-gray-700 dark:border-gray-600 dark:text-white disabled:opacity-50 disabled:bg-gray-200" value={manualAppr2} onChange={e => setManualAppr2(e.target.value)} disabled={!manualAppr1}>
                                                <option value="">(검토자 없음)</option>
                                                {getApproverOptions(manualAppr1).map(u => <option key={u.id} value={u.id}>{u.name} ({u.rank})</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div><label className="block text-sm font-bold mb-1">제목</label><input type="text" className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={formData.title} onChange={e => setFormData({ ...formData, title: e.target.value })} required /></div>

                        <div className="bg-blue-50 p-4 rounded border border-blue-100 dark:bg-blue-900/20 dark:border-blue-900">
                            {/* [반응형 수정] Flex Row -> Flex Col (모바일 세로 배치) */}
                            <div className="flex flex-col md:flex-row gap-4 mb-2">
                                <div className="w-full md:w-1/3">
                                    <label className="block text-xs font-bold mb-1">유형</label>
                                    <select className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={formData.leaveType} onChange={e => setFormData({ ...formData, leaveType: e.target.value })}>
                                        {Object.entries(LEAVE_TYPES).map(([key, info]) => (<option key={key} value={key}>{info.label}</option>))}
                                    </select>
                                </div>
                                <div className="w-full md:w-1/3">
                                    <label className="block text-xs font-bold mb-1">시작일</label>
                                    <input
                                        type="date"
                                        className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                        value={formData.startDate}
                                        onChange={e => {
                                            const newStartDate = e.target.value;
                                            // [핵심 변경] 시작일이 현재 종료일보다 늦을 때만 종료일을 시작일로 맞춤 (그 외에는 유지)
                                            const newEndDate = newStartDate > formData.endDate ? newStartDate : formData.endDate;

                                            setFormData({ ...formData, startDate: newStartDate, endDate: newEndDate });
                                        }}
                                    />
                                </div>
                                <div className="w-full md:w-1/3"><label className="block text-xs font-bold mb-1">종료일</label><input type="date" className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={formData.endDate} onChange={e => setFormData({ ...formData, endDate: e.target.value })} disabled={LEAVE_TYPES[formData.leaveType]?.val} /></div>
                            </div>
                            <p className="text-right text-sm font-bold text-blue-600 dark:text-blue-300">
                                {LEAVE_TYPES[formData.leaveType]?.deduct ? '차감 일수' : '사용 일수 (미차감)'}: {formData.vacationDays}일
                            </p>
                        </div>

                        <div><label className="block text-sm font-bold mb-1">사유 (내용)</label><textarea className="w-full border p-2 rounded h-40 dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={formData.content} onChange={e => setFormData({ ...formData, content: e.target.value })} required placeholder="휴가 사유를 입력하세요."></textarea></div>

                        {formError && (
                            <div className="text-red-500 text-sm font-bold bg-red-50 p-2 rounded flex items-center justify-center gap-1 dark:bg-red-900/30 dark:text-red-300 animate-pulse">
                                <Ban size={16} /> {formError}
                            </div>
                        )}

                        <div className="flex justify-end gap-2 pt-4">
                            <button type="button" onClick={onCancel} className="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded dark:text-gray-300 dark:hover:bg-gray-700">취소</button>
                            <button type="submit" className="px-6 py-2 bg-orange-600 text-white font-bold rounded hover:bg-orange-700">{editTarget ? '수정 완료' : '신청 완료'}</button>
                        </div>
                    </form>

                    {warningModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm" onClick={() => setWarningModal(null)}>
                            <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-xl shadow-2xl p-6 transform scale-100 animate-fade-in-up border-t-4 border-amber-500" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 text-amber-500 mb-4">
                                    <div className="bg-amber-100 p-2 rounded-full"><Ban size={24} /></div>
                                    <h3 className="text-lg font-bold dark:text-amber-400">잔여 연차 부족</h3>
                                </div>
                                <p className="text-gray-600 dark:text-gray-300 mb-4 text-sm leading-relaxed">
                                    신청하려는 연차가 보유한 잔여 연차보다 많습니다.
                                </p>
                                <div className="bg-gray-100 dark:bg-gray-700 p-3 rounded mb-6 text-sm">
                                    <div className="flex justify-between mb-1"><span>보유 연차:</span> <span className="font-bold">{warningModal.remain.toFixed(1)}일</span></div>
                                    <div className="flex justify-between mb-1"><span>신청 연차:</span> <span className="font-bold text-red-500">{warningModal.request}일</span></div>
                                    <div className="flex justify-between border-t pt-1 mt-1 border-gray-300"><span>초과 일수:</span> <span className="font-bold text-red-600">{(warningModal.request - warningModal.remain).toFixed(1)}일</span></div>
                                </div>
                                <p className="text-xs text-gray-500 mb-6 text-center">계속 진행하면 연차가 마이너스(-)로 차감됩니다.</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setWarningModal(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                    <button onClick={executeSubmit} className="px-4 py-2 bg-amber-500 text-white rounded-lg font-bold hover:bg-amber-600 shadow">무시하고 진행</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* [수정 56] EditUserModal: 도장 업로드 추가 & 모바일 입력창(생일/구역) 확장 */
        function EditUserModal({ user, onClose, onSave, onRenew, onUpdateUser, onUndoRenew }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            // EditUserModal 컴포넌트 내부
            const [formData, setFormData] = useState({
                ...user,
                // isContract가 "0", 0, false, null 등 무엇이든 정확히 불리언으로 변환
                isContract: !!user.isContract,
                gender: user.gender || 'male',
                rrnBack: user.rrnBack || '',
                email: user.email || ''
            });
            const [mode, setMode] = useState('edit');

            const [confirmConfig, setConfirmConfig] = useState({ type: null, payload: null });

            const thisYear = new Date().getFullYear();
            const [renewStart, setRenewStart] = useState(`${thisYear + 1}-01-01`);
            const [renewEnd, setRenewEnd] = useState(`${thisYear + 1}-12-31`);
            const [dateTarget, setDateTarget] = useState('start');

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            // [신규] 도장 이미지 파일 업로드 핸들러
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setFormData(prev => ({ ...prev, signature: ev.target.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => { e.preventDefault(); onSave(formData); };

            // ... (기존 날짜 퀵 버튼 로직 유지) ...
            const handleQuickDate = (type, value) => {
                const targetValue = dateTarget === 'start' ? renewStart : renewEnd;
                const [y, m, d] = targetValue.split('-').map(Number);
                let newDateStr = targetValue;
                if (type === 'year') newDateStr = `${value}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (type === 'month') newDateStr = `${y}-${String(value).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (type === 'day') newDateStr = `${y}-${String(m).padStart(2, '0')}-${String(value).padStart(2, '0')}`;
                if (dateTarget === 'start') setRenewStart(newDateStr); else setRenewEnd(newDateStr);
            };
            const setNextYearDefault = () => { setRenewStart(`${thisYear + 1}-01-01`); setRenewEnd(`${thisYear + 1}-12-31`); };
            const handleRenewRequest = () => { if (!renewStart || !renewEnd) return; setConfirmConfig({ type: 'renew' }); };
            const handleDeleteHistoryRequest = (idx) => { setConfirmConfig({ type: 'delete_history', payload: idx }); };
            const executeAction = () => {
                const { type, payload } = confirmConfig;
                if (type === 'renew') { onRenew(user.id, renewStart, renewEnd); onClose(); }
                else if (type === 'delete_history') {
                    const newHistory = [...(formData.contractHistory || [])];
                    const originalIdx = newHistory.length - 1 - payload;
                    newHistory.splice(originalIdx, 1);
                    setFormData({ ...formData, contractHistory: newHistory });
                } else if (type === 'save_history') { onUpdateUser(formData); }
                setConfirmConfig({ type: null, payload: null });
            };
            const handleHistoryChange = (idx, field, value) => {
                const newHistory = [...(formData.contractHistory || [])];
                const originalIdx = newHistory.length - 1 - idx;
                newHistory[originalIdx] = { ...newHistory[originalIdx], [field]: value };
                if (field === 'startDate' || field === 'endDate') { const s = field === 'startDate' ? value : newHistory[originalIdx].startDate; newHistory[originalIdx].period = `${s.split('-')[0]}년 계약`; }
                setFormData({ ...formData, contractHistory: newHistory });
            };
            const saveHistoryChanges = () => { onUpdateUser(formData); };

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex justify-center items-center p-4 overflow-y-auto">
                    <div className={`bg-white dark:bg-gray-800 w-full ${mode === 'contract_manage' ? 'max-w-5xl' : 'max-w-2xl'} rounded-xl shadow-2xl overflow-hidden animate-fade-in-up transition-all duration-300 my-auto`}>
                        <div className="p-5 border-b flex justify-between items-center bg-indigo-600 text-white sticky top-0 z-10">
                            <h2 className="text-xl font-bold">
                                {mode === 'contract_manage' ? '계약 갱신 및 이력 관리' : '사원 정보 수정'}
                            </h2>
                            <button onClick={onClose}><X /></button>
                        </div>

                        {mode === 'contract_manage' ? (
                            // ... (계약 관리 화면 기존 코드 유지) ...
                            <div className="flex flex-col md:flex-row h-[80vh]">
                                <div className="w-full md:w-1/2 p-6 border-r dark:border-gray-700 bg-gray-50 dark:bg-gray-900 overflow-y-auto">
                                    <h3 className="font-bold text-lg text-indigo-600 dark:text-indigo-400 mb-4 flex items-center gap-2"><PenTool size={18} /> 새 계약 / 갱신 입력</h3>
                                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-sm border dark:border-gray-700 mb-6">
                                        <div className="flex justify-between items-center mb-4"><span className="text-sm font-bold text-gray-500">기간 입력</span><button onClick={setNextYearDefault} className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold hover:bg-indigo-200">+1년 자동설정</button></div>
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div onClick={() => setDateTarget('start')} className={`cursor-pointer p-2 rounded border-2 transition-all ${dateTarget === 'start' ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : 'border-transparent bg-gray-100 dark:bg-gray-700'}`}><label className="block text-xs font-bold text-gray-500 mb-1">시작일</label><input type="date" className="w-full bg-transparent font-bold outline-none dark:text-white" value={renewStart} onChange={e => setRenewStart(e.target.value)} /></div>
                                            <div onClick={() => setDateTarget('end')} className={`cursor-pointer p-2 rounded border-2 transition-all ${dateTarget === 'end' ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : 'border-transparent bg-gray-100 dark:bg-gray-700'}`}><label className="block text-xs font-bold text-gray-500 mb-1">종료일</label><input type="date" className="w-full bg-transparent font-bold outline-none dark:text-white" value={renewEnd} onChange={e => setRenewEnd(e.target.value)} /></div>
                                        </div>
                                        <div className="space-y-3"><div><span className="text-[10px] font-bold text-gray-400 block mb-1">연도 (Year)</span><div className="flex flex-wrap gap-1">{Array.from({ length: 5 }, (_, i) => thisYear - 2 + i).map(y => (<button key={y} onClick={() => handleQuickDate('year', y)} className="flex-1 py-1 text-xs bg-gray-100 hover:bg-indigo-100 rounded border border-gray-200 dark:bg-gray-700 dark:border-gray-600 dark:text-white">{y}</button>))}<button onClick={() => handleQuickDate('year', thisYear + 1)} className="flex-1 py-1 text-xs bg-indigo-100 text-indigo-700 font-bold rounded border border-indigo-200 hover:bg-indigo-200">내년</button></div></div><div><span className="text-[10px] font-bold text-gray-400 block mb-1">월 (Month)</span><div className="grid grid-cols-6 gap-1">{Array.from({ length: 12 }, (_, i) => i + 1).map(m => (<button key={m} onClick={() => handleQuickDate('month', m)} className="py-1 text-xs bg-white hover:bg-gray-100 rounded border border-gray-200 dark:bg-gray-700 dark:border-gray-600 dark:text-white">{m}월</button>))}</div></div><div><span className="text-[10px] font-bold text-gray-400 block mb-1">일 (Day)</span><div className="grid grid-cols-7 gap-1">{[1, 5, 10, 15, 20, 25, 30, 31].map(d => (<button key={d} onClick={() => handleQuickDate('day', d)} className="py-1 text-xs bg-white hover:bg-gray-100 rounded border border-gray-200 dark:bg-gray-700 dark:border-gray-600 dark:text-white">{d}일</button>))}</div></div></div>
                                    </div>
                                    <button onClick={handleRenewRequest} className="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition-transform hover:scale-[1.02]">입력한 내용으로 계약 갱신 (저장)</button>
                                    <div className="mt-4 text-center"><button onClick={() => setMode('edit')} className="text-sm text-gray-500 hover:underline">← 사원 정보 수정으로 돌아가기</button></div>
                                </div>
                                <div className="w-full md:w-1/2 p-6 overflow-y-auto bg-white dark:bg-gray-800">
                                    <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-lg text-gray-700 dark:text-gray-200 flex items-center gap-2"><ClipboardList size={18} /> 계약 이력 관리</h3><button onClick={saveHistoryChanges} className="text-xs bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 shadow">이력 수정사항 저장</button></div>
                                    <div className="space-y-3">
                                        <div className="p-4 rounded-lg border-2 border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20 dark:border-indigo-500 relative"><span className="absolute top-0 right-0 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded-bl-lg font-bold">현재 진행 중</span><div className="text-sm font-bold text-indigo-900 dark:text-indigo-100 mb-1">{formData.joinDate.split('-')[0]}년 계약</div><div className="flex gap-2 text-sm"><input type="date" className="border rounded p-1 w-32 bg-white" value={formData.joinDate} disabled title="현재 계약은 왼쪽 갱신 패널에서 수정하세요" /><span className="self-center">~</span><input type="date" className="border rounded p-1 w-32 bg-white" value={formData.contractEndDate} disabled title="현재 계약은 왼쪽 갱신 패널에서 수정하세요" /></div></div>
                                        {(!formData.contractHistory || formData.contractHistory.length === 0) ? (<div className="text-center py-10 text-gray-400 border border-dashed rounded-lg">과거 이력이 없습니다.</div>) : ([...formData.contractHistory].reverse().map((h, idx) => (<div key={idx} className="p-4 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:border-gray-600 transition-all group"><div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-gray-500 dark:text-gray-400">{h.period} (Archive)</span><button onClick={() => handleDeleteHistoryRequest(idx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={14} /></button></div><div className="flex gap-2 text-sm"><input type="date" className="border rounded p-1 w-32 dark:bg-gray-600 dark:border-gray-500 dark:text-white" value={h.startDate} onChange={(e) => handleHistoryChange(idx, 'startDate', e.target.value)} /><span className="self-center text-gray-400">~</span><input type="date" className="border rounded p-1 w-32 dark:bg-gray-600 dark:border-gray-500 dark:text-white" value={h.endDate} onChange={(e) => handleHistoryChange(idx, 'endDate', e.target.value)} /></div></div>)))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* [수정] 기본 정보 수정 모드 (모바일 레이아웃 개선) */
                            <form onSubmit={handleSubmit} className="p-6 overflow-y-auto max-h-[80vh] custom-scrollbar">

                                {/* 1. 기본 정보 및 도장 업로드 영역 */}
                                <div className="flex flex-col md:flex-row gap-6 mb-6">
                                    {/* [신규] 도장 이미지 업로드 */}
                                    <div className="flex flex-col items-center justify-center space-y-2">
                                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400">직인(도장)</label>
                                        <label className="w-24 h-24 rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors overflow-hidden relative group">
                                            {formData.signature ? (
                                                <img src={formData.signature} alt="stamp" className="w-full h-full object-contain p-1" />
                                            ) : (
                                                <div className="text-center text-gray-400 text-xs">
                                                    <Upload size={20} className="mx-auto mb-1" />
                                                    <span>업로드</span>
                                                </div>
                                            )}
                                            {/* 호버 시 오버레이 */}
