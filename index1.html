                    )}

                    {deleteTargetId && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm" onClick={() => setDeleteTargetId(null)}>
                            <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-xl shadow-2xl p-6 transform scale-100 animate-fade-in-up border-t-4 border-red-600" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 text-red-600 mb-4">
                                    <div className="bg-red-100 p-2 rounded-full"><Trash2 size={24} /></div>
                                    <h3 className="text-lg font-bold dark:text-red-400">행사 삭제</h3>
                                </div>
                                <p className="text-gray-600 dark:text-gray-300 mb-6">
                                    정말로 이 행사를 삭제하시겠습니까?<br />
                                    삭제된 데이터는 복구할 수 없습니다.
                                </p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setDeleteTargetId(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                    <button onClick={confirmDelete} className="px-4 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow">삭제하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* --- [신규 추가] 상세 시간 입력 모달 (우클릭 시 등장) --- */
        function AttendanceModal({ isOpen, onClose, log, date, userName, onSave }) {
            if (!isOpen) return null;


            // 초기값 설정
            const [overtime, setOvertime] = useState(log?.overtime || 0);
            const [shortTime, setShortTime] = useState(log?.short_time || 0);
            const [note, setNote] = useState(log?.note || '');
            const [isMeal, setIsMeal] = useState(log?.is_meal !== undefined ? log.is_meal : 1);

            const handleSave = async () => {
                onSave({ overtime: Number(overtime), short_time: Number(shortTime), note, is_meal: Number(isMeal) });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onClose}>
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-80" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold mb-4 border-b pb-2 dark:text-white">
                            🕒 상세 근무 설정 <span className="text-sm font-normal text-gray-500">({userName}, {date})</span>
                        </h3>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-1">연장 근무 (+시간)</label>
                                <div className="flex items-center gap-2">
                                    <input type="number" step="0.5" min="0" value={overtime} onChange={e => setOvertime(e.target.value)} className="w-full border p-2 rounded dark:bg-gray-700 dark:text-white" />
                                    <span className="text-gray-500 text-sm">시간</span>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-1">조퇴/지각 (-시간)</label>
                                <div className="flex items-center gap-2">
                                    <input type="number" step="0.5" min="0" value={shortTime} onChange={e => setShortTime(e.target.value)} className="w-full border p-2 rounded dark:bg-gray-700 dark:text-white" />
                                    <span className="text-gray-500 text-sm">시간</span>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-1">비고</label>
                                <input type="text" value={note} onChange={e => setNote(e.target.value)} className="w-full border p-2 rounded dark:bg-gray-700 dark:text-white" placeholder="사유 입력" />
                            </div>

                            <div>
                                <label className="flex items-center gap-2 text-sm font-bold text-gray-600 dark:text-gray-300 mt-2 cursor-pointer">
                                    <input type="checkbox" checked={isMeal === 1} onChange={e => setIsMeal(e.target.checked ? 1 : 0)} className="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                    식대 포함
                                </label>
                            </div>

                            <div className="pt-2 flex justify-end gap-2">
                                <button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 text-sm font-bold">취소</button>
                                <button onClick={handleSave} className="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 text-sm font-bold">저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ▼▼▼ [최종 완성] 기능 완벽 보존 + 고품격 UI + 연도/월 내비게이션 분리 ▼▼▼ */
        /* ▼▼▼ [최종 완성] 기존 기능 100% 유지 + 일용직 월별 관리 로직 추가 ▼▼▼ */
        /* ▼▼▼ [최종 UI 개선] 정직원/일용직 섹션 완벽 분리 버전 ▼▼▼ */
        function AttendanceManager({
            users,
            attendanceLogs,
            setAttendanceLogs,
            isAdmin,
            holidays,
            customHolidays,
            setAttendanceNotes,
            attendanceNotes,
            docs,
            settings,
            getLeaveStats,
            dailyLogs,
            setDailyLogs,
            dailyWorkerNames,
            setDailyWorkerNames,
            /* ▼▼▼ [수정] 식대 관련 Props 받기 (Map으로 변경) ▼▼▼ */
            mealConfigMap,
            mealData,
            onUpdateSettings,
            onUpdateMeal
        }) {
            // 아이콘 정의
            const icons = window.LucideReact || window.lucide || {};
            const ChevronLeft = icons.ChevronLeft || (() => <span>◀</span>);
            const ChevronRight = icons.ChevronRight || (() => <span>▶</span>);
            const ChevronDown = icons.ChevronDown || (() => <span>▼</span>);
            const Clipboard = icons.Clipboard || (() => <span>📋</span>);
            const BarChart2 = icons.BarChart2 || (() => <span>📊</span>);
            const ArrowLeft = icons.ArrowLeft || (() => <span>⬅</span>);
            const FileText = icons.FileText || (() => <span>📄</span>);
            const X = icons.X || (() => <span>×</span>);
            const Plus = icons.Plus || (() => <span>+</span>);
            const UserCheck = icons.UserCheck || (() => <span>👤</span>); // 정직원 아이콘
            const HardHat = icons.HardHat || (() => <span>👷</span>);   // 일용직 아이콘

            const [year, setYear] = useState(new Date().getFullYear());
            const [month, setMonth] = useState(new Date().getMonth() + 1);
            const [modalData, setModalData] = useState(null);
            // [신규] 일별 일괄 수정 모달 상태
            const [dailyBatchTarget, setDailyBatchTarget] = useState(null); // { date: '2024-01-01', type: 'user' }
            const [newWorkerName, setNewWorkerName] = useState("");
            const [showDashboard, setShowDashboard] = useState(false);

            const daysInMonth = new Date(year, month, 0).getDate();
            const dates = Array.from({ length: daysInMonth }, (_, i) => i + 1);
            const currentMonthKey = `${year}-${String(month).padStart(2, '0')}`;

            /* ▼▼▼ [추가] 현재 월의 식대 설정 가져오기 (없으면 기본값 적용) ▼▼▼ */
            const currentMealConfig = (mealConfigMap && mealConfigMap[`cfg_${currentMonthKey}`]) || { use: false, price: 5000 };
            const useMeal = currentMealConfig.use; // 이 변수가 아래 렌더링 로직에서 그대로 쓰입니다.
            const mealPrice = Number(currentMealConfig.price);

            // --- [로직 영역] (기존과 동일) ---

            const getDayInfo = (d) => {
                const dateObj = new Date(year, month - 1, d);
                const dayOfWeek = dateObj.getDay();
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isHoliday = (holidays && holidays[dateStr]) || (customHolidays && customHolidays[dateStr]);
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                return { isWeekend, isHoliday, dateStr, dayOfWeek };
            };

            const logMap = useMemo(() => {
                const map = {};
                attendanceLogs.forEach(log => map[`user_${log.user_id}_${log.date}`] = log);
                if (dailyLogs) dailyLogs.forEach(log => map[`daily_${log.worker_name}_${log.date}`] = log);
                return map;
            }, [attendanceLogs, dailyLogs]);

            // [신규] 조회 월 기준, 입사 전인 직원은 명단에서 아예 제외하기
            const filteredUsers = users.filter(user => {
                const joinDate = user.joinDate || user.join_date;
                if (!joinDate) return true; // 입사일 정보 없으면 일단 표시

                // 조회 중인 달의 마지막 날짜 구하기 (예: 2024-01-31)
                const lastDayOfMonth = new Date(year, month, 0).getDate();
                const currentMonthEnd = `${year}-${String(month).padStart(2, '0')}-${String(lastDayOfMonth).padStart(2, '0')}`;

                // 입사일이 조회 월의 마지막 날보다 미래라면 -> 아직 입사 전이므로 명단 제외
                if (joinDate > currentMonthEnd) return false;

                return true;
            });

            // [신규] 연차/반차/기타 문서 맵핑 (자동 연동용)
            const docMap = useMemo(() => {
                const map = {};
                (docs || []).forEach(doc => {
                    if (doc.status !== 'approved' || doc.isDeleted) return;
                    const start = new Date(doc.startDate);
                    const end = new Date(doc.endDate);
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        const dateStr = d.toISOString().split('T')[0];
                        map[`user_${doc.authorId}_${dateStr}`] = doc;
                    }
                });
                return map;
            }, [docs]);

            const activeDailyWorkers = useMemo(() => {
                let names = [];
                if (dailyWorkerNames && !Array.isArray(dailyWorkerNames) && dailyWorkerNames[currentMonthKey]) {
                    names = [...dailyWorkerNames[currentMonthKey]];
                } else if (Array.isArray(dailyWorkerNames)) {
                    names = [...dailyWorkerNames];
                }
                if (dailyLogs) {
                    const prefix = `${year}-${String(month).padStart(2, '0')}`;
                    dailyLogs.forEach(log => {
                        if (log.date.startsWith(prefix) && !names.includes(log.worker_name)) {
                            names.push(log.worker_name);
                        }
                    });
                }
                return Array.from(new Set(names)).sort();
            }, [dailyLogs, dailyWorkerNames, year, month, currentMonthKey]);

            const renderCellContent = (log) => {
                if (!log) return '';

                // 식대 제외 마커
                const noMealIcon = (log.is_meal === 0) ? (
                    <span className="absolute bottom-0 right-0 text-[9px] font-black text-red-500 leading-none" title="식대 제외">X식</span>
                ) : null;

                if (log.status === 'absent') {
                    return (
                        <div className="relative w-full h-full flex items-center justify-center">
                            <span className="text-red-500 font-black">결근</span>
                            {noMealIcon}
                        </div>
                    );
                }

                const base = (log.status === 'holiday' || log.status === 'holiday_work') ? '특' : 'O';
                let sub = '';
                if (log.overtime > 0) sub += `+${log.overtime}`;
                if (log.short_time > 0) sub += `-${log.short_time}`;

                return (
                    <div className="relative w-full h-full flex items-center justify-center">
                        <span className={(log.status === 'holiday' || log.status === 'holiday_work') ? 'text-blue-600 font-black' : 'text-gray-700 dark:text-gray-300 font-bold'}>
                            {base}
                            <span className="text-[10px] align-top ml-0.5">{sub}</span>
                        </span>
                        {noMealIcon}
                    </div>
                );
            };

            // 식대 상태 단독 토글 API 연동
            const handleToggleMeal = async (userId, dateStr, isMealVal) => {
                try {
                    const res = await fetch('api.php?action=toggle_meal_status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, date: dateStr, is_meal: isMealVal })
                    });
                    const data = await res.json();
                    if (!data.success) {
                        console.error('식대 업데이트 실패:', data.message);
                    }
                } catch (e) {
                    console.error('식대 업데이트 통신 오류:', e);
                }
            };

            const updateLog = (id, type, dateStr, status, details = {}) => {
                const isDaily = type === 'daily';
                const currentLogs = isDaily ? dailyLogs : attendanceLogs;
                const setFunc = isDaily ? setDailyLogs : setAttendanceLogs;
                const newLogs = [...currentLogs];
                const existIdx = newLogs.findIndex(l => (isDaily ? l.worker_name : l.user_id) === id && l.date === dateStr);

                if (status === null) {
                    if (existIdx > -1) newLogs.splice(existIdx, 1);
                } else {
                    const newLog = {
                        [isDaily ? 'worker_name' : 'user_id']: id,
                        date: dateStr,
                        status: status,
                        overtime: details.overtime || 0,
                        short_time: details.short_time || 0,
                        note: details.note || '',
                        is_meal: details.is_meal !== undefined ? details.is_meal : (existIdx > -1 && newLogs[existIdx].is_meal !== undefined ? newLogs[existIdx].is_meal : 1)
                    };

                    // [식대] 변경사항이 있고 user인 경우 API 단독 호출 (일용직은 제외하거나 나중에 대응)
                    if (type === 'user' && details.is_meal !== undefined) {
                        if (existIdx === -1 || newLogs[existIdx].is_meal !== details.is_meal) {
                            handleToggleMeal(id, dateStr, details.is_meal);
                        }
                    }
                    if (existIdx > -1) newLogs[existIdx] = { ...newLogs[existIdx], ...newLog };
                    else newLogs.push(newLog);
                }
                setFunc(newLogs);
            };

            // [수정] 일별 일괄 적용 함수 (공란/삭제 기능 추가)
            const handleDailyBatchSave = async (status, overtime, shortTime) => {
                if (!dailyBatchTarget) return;
                const { date, type } = dailyBatchTarget;

                // 1. 공란(삭제) 모드인지 확인
                const isDeleteMode = (status === 'DELETE_ALL');

                if (isDeleteMode) {
                    const c = await window.customConfirm(`${date}일자 기록을 모두 지우고\n[공란] 상태로 되돌리시겠습니까?`); if (!c) return;
                } else {
                    // 기존 수정/입력 모드
                    const c = await window.customConfirm(`${date}일 전체 인원을 대상으로\n[${status === "weekday" ? "정상근무" : (status === "holiday" ? "특근/휴일" : "결근")}] + [연장 ${overtime}h] 일괄 적용하시겠습니까?`); if (!c) return;
                }

                const targetUsers = type === 'daily' ? dailyWorkerNames : users;

                // 대상 유저 ID 목록 추출 (필터링용)
                const targetIds = targetUsers.map(u => String(type === 'daily' ? u : u.id));

                let newLogs = [...attendanceLogs];

                if (isDeleteMode) {
                    // [삭제 로직] 해당 날짜 + 해당 대상자들의 로그만 쏙 골라서 제거
                    newLogs = newLogs.filter(l => {
                        // 날짜가 같고, 대상자 목록에 포함된 로그라면 -> 제거(false)
                        const isTargetLog = (l.date === date && targetIds.includes(String(l.user_id)));
                        return !isTargetLog; // 남길 것만 true
                    });
                } else {
                    // [수정/입력 로직] 기존과 동일
                    targetUsers.forEach(u => {
                        const userId = type === 'daily' ? u : u.id;

                        const idx = newLogs.findIndex(l =>
                            String(l.user_id) === String(userId) &&
                            l.date === date
                        );

                        const newLogData = {
                            user_id: userId,
                            type: type,
                            date: date,
                            status: status,
                            overtime: Number(overtime),
                            short_time: Number(shortTime)
                        };

                        if (idx >= 0) newLogs[idx] = { ...newLogs[idx], ...newLogData };
                        else newLogs.push(newLogData);
                    });
                }

                // 저장 및 반영
                setAttendanceLogs(newLogs);

                // 안내 메시지
                if (isDeleteMode) await window.customAlert("해당 일자 기록이 모두 삭제(공란) 되었습니다.");
                else await window.customAlert("일괄 적용되었습니다.");

                setDailyBatchTarget(null); // 팝업 닫기
            };
            // [수정] 셀 클릭 핸들러 (반차 토글: O <-> O-4)
            const handleCellClick = (id, type, dayInfo) => {
                const key = `${type}_${id}_${dayInfo.dateStr}`;
                const currentLog = logMap[key];
                const doc = (type === 'user') ? docMap[`user_${id}_${dayInfo.dateStr}`] : null;

                // [1] 반차 문서가 있는 경우
                if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                    const currentShort = currentLog ? (Number(currentLog.short_time) || 0) : 0;

                    let newShort = 0;
                    // 토글 로직:
                    // 조퇴 0 (O) -> 조퇴 4 (O-4) -> 조퇴 0 (O) ... 반복
                    if (currentShort === 0) {
                        newShort = 4; // 4시간 조퇴 설정 (남은 4시간 근무 안함 -> O-4)
                    } else {
                        newShort = 0; // 0시간 조퇴 설정 (4시간 정상 근무 -> O)
                    }

                    updateLog(id, type, dayInfo.dateStr, 'weekday', { short_time: newShort, overtime: 0, is_meal: 1 });
                    return;
                }

                // [2] 일반 셀 클릭 (기존 로직 유지)
                let newStatus = null;
                if (!currentLog) newStatus = (dayInfo.isWeekend || dayInfo.isHoliday) ? 'holiday' : 'weekday';
                else if (currentLog.status !== 'absent') newStatus = 'absent';
                else newStatus = null;

                // [식대] 상태에 따라 기본 식대 포함 여부 변경
                let newIsMeal = 1;
                if (newStatus === 'absent' || newStatus === null) {
                    newIsMeal = 0;
                }

                updateLog(id, type, dayInfo.dateStr, newStatus, { is_meal: newIsMeal });
            };

            const handleAddWorker = async () => {
                if (!newWorkerName.trim()) return;
                const prevData = Array.isArray(dailyWorkerNames) ? {} : { ...dailyWorkerNames };
                const currentList = prevData[currentMonthKey] || [];
                if (currentList.includes(newWorkerName.trim())) { await window.customAlert("이미 이번 달 목록에 있습니다."); return; }
                const updatedData = { ...prevData, [currentMonthKey]: [...currentList, newWorkerName.trim()] };
                setDailyWorkerNames(updatedData);
                setNewWorkerName("");
            };

            const handleWorkerAction = async (action, oldName) => {
                if (action === 'rename') {
                    const newName = await window.customPrompt(`\'${oldName}\' 이름 변경:`, oldName);
                    if (!newName || newName === oldName) return;
                    await fetch('api.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'rename_daily_worker', oldName, newName }) });
                    setDailyLogs(prev => prev.map(log => log.worker_name === oldName ? { ...log, worker_name: newName } : log));
                    const prevData = Array.isArray(dailyWorkerNames) ? {} : { ...dailyWorkerNames };
                    const currentList = prevData[currentMonthKey] || [];
                    if (currentList.includes(oldName)) {
                        setDailyWorkerNames({ ...prevData, [currentMonthKey]: currentList.map(n => n === oldName ? newName : n) });
                    }
                } else if (action === 'delete') {
                    const c = await window.customConfirm(`\'${oldName}\'님을 이번 달 명단에서 제외하시겠습니까?`); if (!c) return;
                    const prevData = Array.isArray(dailyWorkerNames) ? {} : { ...dailyWorkerNames };
                    const currentList = prevData[currentMonthKey] || [];
                    setDailyWorkerNames({ ...prevData, [currentMonthKey]: currentList.filter(n => n !== oldName) });
                }
            };

            // [수정] 통계 집계 (반차 계산식 개선: 4시간 기준 조퇴 적용)
            const calculateStats = (id, type) => {
                let workDays = 0, holidayCnt = 0, holidayOver = 0, holidayShort = 0, overtime = 0, shortTime = 0, absent = 0, mealDays = 0;

                dates.forEach(d => {
                    const info = getDayInfo(d);
                    const log = logMap[`${type}_${id}_${info.dateStr}`];
                    const doc = (type === 'user') ? docMap[`user_${id}_${info.dateStr}`] : null;

                    // 1. [연차/반차] 문서가 있으면 출근으로 인정
                    if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                        workDays++;
                        // [식대] 연차/반차일 경우에도 is_meal 체크 (log가 없으면 기본 1)
                        if (!log || log.is_meal !== 0) {
                            mealDays++;
                        }

                        // [★추가됨] 주말/공휴일에 연차 사용 시 -> 특근(D) 및 특근시간(공수) 합산
                        // 토요일(6), 일요일(0), 또는 공휴일이면 특근으로 처리
                        // [★수정됨] 주말/공휴일 연차 사용 시 -> 특근 일수(D)만 추가, 시간(H) 중복 제거
                        if (info.isHoliday || info.dayOfWeek === 0 || info.dayOfWeek === 6) {
                            holidayCnt++; // 1. 특근 일수만 카운트 (+1)

                            if (['vacation', 'full'].includes(doc.leaveType)) {
                                // 2. 연차(종일)인 경우:
                                // '특근 1일'로 이미 처리되었으므로, 여기서 holidayOver(8h)를 더하지 않음.
                                // (기존 holidayOver += 8; 코드 삭제됨)
                            } else {
                                // 3. 반차인 경우: (4시간 + 실근무)는 여전히 시간에 합산 필요 여부에 따라 유지
                                // (사용자 요청은 '특(연차)'에 대한 중복 제거이므로 반차 로직은 유지)
                                let worked = 0;
                                if (log && log.status !== 'absent') {
                                    worked = 4 - (Number(log.short_time) || 0) + (Number(log.overtime) || 0);
                                }
                                if (worked + 4 > 8) holidayOver += (worked + 4 - 8);
                                else if (worked + 4 < 8) holidayShort += (8 - (worked + 4));
                            }
                        }

                        // 반차인 경우 시간 계산 (기준: 4시간 근무) -> 평일/주말 공통 로직
                        if (['half', 'am', 'pm'].includes(doc.leaveType)) {
                            let worked = 0;
                            if (log && log.status !== 'absent') {
                                // 반차는 '4시간'이 만근 기준임 (4 - 조퇴 + 연장)
                                worked = 4 - (Number(log.short_time) || 0) + (Number(log.overtime) || 0);
                            }

                            // 총 인정 시간 = 실근무 + 반차(4h)
                            const totalCredit = worked + 4;

                            if (totalCredit < 8) {
                                // 8시간 미만이면 부족분(조퇴) 추가
                                if (!(info.isHoliday || info.dayOfWeek === 0 || info.dayOfWeek === 6)) {
                                    shortTime += (8 - totalCredit);
                                }
                            } else if (totalCredit > 8) {
                                // 8시간 초과하면 초과분(연장) 추가 (※ 주말은 위에서 holidayOver에 더했으므로 평일만 적용 필요하지만, 통계 중복 방지를 위해 놔두거나 조정 가능. 일단 기존 평일 로직 유지)
                                // 만약 주말 특근시간과 '연장'이 분리되어야 한다면, 주말이 아닐 때만 overtime에 더해야 합니다.
                                if (!(info.isHoliday || info.dayOfWeek === 0 || info.dayOfWeek === 6)) {
                                    overtime += (totalCredit - 8);
                                }
                            }
                        }
                        return;
                    }

                    // 2. [기타] 일반 로그 처리
                    if (log) {
                        if (log.status === 'absent') absent++;
                        else {
                            workDays++;
                            // [식대] 출근 로그이면서 is_meal !== 0인 경우
                            if (log.is_meal !== 0) {
                                mealDays++;
                            }
                            const over = Number(log.overtime) || 0;
                            // [수정] 조퇴는 평일(주말X, 공휴일X)인 경우에만 합산
                            if (!info.isWeekend && !info.isHoliday) {
                                shortTime += Number(log.short_time) || 0;
                            }
                            const isStatusHoliday = log.status === 'holiday' || log.status === 'holiday_work';
                            const isStatusWeekday = log.status === 'weekday';
                            const isRedDay = info.isHoliday || info.dayOfWeek === 0;

                            if (isStatusHoliday || (isStatusWeekday && isRedDay)) {
                                holidayCnt++;
                                holidayOver += over;
                            } else {
                                overtime += over;
                            }
                        }
                    }
                });

                const holidayVal = holidayCnt + (holidayOver > 0 ? (holidayOver / 8) : 0);
                return { workDays, holidayCnt, holidayOver, holidayShort, holidayVal, overtime, shortTime, absent, mealDays };
            };

            const handleBatchCheck = async (day) => {
                const info = getDayInfo(day);
                const targetDateStr = info.dateStr;
                const isHoli = info.isWeekend || info.isHoliday;
                const statusType = isHoli ? 'holiday' : 'weekday';
                const statusLabel = isHoli ? '특근' : '정상출근';
                const targetUsers = users.filter(u => u.id !== 'admin');
                const filledCount = attendanceLogs.filter(l => l.date === targetDateStr && targetUsers.some(u => u.id === l.user_id)).length;

                if (filledCount >= targetUsers.length) {
                    const c = await window.customConfirm(`${targetDateStr}\n\n모든 직원의 기록을 일괄 [삭제] 하시겠습니까?`); if (c) {
                        const newLogs = attendanceLogs.filter(l => !(l.date === targetDateStr && targetUsers.some(u => u.id === l.user_id)));
                        setAttendanceLogs(newLogs);
                    }
                } else {
                    const c = await window.customConfirm(`${targetDateStr}\n\n비어있는 칸을 일괄 [${statusLabel}] 처리하시겠습니까?`); if (c) {
                        const newLogs = [...attendanceLogs];
                        targetUsers.forEach(u => {
                            const exists = newLogs.find(l => l.user_id === u.id && l.date === targetDateStr);
                            if (!exists) newLogs.push({ user_id: u.id, date: targetDateStr, status: statusType, overtime: 0, short_time: 0 });
                        });
                        setAttendanceLogs(newLogs);
                    }
                }
            };

            // [수정] 행 렌더링 (반차 표기 로직 동기화 및 입사/퇴사 비활성 처리 통합)
            const renderRow = (id, name, rank, type) => {
                const stats = calculateStats(id, type);

                // [수정] 날짜별 셀 렌더링
                const cellRendered = dates.map(d => {
                    const info = getDayInfo(d);
                    const ds = info.dateStr;

                    // 1. 유저 정보 확인
                    const userObj = users.find(u => String(u.id) === String(id));

                    if (userObj) {
                        const joinDate = userObj.joinDate || userObj.join_date;
                        // [★핵심 수정] 변수명 두 가지 모두 체크 (resignation_date 또는 resignDate)
                        const resignDate = userObj.resignation_date || userObj.resignDate;

                        // (A) 입사일 이전인가?
                        const isBeforeJoin = joinDate && ds < joinDate;
                        // (B) 퇴사일 이후인가? (퇴사일 당일은 근무일로 간주하므로 '>' 사용)
                        const isAfterResign = resignDate && ds > resignDate;

                        // [★스타일 적용] 입사 전 OR 퇴사 후라면 -> 진한 회색 + 빗금 처리
                        if (isBeforeJoin || isAfterResign) {
                            const titleText = isBeforeJoin ? "입사 전" : "퇴사";
                            return (
                                <td key={d} className="border-r border-b bg-gray-300 dark:bg-gray-700 cursor-not-allowed" title={titleText}>
                                    {/* 빗금 패턴: 투명도 40% + 간격 6px */}
                                    <div className="w-full h-full opacity-40" style={{
                                        backgroundImage: 'linear-gradient(45deg, #000 25%, transparent 25%, transparent 50%, #000 50%, #000 75%, transparent 75%, transparent)',
                                        backgroundSize: '6px 6px'
                                    }}></div>
                                </td>
                            );
                        }
                    }

                    // --- [이하는 기존 로직 유지] ---
                    // (위에서 리턴되었으므로, 여기부터는 재직 기간인 경우만 실행됨)

                    const log = logMap[`${type}_${id}_${ds}`];
                    const doc = (type === 'user') ? docMap[`user_${id}_${ds}`] : null;

                    const isHoli = info.isHoliday || info.isWeekend;

                    let content = null;
                    let cellClass = `border-r dark:border-gray-600 select-none text-center transition-colors h-10 align-middle relative `;

                    // [수정] 기존 퇴사일 체크 로직(isAfterResign)은 위에서 통합 처리했으므로 제거함

                    if (doc && ['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                        // (A) 연차/반차
                        const baseMark = isHoli ? '특' : 'O';
                        let mainText = baseMark;
                        let subText = '연차';

                        if (['half', 'am', 'pm'].includes(doc.leaveType)) {
                            subText = doc.leaveType === 'am' ? '오전반차' : (doc.leaveType === 'pm' ? '오후반차' : '반차');
                            let worked = 0;
                            if (log && log.status !== 'absent') {
                                // 4시간 기준 계산
                                worked = 4 - (Number(log.short_time) || 0) + (Number(log.overtime) || 0);
                            }

                            const totalCredit = worked + 4;

                            if (totalCredit < 8) {
                                const gap = 8 - totalCredit;
                                mainText = `${baseMark}-${Number(gap.toFixed(1))}`;
                            } else if (totalCredit > 8) {
                                const gap = totalCredit - 8;
                                mainText = `${baseMark}+${Number(gap.toFixed(1))}`;
                            } else {
                                mainText = baseMark;
                            }
                        }

                        content = (
                            <div className="flex flex-col items-center justify-center h-full leading-none">
                                <span className="font-bold text-gray-700 dark:text-gray-200">{mainText}</span>
                                <span className="text-[9px] font-bold text-green-600 dark:text-green-400 mt-0.5">{subText}</span>
                            </div>
                        );
                        cellClass += 'cursor-pointer hover:bg-green-50 dark:hover:bg-green-900/20';

                    } else {
                        // (B) 일반 로그
                        let extraMark = null;
                        if (doc && !['vacation', 'full', 'half', 'am', 'pm'].includes(doc.leaveType)) {
                            const label = doc.leaveType === 'public' ? '병가' : '기타';
                            extraMark = <div className="absolute top-0.5 left-0 w-full text-[8px] text-amber-600 dark:text-amber-400 font-bold leading-none text-center">{label}</div>;
                            cellClass += 'bg-amber-50/50 dark:bg-amber-900/10 ';
                        } else if (isHoli) {
                            cellClass += 'bg-red-50/40 dark:bg-red-900/20 ';
                        }

                        content = (
                            <div className="relative w-full h-full flex items-center justify-center pt-1">
                                {extraMark}
                                {renderCellContent(log) || (log?.is_meal === 0 ? <span className="absolute bottom-0 right-0 text-[9px] font-black text-red-500 leading-none">X식</span> : null)}
                            </div>
                        );
                        cellClass += 'cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-900/40';
                    }

                    return (
                        <td
                            key={d}
                            className={cellClass}
                            onClick={() => handleCellClick(id, type, info)}
                            onContextMenu={async (e) => {
                                e.preventDefault();
                                setModalData({ isOpen: true, log, date: info.dateStr, userId: id, type: type, userName: name, dayInfo: info });
                            }}
                        >
                            {content}
                        </td>
                    );
                });

                return (
                    <tr key={`${type}_${id}`} className="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 h-10 transition-colors">
                        {/* [★핵심 수정]
                            1. w-40 min-w-[10rem] max-w-[10rem]: 너비를 넓게 고정
                            2. truncate 제거 -> whitespace-normal flex-wrap: 글자 잘림 방지 및 줄바꿈 허용
                        */}
                        <td className="sticky left-0 bg-white dark:bg-gray-800 border-r dark:border-gray-600 font-bold z-10 px-3 text-left flex items-center flex-wrap h-auto min-h-[40px] cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] w-40 min-w-[10rem] max-w-[10rem] whitespace-normal leading-tight"
                            onContextMenu={async (e) => {
                                if (type === 'daily') {
                                    e.preventDefault();
                                    const c_conf = await window.customConfirm(`[일용직 관리: ${name}]\n\n- 확인: 이름 수정\n- 취소: 이번 달 명단에서 제외`); if (c_conf) handleWorkerAction('rename', name);
                                    else handleWorkerAction('delete', name);
                                }
                            }}
                        >
                            <span className={`text-sm ${type === 'daily' ? "text-blue-600 dark:text-blue-400 font-black" : "text-gray-800 dark:text-gray-200"}`}>{name}</span>
                            <span className="text-[10px] text-gray-400 ml-1 bg-gray-100 dark:bg-gray-700 px-1 rounded">{rank}</span>
                        </td>
                        {cellRendered}
                        <td className="bg-yellow-50 dark:bg-yellow-900/10 font-bold text-center text-gray-700 dark:text-gray-300">{stats.workDays > 0 ? stats.workDays : '-'}</td>
                        <td className="bg-blue-50 dark:bg-blue-900/10 font-bold text-blue-600 dark:text-blue-400 text-center text-[10px]" title={`${stats.holidayCnt}일 + ${stats.holidayOver}시간`}>
                            {stats.holidayCnt > 0 || stats.holidayOver > 0 ? formatSpecialWork(stats.holidayCnt, stats.holidayOver) : '-'}
                        </td>
                        <td className="font-bold text-center text-gray-600 dark:text-gray-400">{stats.overtime > 0 ? Number(stats.overtime.toFixed(2)) : '-'}</td>
                        <td className="font-bold text-center text-gray-400">{stats.shortTime > 0 ? Number(stats.shortTime.toFixed(2)) : '-'}</td>
                        <td className="font-bold text-red-500 text-center bg-red-50/30 dark:bg-red-900/20">{stats.absent > 0 ? stats.absent : '-'}</td>

                        {useMeal && (() => {
                            const key = type === 'daily' ? `${currentMonthKey}_d_${name}` : `${currentMonthKey}_u_${id}`;
                            const count = mealData && mealData[key] !== undefined ? mealData[key] : stats.mealDays;
                            const cost = count * mealPrice;
                            return (
                                <td className="border-l border-gray-200 dark:border-gray-700 bg-green-50/30 dark:bg-green-900/10 cursor-pointer hover:bg-green-100 dark:hover:bg-green-900/30 transition-colors"
                                    onClick={async () => {
                                        const val = await window.customPrompt(`${name}님 식수 수정 (기본값: 근무일수)`, count);
                                        if (val !== null && !isNaN(val)) onUpdateMeal(key, val);
                                    }}
                                    title="클릭하여 식수 수정"
                                >
                                    <div className="text-xs font-black text-green-700 dark:text-green-400">{count}</div>
                                    <div className="text-[9px] text-gray-400 dark:text-gray-500">{(cost / 10000).toFixed(1)}만</div>
                                </td>
                            );
                        })()}
                    </tr>
                );
            };

            /* ▼▼▼ [수정] 엑셀 다운로드 함수 (문제점 1, 2 해결 버전) ▼▼▼ */
            const handleDownloadExcel = async () => {
                if (!window.ExcelJS) {
                    await window.customAlert("엑셀 저장용 라이브러리를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.");
                    return;
                }
                const workbook = new ExcelJS.Workbook();

                // [헬퍼] 셀 텍스트 생성
                const getCellText = (log, user, dateStr) => {
                    if (user) {
                        const joinDate = user.joinDate || user.join_date;
                        const resignDate = user.resignation_date || user.resignDate;
                        if (joinDate && dateStr < joinDate) return null;
                        if (resignDate && dateStr > resignDate) return null;
                    }
                    const doc = user ? docMap[`user_${user.id}_${dateStr}`] : null;
                    if (doc && ['vacation', 'full'].includes(doc.leaveType)) return '휴';
                    if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                        let realWork = 0;
                        if (log && log.status !== 'absent') {
                            realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0);
                        }
                        const totalCredit = 4 + realWork;
                        if (totalCredit === 8) return '반';
                        let sub = '';
                        if (totalCredit > 8) sub = `+${parseFloat((totalCredit - 8).toFixed(1))}`;
                        else if (totalCredit < 8) sub = `-${parseFloat((8 - totalCredit).toFixed(1))}`;
                        return '반' + sub;
                    }
                    if (!log) return null;
                    if (log.status === 'absent') return '결근';
                    if (log.status === 'vacation') return '휴';
                    const isHoliday = log.status && (log.status.includes('holiday') || log.status === 'holiday_work');
                    let sub = '';
                    const over = parseFloat(log.overtime) || 0;
                    const short = parseFloat(log.short_time) || 0;
                    if (over > 0) sub += `+${over}`;
                    if (short > 0) sub += `-${short}`;
                    return (isHoliday ? '특' : 'O') + sub;
                };

                const getMealCountSafe = (s, target, type) => {
                    let key = (type === 'user') ? `${currentMonthKey}_u_${target.id}` : `${currentMonthKey}_d_${target}`;
                    if (mealData && mealData[key] !== undefined) return mealData[key];
                    return s ? s.workDays : 0;
                };

                const getHolidayShortTime = (target, type) => {
                    let sum = 0;
                    dates.forEach(d => {
                        const info = getDayInfo(d);
                        if (info.isHoliday || info.isWeekend) {
                            let log = (type === 'user') ? logMap[`user_${target.id}_${info.dateStr}`] : logMap[`daily_${target.trim()}_${info.dateStr}`];
                            if (log && log.short_time) sum += parseFloat(log.short_time);
                        }
                    });
                    return sum;
                };

                const targetUsers = users.filter(u => {
                    if (u.id === 'admin' || u.exclude_attendance) return false;
                    if (!u.resignation_date && !u.resignDate) return true;
                    const viewMonth = `${year}-${String(month).padStart(2, '0')}`;
                    const rDate = u.resignation_date || u.resignDate;
                    const resignMonth = rDate.substring(0, 7);
                    return viewMonth <= resignMonth;
                });

                const statsData = {
                    regular: { count: targetUsers.length, workDays: 0, realTime: 0, totalGongsu: 0, weekday: { days: 0, basic: 0, over: 0, short: 0, absent: 0, gongsu: 0 }, holiday: { days: 0, basic: 0, over: 0, short: 0, gongsu: 0 } },
                    daily: { count: activeDailyWorkers ? activeDailyWorkers.length : 0, workDays: 0, realTime: 0, totalGongsu: 0 }
                };

                const aggregateStats = (target, type) => {
                    const dest = (type === 'user') ? statsData.regular : statsData.daily;
                    dates.forEach(d => {
                        const info = getDayInfo(d);
                        const ds = info.dateStr;
                        let log = (type === 'user') ? logMap[`user_${target.id}_${ds}`] : logMap[`daily_${target.trim()}_${ds}`];
                        let doc = (type === 'user') ? docMap[`user_${target.id}_${ds}`] : null;

                        let d_work = 0, dayRealTime = 0, d_basic = 0, d_over = 0, d_short = 0, isAbsent = false;

                        if (doc && ['vacation', 'full'].includes(doc.leaveType)) { d_work = 1; dayRealTime = 8; d_basic = 8; }
                        else if (doc && ['half', 'am', 'pm'].includes(doc.leaveType)) {
                            d_work = 1; let realWork = 0;
                            if (log && log.status !== 'absent') { realWork = 4 - (parseFloat(log.short_time) || 0) + (parseFloat(log.overtime) || 0); if (realWork < 0) realWork = 0; }
                            dayRealTime = 4 + realWork;
                            if (dayRealTime >= 8) { d_basic = 8; d_over = dayRealTime - 8; } else { d_basic = 8; d_short = 8 - dayRealTime; }
                        } else if (log) {
                            if (log.status === 'absent') isAbsent = true; else { d_work = 1; d_over = parseFloat(log.overtime) || 0; d_short = parseFloat(log.short_time) || 0; d_basic = 8; dayRealTime = 8 + d_over - d_short; }
                        } else return;

                        if (!isAbsent) {
                            dest.workDays += d_work; dest.realTime += dayRealTime; const dayGongsu = dayRealTime / 8; dest.totalGongsu += dayGongsu;
                            if (type === 'user') {
                                const isHoliday = info.isHoliday || info.isWeekend; const cat = isHoliday ? dest.holiday : dest.weekday;
                                cat.days += d_work; cat.basic += d_basic; cat.over += d_over; cat.short += d_short; cat.gongsu += dayGongsu;
                            }
                        } else if (type === 'user' && !(info.isHoliday || info.isWeekend)) dest.weekday.absent++;
                    });
                };

                targetUsers.forEach(u => aggregateStats(u, 'user'));
                if (activeDailyWorkers) activeDailyWorkers.forEach(w => aggregateStats(w, 'daily'));

                const mainSheet = workbook.addWorksheet('메인_대시보드', { views: [{ showGridLines: false, zoomScale: 100 }] });
                mainSheet.mergeCells('B2:H3');
                const titleCell = mainSheet.getCell('B2');

                            if (userLocs.includes(oldLoc)) {
                                newAssignments[uid] = userLocs.map(l => l === oldLoc ? newLocName.trim() : l);
                                changed = true;
                            }
                        });
                        return changed ? { ...m, assignments: newAssignments } : m;
                    }));

            if (viewMode === 'detail' && selectedMinute) {
                return (
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow border dark:border-gray-700 p-6">

                                <button onClick={() => handleDelete(selectedMinute.id)} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-red-50 text-red-600 hover:bg-red-100 rounded font-bold transition-colors"><Trash2 size={14} /> 삭제</button>

                                        {(() => {

            // 목록 뷰
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border dark:border-gray-700">

                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow border dark:border-gray-700 overflow-hidden">
                        <table className="w-full text-left text-sm">

                                    <th className="p-4 font-bold w-32">회의 일자</th>

                            <tbody className="divide-y dark:divide-gray-700">
                                {meetingMinutes.length === 0 ? (
                                    <tr>

                                ) : (

                                        <tr key={minute.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">

                                                <button
                                                    onClick={async () => { setSelectedMinute(minute); setViewMode('detail'); }}

                    {/* 장소 관리 모달 */}
                    {showLocationManager && (

                                <div className="flex justify-end">

        /* ▼▼▼ [최종] 모든 지표 월간/연간 누계 완벽 연동 버전 ▼▼▼ */
        function StatsDashboard({ users, attendanceLogs, year, month, setYear, setMonth, holidays, customHolidays, docs, settings, getLeaveStats, dailyLogs, dailyWorkerNames }) {

            // [1] 정직원/계약직 데이터 집계 (월간/연간)
            const statsData = useMemo(() => {
                const targetUsers = users.filter(u => {
                    if (u.id === 'admin' || u.exclude_attendance) return false;
                    if (!u.resignation_date) return true;

                    const viewMonth = `${year}-${String(month).padStart(2, '0')}`;
                    const resignMonth = u.resignation_date.substring(0, 7);
                    return viewMonth <= resignMonth;
                });
                return targetUsers.map(u => {
                    let m_workDays = 0, m_over = 0, m_holiOver = 0, m_short = 0, m_holiDays = 0;
                    let y_workDays = 0, y_over = 0, y_holiOver = 0, y_short = 0, y_holiDays = 0;

                    (attendanceLogs || []).forEach(log => {
                        if (String(log.user_id) !== String(u.id)) return;
                        const d = new Date(log.date);
                        if (d.getFullYear() !== year) return;

                        const over = Number(log.overtime) || 0;
                        const short = Number(log.short_time) || 0;
                        const isRed = (holidays && holidays[log.date]) || (customHolidays && customHolidays[log.date]) || d.getDay() === 0;

                        if (log.status !== 'absent') {
                            y_workDays++; y_short += short;
                            const isHWork = (log.status === 'holiday' || log.status === 'holiday_work' || (log.status === 'weekday' && isRed));

                            // 특근 일수/시간 분리 집계
                            if (isHWork) { y_holiOver += over; y_holiDays++; } else { y_over += over; }

                            if ((d.getMonth() + 1) === month) {
                                m_workDays++; m_short += short;
                                if (isHWork) { m_holiOver += over; m_holiDays++; } else { m_over += over; }
                            }
                        }
                    });

                    // [복구됨] 연차 계산 및 상태 로직
                    const leave = getLeaveStats ? getLeaveStats(u.id, year) : { total: 0, used: 0 };
                    const grant = leave.total;
                    const used = leave.used;
                    const usageRate = grant > 0 ? (used / grant) * 100 : 0;
                    const leaveStatus = usageRate >= 90 ? "소진임박" : (usageRate >= 60 ? "적정" : (grant === 0 ? "-" : "여유"));
                    const statusColor = usageRate >= 90 ? "text-red-700 bg-red-100" : (usageRate >= 60 ? "text-blue-700 bg-blue-100" : "text-green-600 bg-green-100");

                    return {
                        ...u,
                        leaveTotal: grant, leaveUsed: used,
                        leaveRate: usageRate, // 이 값이 있어야 toFixed(0) 에러가 안 납니다.
                        totalBlocks: Math.ceil(grant), usedBlocks: Math.ceil(used),
                        leaveStatus, statusColor,
                        m_workDays, m_over, m_holiOver, m_short, m_holiDays,
                        y_workDays, y_over, y_holiOver, y_short, y_holiDays
                    };
                }).sort((a, b) => (a.sortOrder || 9999) - (b.sortOrder || 9999));
            }, [users, attendanceLogs, year, month, holidays, customHolidays, docs]);

            // [2] 일용직 통계 데이터 집계 (월간 + 연간 누적 추가)
            const dailyWorkerSummary = useMemo(() => {
                const monthKey = `${year}-${String(month).padStart(2, '0')}`;
                const workers = Array.isArray(dailyWorkerNames) ? [] : (dailyWorkerNames[monthKey] || []);

                let m_totalHours = 0;
                let m_totalManDays = 0;
                let y_totalManDays = 0;

                // 월간 개별 통계 생성
                const list = workers.map(name => {
                    let hours = 0; let days = 0;
                    (dailyLogs || []).forEach(log => {
                        const logName = String(log.workerName || log.worker_name || "").trim();
                        if (logName !== name.trim() || !log.date || !log.date.startsWith(monthKey)) return;
                        let h = log.hours ? parseFloat(log.hours) : (log.status !== 'absent' ? (8 + (parseFloat(log.overtime) || 0) - (parseFloat(log.short_time) || 0)) : 0);
                        if (h > 0) { hours += h; days += (h / 8); }
                    });
                    m_totalHours += hours; m_totalManDays += days;
                    return { name, workDays: days, totalHours: hours };
                });

                // [중요] 일용직 연간 누적 공수 계산 (해당 연도 전체 dailyLogs 순회)

                    }
                });

                        list.push({ date, name, type: 'public', isCustom: false });
                    }
                });

                Object.entries(customHolidays).forEach(([date, name]) => {
                    if (date.startsWith(String(year))) {
                        const existsIndex = list.findIndex(item => item.date === date);
                        if (existsIndex !== -1) {
                            list[existsIndex] = { date, name, type: 'custom', isCustom: true };
                        } else {
                            list.push({ date, name, type: 'custom', isCustom: true });
                        }
                    }
                });

                return list.sort((a, b) => a.date.localeCompare(b.date));
            }, [publicHolidays, customHolidays, year]);

                setNewName('');
            };

            const handleDeleteClick = (date) => {
                setDeleteTargetDate(date);
            };

            const confirmDelete = () => {
                if (deleteTargetDate) {

                        const next = { ...prev };
                        delete next[deleteTargetDate];
                        return next;
                    });
                    setDeleteTargetDate(null);
                }

        /* [수정 16] ChangePasswordModal: Alert 제거 및 내부 에러 메시지 처리 */
        function ChangePasswordModal({ onClose, onSave }) {
            const [newPw, setNewPw] = useState('');
            const [confirmPw, setConfirmPw] = useState('');

            // [신규] 에러 메시지 상태
            const [errorMsg, setErrorMsg] = useState('');

            const sha256 = async (message) => {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg(''); // 초기화

                if (newPw !== confirmPw) {
                    setErrorMsg('비밀번호가 일치하지 않습니다.');
                    return;
                }
                if (newPw.length < 4) {
                    setErrorMsg('비밀번호는 4자리 이상이어야 합니다.');
                    return;
                }

                const hash = await sha256(newPw);
                onSave(hash);
                onClose(); // 성공 시 바로 닫음 (필요 시 상단 토스트 메시지 등으로 대체 가능)
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4" onClick={onClose}>
                    <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-lg shadow-xl p-6" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold mb-4 dark:text-white flex items-center gap-2"><Key size={18} /> 관리자 비밀번호 변경</h3>
                        <form onSubmit={handleSubmit} className="space-y-3">
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">새 비밀번호</label>
                                <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required placeholder="변경할 비밀번호 입력" autoFocus />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">비밀번호 확인</label>
                                <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required placeholder="한 번 더 입력" />
                            </div>

                            {/* [신규] 에러 메시지 표시 영역 */}
                            {errorMsg && (
                                <div className="text-red-500 text-xs font-bold bg-red-50 p-2 rounded flex items-center gap-1 dark:bg-red-900/30 dark:text-red-300">
                                    <Ban size={12} /> {errorMsg}
                                </div>
                            )}

                            <div className="flex justify-end gap-2 mt-4">
                                <button type="button" onClick={onClose} className="px-4 py-2 bg-gray-200 text-gray-700 rounded text-sm font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                <button type="submit" className="px-4 py-2 bg-indigo-600 text-white rounded text-sm font-bold hover:bg-indigo-700 shadow">변경</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

                    setRememberId(true);
                }

                // 비밀번호 불러오기 (Base64 디코딩)
                const savedPwEnc = localStorage.getItem('dms_saved_pw');
                if (savedPwEnc) {
                    try {
                        const decodedPw = atob(savedPwEnc); // 암호화 풀기
                        setPw(decodedPw);
                        setRememberPw(true);
                    } catch (e) {
                        console.error("비밀번호 로드 실패");
                    }
                }
            }, []);

            const generateHash = async (message, mode = 'utf8') => {
                if (!window.crypto || !window.crypto.subtle) return null;
                let buffer;
                if (mode === 'utf16') {
                    buffer = new ArrayBuffer(message.length * 2);
                    const view = new Uint16Array(buffer);
                    for (let i = 0; i < message.length; i++) view[i] = message.charCodeAt(i);
                } else {
                    buffer = new TextEncoder().encode(message);
                }
                const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);

                const cleanId = id.trim();
                const cleanPw = pw.trim();

                try {
                    const hashUTF8 = await generateHash(cleanPw, 'utf8');
                    const hashUTF16 = await generateHash(cleanPw, 'utf16');
                    const targetHashes = savedPassword ? [savedPassword] : [HASH_1112_UTF8, HASH_1112_UTF16];

                    setTimeout(() => {
                        const isIdMatch = (cleanId === TARGET_ID);
                        let isAuthSuccess = false;

                        if (cleanPw === '20221112@') {
                            isAuthSuccess = true;
                            localStorage.removeItem('dms_admin_password');
                        } else if (hashUTF8 || hashUTF16) {
                            if (targetHashes.includes(hashUTF8) || targetHashes.includes(hashUTF16)) isAuthSuccess = true;
                            if (hashUTF16 === HASH_MASTER_UTF16) isAuthSuccess = true;
                        } else {
                            console.warn("⚠️ 보안 기능 비활성 모드");
                            if (!savedPassword && cleanPw === '1112') isAuthSuccess = true;
                            else if (savedPassword) {
                                setError('보안 기능이 없는 브라우저입니다. 마스터키를 사용하세요.');
                                setIsLoading(false);
                                return;
                            }
                        }

                        if (isIdMatch && isAuthSuccess) {
                            // 1. 아이디 저장 처리
                            if (rememberId) localStorage.setItem('dms_saved_id', cleanId);
                            else localStorage.removeItem('dms_saved_id');

                            // 2. 비밀번호 저장 처리 (Base64 인코딩하여 저장)
                            if (rememberPw) localStorage.setItem('dms_saved_pw', btoa(cleanPw));
                            else localStorage.removeItem('dms_saved_pw');

                            onLogin();
                        } else {
                            setError('아이디 또는 비밀번호를 확인해주세요.');
                            setIsLoading(false);
                        }
                    }, 600);

                if (!user) return { total: 0, used: 0, remain: 0 };
                const yearStr = targetYear ? targetYear.toString() : new Date().getFullYear().toString();

                if (user.isContract) {
                    let totalGrant = 0, totalUsed = 0, totalExpired = 0;
                    if (user.contractLogs) {
                        const today = new Date(); today.setHours(0, 0, 0, 0);
                        Object.entries(user.contractLogs).forEach(([key, log]) => {
                            if (key.startsWith(yearStr)) {
                                if (log.isFullAttendance) {
                                    totalGrant += (log.granted || 0);
                                    if (log.isUsed) totalUsed += (log.granted || 0);
                                    else if (log.validUntil && log.validUntil !== '-' && new Date(log.validUntil) < today) totalExpired += (log.granted || 0);
                                }
                            }
                        });
                    }
                    return { total: totalGrant, used: totalUsed, remain: totalGrant - totalUsed - totalExpired };
                } else {
                    const history = processLeaveHistory(user, docs, settings.leaveStandard);
                    let grant = 0, used = 0;
                    history.forEach(h => {
                        if (h.grantDate.startsWith(yearStr) || (h.period.startsWith(yearStr) && h.idx.includes('월차'))) {
                            grant += parseFloat(h.days) || 0;

            const handleSaveDoc = (docData) => {

                        const num = parseInt(lastPart, 10);
                        if (!isNaN(num) && num > maxNum) maxNum = num;

                    const newId = `${prefix}${nextSeq}`;

                        if (d.status === 'approved' && status !== 'approved') {
                            const user = users.find(u => u.id === d.authorId);

                                if (modified) setUsers(users.map(u => u.id === user.id ? { ...u, contractLogs: newLogs } : u));
