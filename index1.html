    <style>
        /* 도장 스타일 (기존 유지) */
        .stamp-box {
            width: 70px;
            height: 70px;
            border: 3px double #de3838;
            color: #de3838;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(-3deg);
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.8);
        }

        .stamp-box.approved {
            border-color: #de3838;
            color: #de3838;
        }

        .stamp-box.rejected {
            border-color: #333;
            color: #333;
            border-style: solid;
        }

        .clickable-stamp {
            cursor: pointer;
            transition: all 0.2s;
            z-index: 20;
        }

        .clickable-stamp:hover {
            background-color: rgba(34, 197, 94, 0.1);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }

        .stamp-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            transform: rotate(-3deg);
            opacity: 0.9;
        }

        /* 화면용 Paper 스타일 */
        .paper {
            width: 210mm;
            min-height: 297mm;
            background: white !important;
            color: black !important;
            padding: 20mm;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* 기타 UI 스타일 (기존 유지) */
        .ai-loading {
            background: linear-gradient(90deg, #f0f9ff 0%, #e0f2fe 50%, #f0f9ff 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .mini-cal td {
            text-align: center;
            padding: 2px;
            font-size: 0.75rem;
        }

        .mini-cal th {
            font-size: 0.7rem;
            color: #666;
            font-weight: normal;
        }

        .cal-holiday {
            color: #ef4444;
            font-weight: bold;
        }

        .cal-saturday {
            color: #3b82f6;
        }

        .cal-range {
            background-color: #bfdbfe;
            color: #1e3a8a;
        }

        .cal-start {
            background-color: #2563eb;
            color: white;
            border-top-left-radius: 50%;
            border-bottom-left-radius: 50%;
        }

        .cal-end {
            background-color: #2563eb;
            color: white;
            border-top-right-radius: 50%;
            border-bottom-right-radius: 50%;
        }

        .year-cal-cell {
            position: relative;
            cursor: default;
        }

        .year-cal-cell.has-vacation {
            cursor: pointer;
            background-color: #dbeafe;
            color: #1e40af;
            font-weight: bold;
        }

        .year-cal-cell.vacation-start {
            border-top-left-radius: 9999px;
            border-bottom-left-radius: 9999px;
        }

        .year-cal-cell.vacation-end {
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
        }

        .year-cal-cell:hover.has-vacation {
            background-color: #2563eb;
            color: white;
        }

        .tooltip-text {
            visibility: hidden;
            width: 120px;
            background-color: black;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.7rem;
            pointer-events: none;

        .year-cal-cell:hover .tooltip-text {

            color: white;

        /* [수정] 인쇄 스타일: FitScreenWrapper 간섭 해결 */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            html,
            body {
                width: 210mm;
                min-height: 297mm;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;
            }

            /* 1. 모든 요소 숨김 및 변형(Transform) 초기화 */
            /* 중요: transform: none !important; 가 없으면 미리보기의 축소 기능 때문에 인쇄가 깨짐 */
            body * {
                visibility: hidden;
                transform: none !important;
            }

            /* UI 요소 제거 */
            .no-print,
            nav,
            aside,
            .sidebar-container,
            button,
            .title-bar {
                display: none !important;
            }

            /* 2. .paper (증명서)만 보이게 설정 및 강제 위치 고정 */
            .paper,
            .paper * {
                visibility: visible !important;
                opacity: 1 !important;
            }

            .paper {
                position: fixed !important;
                /* absolute 대신 fixed를 써서 흐름에서 완전히 분리 */
                left: 0 !important;
                top: 0 !important;
                margin: 0 !important;
                width: 210mm !important;
                min-height: 297mm !important;
                padding: 20mm !important;
                /* 증명서 내부 여백 유지 */
                box-shadow: none !important;
                z-index: 99999;
                background: white !important;
                color: black !important;
            }

            /* 문서함 일괄 인쇄용 예외 처리 */
            #print-mount,
            #print-mount * {
                visibility: visible !important;
            }

            #print-mount {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
            }

            #print-mount .paper {
                position: relative !important;
                /* 일괄 인쇄시는 흐름 따름 */
                page-break-after: always;
                break-after: page;
                margin-bottom: 20mm !important; /* 구분 여백 */
            }

            #print-mount .paper:last-child {
                page-break-after: auto;
                break-after: auto;
                margin-bottom: 0 !important;
            }
        }


        /* --- [추가] PDF 저장 버튼 그룹 스타일 --- */
        .pdf-group {

        .dark .pdf-toggle {

        .pdf-toggle .icon-box {
            color: #9ca3af;

            opacity: 0.5;

        }

        /* 체크 상태 (도장 켬/빨강) */
        .pdf-toggle input:checked+.icon-box {
            color: #ef4444;
            /* 빨간색 */
            opacity: 1;
            transform: scale(1.1);
        }

        .pdf-btn {
            background-color: #4f46e5;
            /* 보라색 배경 */
            color: white;
            border: none;
            padding: 0 16px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }

        .pdf-btn:hover {
            background-color: #4338ca;
        }
    </style>

</head>

    <script type="text/babel">

        const { useState, useEffect, useMemo, useRef, useCallback } = React;




        // [수정] 휴가 유형 정의 (공가->병가 변경, 색상 테마 적용)
        const LEAVE_TYPES = {
            full: { label: '연차 (종일)', deduct: true, color: 'green' },
            am: { label: '오전 반차', deduct: true, val: 0.5, color: 'green' },
            pm: { label: '오후 반차', deduct: true, val: 0.5, color: 'green' },
            condolence: { label: '경조사', deduct: false, color: 'yellow' },
            public: { label: '병가', deduct: false, color: 'yellow' }, // 명칭 변경
            other: { label: '기타', deduct: false, color: 'yellow' }
        };

        function CustomDialog() {
            const [dialogState, setDialogState] = React.useState({
                isOpen: false,
                type: 'alert', // 'alert', 'confirm', 'prompt'
                message: '',
                defaultValue: '',
                resolve: null
            });
            const [inputValue, setInputValue] = React.useState('');

            React.useEffect(() => {
                window.customAlert = (message) => {
                    return new Promise((resolve) => {
                        setDialogState({ isOpen: true, type: 'alert', message, resolve, defaultValue: '' });
                    });
                };
                window.customConfirm = (message) => {
                    return new Promise((resolve) => {
                        setDialogState({ isOpen: true, type: 'confirm', message, resolve, defaultValue: '' });
                    });
                };
                window.customPrompt = (message, defaultValue = '') => {
                    return new Promise((resolve) => {
                        setInputValue(defaultValue);
                        setDialogState({ isOpen: true, type: 'prompt', message, resolve, defaultValue });
                    });
                };
            }, []);

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && dialogState.isOpen) {
                        handleClose(null);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [dialogState.isOpen, dialogState.resolve]);

            const handleClose = (value) => {
                if (dialogState.resolve) {
                    dialogState.resolve(value);
                }
                setDialogState(prev => ({ ...prev, isOpen: false }));
            };

            const handleKeyDownInput = (e) => {
                if (e.key === 'Enter') {
                    handleClose(inputValue);
                }
            };

            if (!dialogState.isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => handleClose(null)}>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm p-6 animate-fade-in-up" onClick={e => e.stopPropagation()}>
                        <p className="text-gray-800 dark:text-gray-200 text-base mb-6 whitespace-pre-wrap">{dialogState.message}</p>
                        {dialogState.type === 'prompt' && (
                            <input
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyDown={handleKeyDownInput}
                                className="w-full border p-2 rounded mb-4 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                autoFocus
                            />
                        )}
                        <div className="flex justify-end gap-3">
                            {(dialogState.type === 'confirm' || dialogState.type === 'prompt') && (
                                <button
                                    onClick={() => handleClose(null)}
                                    className="px-4 py-2 bg-gray-200 text-gray-800 rounded font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600"
                                >
                                    취소
                                </button>
                            )}
                            <button
                                onClick={() => handleClose(dialogState.type === 'prompt' ? inputValue : true)}
                                className="px-4 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700"
                                autoFocus={dialogState.type !== 'prompt'}
                            >
                                확인
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const { FileText, Users, Settings, Save, Upload, PenTool, Trash2, FolderOpen, Sparkles, Bot, Key, Calendar, Search, Stamp, ChevronDown, ChevronUp, ExternalLink, X, Moon, Sun, List, ClipboardList, Clipboard, RotateCcw, Ban, Layout, Megaphone, Hourglass, Printer, Menu, Plus, Minus, Clock, GripVertical, Home, BarChart2, MapPin } = Icons;

        // --- 유틸리티 & 설정 ---

        // 공수가 정수일 땐 정수로, 소수일 땐 소수점 3자리까지 표시
        const formatSpecialWork = (days, hours) => {
            const d = Number(days);
            const h = Number(hours);
            const val = d + (h / 8);
            // 정수면 그대로(예: 2), 소수면 3자리(예: 2.875)로 변환
            const gongsu = val % 1 === 0 ? val : val.toFixed(4);
            return `${d}/${h} (${gongsu})`;
        };
        const generateId = () => 'doc_' + new Date().getTime() + '_' + Math.random().toString(36).substr(2, 9);
        const getToday = () => {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        };
        const getDayOfWeek = (dateStr) => {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return days[new Date(dateStr).getDay()];
        };

        const SOLAR_HOLIDAYS = {
            '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일',
            '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절'
        };

        const isLeapYear = (year) => {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        };

        // [수정됨] 연차 발생 이력 계산 함수
        const calculateGrantHistory = (joinDateStr, standard, isContract) => {
            if (!joinDateStr) return [];
            const history = [];
            const joinDate = new Date(joinDateStr);
            const today = new Date();
            const currentYear = today.getFullYear();
            const joinYear = joinDate.getFullYear();

            const fmt = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            const addYear = (d, n) => { const newD = new Date(d); newD.setFullYear(newD.getFullYear() + n); return newD; };
            const addMonth = (d, n) => { const newD = new Date(d); newD.setMonth(newD.getMonth() + n); return newD; };

            if (isContract) { /* 계약직 로직 동일 */ return history; }

            if (standard === 'join') {
                // 입사일 기준 로직 (생략 - 기존과 동일하게 유지 가능)
            } else {
                // [핵심 수정] 회계연도 기준 (Fiscal)
                let fiscalEnd1 = new Date(joinYear, 11, 31);
                let mStart = addMonth(joinDate, 1);
                mStart.setDate(1);
                let mEnd = new Date(joinYear, 11, 1);

                // 1. 입사 첫해 월차 (2020년)
                let mCount1 = 0;
                let temp = new Date(mStart);
                while (temp <= fiscalEnd1) { mCount1++; temp = addMonth(temp, 1); }
                if (mCount1 > 11) mCount1 = 11;

                if (mCount1 > 0) {
                    history.push({
                        idx: '입사년(월차)',
                        period: `${joinYear}년 월차`,
                        grantYear: joinYear, // 통계용 연도
                        grantDate: `${fmt(mStart)} ~ ${fmt(mEnd)}\n매월 1일(1개씩)`,
                        days: mCount1,
                        sortDate: fmt(mStart), // 정렬용 날짜
                        allowance: fmt(addYear(joinDate, 1))
                    });
                }

                // 2. 2년차 (회계년도 비례분 + 남은 월차)
                let nextJan = new Date(joinYear + 1, 0, 1);
                if (nextJan.getFullYear() <= currentYear + 1) {
                    // 2-1. 회계년도 비례 연차 (6.3일 등)
                    let workDays = Math.floor((nextJan - joinDate) / (1000 * 60 * 60 * 24));
                    let daysInYear1 = isLeapYear(joinYear) ? 366 : 365;
                    let proRated = (15 * workDays / daysInYear1).toFixed(1);

                    history.push({
                        idx: '2년차(비례)',
                        period: `${joinYear + 1}년 비례분`,
                        grantYear: joinYear + 1,
                        grantDate: fmt(nextJan),
                        days: proRated,
                        sortDate: fmt(nextJan),
                        allowance: fmt(addYear(nextJan, 1))
                    });

                    // 2-2. 2년차 잔여 월차 (7개 등)
                    let mCount2 = 11 - mCount1;
                    if (mCount2 > 0) {
                        let mStart2 = new Date(joinYear + 1, 0, 1);
                        let mEnd2 = addMonth(joinDate, 11);
                        mEnd2.setDate(1);

                        history.push({
                            idx: '2년차(월차)',
                            period: `${joinYear + 1}년 월차`,
                            grantYear: joinYear + 1,
                            grantDate: `${fmt(mStart2)} ~ ${fmt(mEnd2)}\n매월 1일(1개씩)`,
                            days: mCount2,
                            sortDate: fmt(mStart2),
                            allowance: fmt(addYear(joinDate, 1))
                        });
                    }
                }

                // 3. 3년차 이상 정기 연차
                let cursor = new Date(joinYear + 2, 0, 1);
                let fiscalYearCount = 3;
                while (cursor.getFullYear() <= currentYear + 1) {
                    let years = cursor.getFullYear() - joinYear;
                    let days = 15;
                    // 근속 3년(실제 4년차)부터 2년마다 1일 가산
                    if (years >= 3) { days = 15 + Math.floor((years - 2) / 2); }
                    if (days > 25) days = 25;

                    history.push({
                        idx: `${fiscalYearCount}년차`,
                        period: `${cursor.getFullYear()}년 정기`,
                        grantYear: cursor.getFullYear(),
                        grantDate: fmt(cursor),
                        days: days,
                        sortDate: fmt(cursor),
                        allowance: fmt(addYear(cursor, 1))
                    });
                    cursor = addYear(cursor, 1);
                    fiscalYearCount++;
                }
            }
            return history;
        };
        const processLeaveHistory = (user, docs, leaveStandard) => {
            if (user.isContract && user.contractLogs) { return null; }

            // 1. 발생 이력 계산 (앞서 수정한 calculateGrantHistory 호출)
            let history = calculateGrantHistory(user.joinDate, leaveStandard, false);

            // 2. [수정됨] 이력 초기화 및 정렬 객체 생성
            history = history.map(h => ({
                ...h,
                used: 0,
                remain: parseFloat(h.days),
                usageList: [],
                // 💡 [변경] grantDate 문자열 파싱 대신, 사전에 정의한 sortDate를 직접 사용
                sortDateObj: new Date(h.sortDate),
                // 💡 [변경] 유효기간을 calculateGrantHistory에서 넘겨준 allowance(소멸일) 기준으로 설정
                validStartStr: h.sortDate,
                validEndStr: h.allowance
            }));

            // 3. 승인된 휴가 문서 가져오기 (오래된 순으로 정렬하여 앞에서부터 차감)
            const vacations = docs.filter(d =>
                !d.isDeleted &&
                d.authorId === user.id &&
                d.status === 'approved' &&
                d.type === 'vacation'
            ).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            // 4. 차감 로직 수행
            vacations.forEach(v => {
                const typeInfo = LEAVE_TYPES[v.leaveType];
                const isDeductible = typeInfo ? typeInfo.deduct : true;

                if (isDeductible) {
                    let daysNeeded = parseFloat(v.vacationDays);
                    const useDate = v.startDate;

                    // 💡 [중요] 연차 발생 이력을 '오래된 순'으로 탐색하며 차감 (나중에 다시 역순 정렬함)
                    const sortedHistory = [...history].sort((a, b) => a.sortDateObj - b.sortDateObj);

                    for (let h of sortedHistory) {
                        if (daysNeeded <= 0) break;

                        // 해당 연차의 유효기간 내에 사용한 휴가인지 확인
                        if (h.remain > 0 && useDate >= h.validStartStr && useDate <= h.validEndStr) {
                            let deduct = Math.min(h.remain, daysNeeded);
                            deduct = parseFloat(deduct.toFixed(2));

                            // 원본 history 객체의 값을 업데이트
                            const target = history.find(original => original.idx === h.idx && original.sortDate === h.sortDate);
                            if (target) {
                                target.used = parseFloat((target.used + deduct).toFixed(2));
                                target.remain = parseFloat((target.remain - deduct).toFixed(2));

                                target.usageList.push({
                                    doc_id: v.id,
                                    title: v.title,
                                    deducted: deduct,
                                    period: v.startDate + (v.startDate !== v.endDate ? ' ~ ' + v.endDate : ''),
                                    type: v.leaveType
                                });
                            }

                            daysNeeded -= deduct;
                            daysNeeded = parseFloat(daysNeeded.toFixed(2));
                        }
                    }
                }
            });

            // 5. [수정됨] 최종 정렬: 최신 날짜(2026년)가 위로, 과거(2020년)가 아래로
            history.sort((a, b) => b.sortDateObj - a.sortDateObj);
            return history;
        };
        // [추가] 누락된 연차 합계 계산 함수 (사원 추가 시 사용됨)
        const calculateLeave = (joinDateStr, standard, isContract) => {
            // 계약직은 별도 로직(매월 만근 시 발생)을 따르므로 가입 시점 총 연차는 0으로 시작
            if (isContract) return 0;

            const history = calculateGrantHistory(joinDateStr, standard, isContract);
            // 발생 내역의 days를 모두 합산하여 반환
            return history.reduce((acc, curr) => acc + (parseFloat(curr.days) || 0), 0);
        };

        const callGeminiAPI = async (apiKey, prompt) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            } catch (error) { throw error; }
        };

        // --- COMPONENTS ---

        // [수정] 미니 캘린더 (휴가 유형에 따른 색상 변경 추가)
        function MiniCalendar({ startDate, endDate, holidays, fetchHolidays, leaveType = 'full' }) {
            const start = new Date(startDate);
            // [신규] 유형별 색상 결정
            const typeInfo = LEAVE_TYPES[leaveType] || LEAVE_TYPES.full;
            const isAnnual = typeInfo.deduct; // 연차 차감 여부

            // 연차면 파란색 계열, 기타면 회색/보라색 계열
            const rangeClass = isAnnual ? "bg-blue-100 text-blue-800" : "bg-slate-200 text-slate-700";
            const edgeClass = isAnnual ? "bg-blue-600 text-white" : "bg-slate-600 text-white";

            useEffect(() => {
                if (startDate) {
                    const y1 = new Date(startDate).getFullYear();
                    const y2 = new Date(endDate).getFullYear();
                    fetchHolidays(y1);
                    if (y1 !== y2) fetchHolidays(y2);
                }
            }, [startDate, endDate, fetchHolidays]);

            const months = [-1, 0, 1].map(offset => {
                const d = new Date(start.getFullYear(), start.getMonth() + offset, 1);
                return { year: d.getFullYear(), month: d.getMonth() };
            });

            const checkHoliday = (dateStr) => {
                if (holidays && holidays[dateStr]) return holidays[dateStr];
                const [y, m, d] = dateStr.split('-');
                if (SOLAR_HOLIDAYS[`${m}-${d}`]) return SOLAR_HOLIDAYS[`${m}-${d}`];
                return null;
            };

            const renderMonth = ({ year, month }) => {
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const weeks = [];
                let day = 1;
                for (let i = 0; i < 6; i++) {
                    const week = [];
                    for (let j = 0; j < 7; j++) {
                        if (i === 0 && j < firstDay) week.push(null);
                        else if (day > daysInMonth) week.push(null);
                        else {
                            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                            const holidayName = checkHoliday(dateStr);
                            const isHol = holidayName || j === 0;
                            const isSat = j === 6;
                            let classes = "";
                            if (dateStr >= startDate && dateStr <= endDate) {
                                classes += ` ${rangeClass}`; // [수정] 동적 클래스 적용
                                if (dateStr === startDate) classes += ` ${edgeClass} rounded-l-full`;
                                if (dateStr === endDate) classes += ` ${edgeClass} rounded-r-full`;
                            }
                            week.push({ day, isHol, isSat, classes, holidayName });
                            day++;
                        }
                    }
                    weeks.push(week);
                    if (day > daysInMonth) break;
                }
                return (
                    <div className="border rounded p-2 bg-white text-xs w-full">
                        <div className="text-center font-bold mb-1">{year}.{month + 1}</div>
                        <table className="w-full mini-cal table-fixed border-collapse">
                            <thead><tr><th className="text-red-500">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th className="text-blue-500">토</th></tr></thead>
                            <tbody>{weeks.map((week, i) => (<tr key={i}>{week.map((d, j) => (<td key={j} className={`p-1 text-center cursor-default ${d ? d.classes : ''}`} title={d && d.holidayName ? d.holidayName : ''}>{d && <span className={d.isHol ? 'text-red-500 font-bold' : (d.isSat ? 'text-blue-500' : '')}>{d.day}</span>}</td>))}</tr>))}</tbody>
                        </table>
                    </div>
                );
            };
            return <div className="grid grid-cols-3 gap-2 mt-4">{months.map((m, i) => <div key={i}>{renderMonth(m)}</div>)}</div>;
        }

        // [수정] 연도별 캘린더 (색상 표시 오류 수정 및 모바일 최적화)
        function YearlyCalendar({ year, vacations, onOpenDoc, holidays, fetchHolidays }) {
            const months = Array.from({ length: 12 }, (_, i) => i);

            useEffect(() => { fetchHolidays(year); }, [year, fetchHolidays]);

            const checkHoliday = (dateStr) => {
                if (holidays[dateStr]) return holidays[dateStr];
                const [y, m, d] = dateStr.split('-');
                if (SOLAR_HOLIDAYS[`${m}-${d}`]) return SOLAR_HOLIDAYS[`${m}-${d}`];
                return null;
            };

            const renderMonth = (monthIndex) => {
                const date = new Date(year, monthIndex, 1);
                const firstDay = date.getDay();
                const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(i);

                return (
                    <div key={monthIndex} className="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-lg shadow-sm p-3 h-full">
                        <div className="text-center font-bold mb-3 text-base text-gray-800 dark:text-white border-b border-gray-100 dark:border-gray-700 pb-2">
                            {monthIndex + 1}월
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center">
                            {/* 요일 헤더 */}
                            <div className="text-xs font-bold text-red-500 py-1">일</div>
                            <div className="text-xs font-bold text-gray-500 dark:text-gray-400 py-1">월</div>
                            <div className="text-xs font-bold text-gray-500 dark:text-gray-400 py-1">화</div>
                            <div className="text-xs font-bold text-gray-500 dark:text-gray-400 py-1">수</div>
                            <div className="text-xs font-bold text-gray-500 dark:text-gray-400 py-1">목</div>
                            <div className="text-xs font-bold text-gray-500 dark:text-gray-400 py-1">금</div>
                            <div className="text-xs font-bold text-blue-500 py-1">토</div>

                            {/* 날짜 셀 */}
                            {days.map((d, idx) => {
                                if (!d) return <div key={idx} className="h-9"></div>;

                                const dateStr = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                const holidayName = checkHoliday(dateStr);
                                const isHol = holidayName || (idx % 7) === 0;
                                const isSat = (idx % 7) === 6;

                                let vacation = null;
                                let isStart = false;
                                let isEnd = false;

                                // 데이터가 있으면 찾기
                                if (vacations && vacations.length > 0) {
                                    for (const v of vacations) {
                                        if (dateStr >= v.startDate && dateStr <= v.endDate) {
                                            vacation = v;
                                            if (dateStr === v.startDate) isStart = true;
                                            if (dateStr === v.endDate) isEnd = true;
                                            break;
                                        }
                                    }
                                }

                                // 스타일링 로직 (명확하게 분리)
                                let baseClasses = "h-9 flex flex-col items-center justify-center text-xs relative transition-colors rounded ";
                                let colorClasses = "";
                                let textClass = "";

                                if (vacation) {
                                    // 휴가인 경우 (배경색 적용)
                                    baseClasses += "cursor-pointer font-bold ";
                                    textClass = "text-white z-10"; // 텍스트 흰색 강제 적용

                                    // LEAVE_TYPES 안전하게 접근
                                    const typeInfo = (window.LEAVE_TYPES || LEAVE_TYPES)[vacation.leaveType];
                                    const isGreen = typeInfo?.color === 'green';

                                    if (isGreen) {
                                        colorClasses = "bg-green-500 hover:bg-green-600";
                                    } else {
                                        colorClasses = "bg-amber-400 hover:bg-amber-500";
                                    }

                                    // 시작/종료일에 따른 둥근 모서리 처리
                                    if (isStart && !isEnd) baseClasses += "rounded-l-md rounded-r-none ml-0.5 ";
                                    else if (!isStart && isEnd) baseClasses += "rounded-r-md rounded-l-none mr-0.5 ";
                                    else if (!isStart && !isEnd) baseClasses += "rounded-none ";
                                    else baseClasses += "rounded-md "; // 하루짜리 휴가

                                } else {
                                    // 휴가가 아닌 경우 (기본 텍스트 색상)
                                    baseClasses += "cursor-default hover:bg-gray-50 dark:hover:bg-gray-700 ";
                                    if (isHol) textClass = "text-red-500 font-bold";
                                    else if (isSat) textClass = "text-blue-500";
                                    else textClass = "text-gray-700 dark:text-gray-300";
                                }

                                return (
                                    <div key={idx} className={`${baseClasses} ${colorClasses}`} onClick={() => vacation && onOpenDoc(vacation.id)}>
                                        <span className={textClass}>{d}</span>
                                        {holidayName && !vacation && (
                                            <div className="absolute bottom-0 left-0 w-full text-[8px] text-red-400 truncate px-0.5 leading-none text-center">
                                                {holidayName}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                // 모바일: 1열, 태블릿: 2열, PC: 3~4열 반응형 그리드
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-4 overflow-y-auto max-h-[60vh] custom-scrollbar bg-gray-100 dark:bg-gray-900/50 rounded-lg border border-gray-200 dark:border-gray-700">

            );
        }

        // [수정] 상세 이력 모달 (모바일 카드 뷰 + 헤더 고정 sticky 적용)
        function HistoryModal({ user, onClose, historyData, userDocs, onOpenDoc, holidays, fetchHolidays, getLeaveStats }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            const [year, setYear] = useState(new Date().getFullYear());
            const [expandedRow, setExpandedRow] = useState(null);

            const [activeTab, setActiveTab] = useState('annual');
            const [viewMode, setViewMode] = useState('list');

            // 계약직 데이터 처리
            const combinedContractLogs = useMemo(() => {
                if (!user.isContract) return null;
                let allLogs = { ...(user.contractLogs || {}) };
                if (user.contractHistory && user.contractHistory.length > 0) {
                    user.contractHistory.forEach(h => {
                        if (h.logs) {
                            allLogs = { ...allLogs, ...h.logs };
                        }
                    });
                }
                return allLogs;
            }, [user]);

            // [통계 1] 연차 통계
            const annualStats = useMemo(() => {
                if (user.isContract) {
                    let grant = 0, used = 0, expired = 0;
                    const todayStr = new Date().toISOString().split('T')[0];
                    if (combinedContractLogs) {
                        Object.entries(combinedContractLogs).forEach(([key, log]) => {
                            if (key.startsWith(String(year))) {
                                if (log.isFullAttendance) {
                                    grant += (log.granted || 0);
                                    if (log.isUsed) used += (log.granted || 0);
                                    else if (log.validUntil && log.validUntil !== '-' && log.validUntil < todayStr) expired += (log.granted || 0);
                                }
                            }
                        });
                    }
                    return { grant, used, remain: grant - used - expired };
                } else {
                    let grant = 0, used = 0;
                    historyData.forEach(h => {
                        // 💡 [변경 포인트] 복잡한 문자열 검사 대신, 데이터 생성 시 심어둔 grantYear를 사용합니다.
                        // 이렇게 하면 2021년 비례분(6.3)과 2021년 월차(7)가 모두 2021년으로 합산되어 13.3이 됩니다.
                        if (h.grantYear == year) {
                            grant += parseFloat(h.days) || 0;
                            used += parseFloat(h.used) || 0;
                        }
                    });
                    // 소수점 합산 오차 방지를 위해 1자리로 고정
                    grant = parseFloat(grant.toFixed(1));
                    used = parseFloat(used.toFixed(1));

                    return { grant, used, remain: parseFloat((grant - used).toFixed(1)) };
                }

                    else if (d.leaveType === 'public') publicLeave += days;

                    ['condolence', 'public', 'other'].includes(d.leaveType) &&

                                        <div className="text-center"><div className="text-gray-500 dark:text-slate-400 text-[10px] md:text-xs mb-1">병가</div><div className="text-xl md:text-2xl font-bold text-amber-500 dark:text-amber-400">{otherStats.public}</div></div>

                        {/* 메인 컨텐츠 영역 */}

                                                    {user.isContract ? (

                                                                <tr className="hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors">

                                                                        {h.used > 0 ? (<button onClick={() => setExpandedRow(expandedRow === idx ? null : idx)} className="text-blue-600 dark:text-blue-400 font-bold hover:underline flex items-center justify-center gap-1 w-full">{h.used} {expandedRow === idx ? <ChevronUp size={14} /> : <ChevronDown size={14} />}</button>) : (<span className="text-gray-400 dark:text-slate-600">0</span>)}
                                                                    </td>
                                                                    <td className="p-4 text-red-500 dark:text-red-400">{h.allowance}</td>

                                                                {expandedRow === idx && h.usageList && h.usageList.length > 0 && (

                                                    .sort()
                                                    .map(([key, log]) => {
                                                        if (!log.isFullAttendance) return null;

        /* [수정 58] CertificateModal: 모바일 상단 잘림 해결 (items-start 적용) */
        function CertificateModal({ user, onClose, settings, onIssue, certificates }) {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);

            const [issueDate, setIssueDate] = useState(new Date().toISOString().split('T')[0]);

            const targetDate = useMemo(() => {
                const [y, m, d] = issueDate.split('-').map(Number);
                return new Date(y, m - 1, d);
            }, [issueDate]);

            const issueDateStr = `${targetDate.getFullYear()}년 ${targetDate.getMonth() + 1}월 ${targetDate.getDate()}일`;

            // 💡 [변경] 최근 발급 정보(settings)를 우선 사용하고, 없으면 기본값을 씁니다.
            const [footerInfo, setFooterInfo] = useState(() => {
                return {
                    institution: settings.lastIssuingAuthority || '영농조합법인 한국맥꾸룸',
                    official: settings.lastIssuerName || '대표이사 OOO'
                };
            });

            const [usage, setUsage] = useState(() => localStorage.getItem('last_cert_usage') || '관공서 제출용');
            const usages = ["관공서 제출용", "금융기관 제출용", "이직/재취업용", "비자 발급용", "대출 신청용", "기타"];

            useEffect(() => { localStorage.setItem('dms_cert_footer', JSON.stringify(footerInfo)); }, [footerInfo]);

            const safeResignDate = user.resignDate ? new Date(user.resignDate) : null;
            const isResigned = safeResignDate && safeResignDate <= targetDate;

            const [docType, setDocType] = useState(isResigned ? '경력증명서' : '재직증명서');
            const [durationFormat, setDurationFormat] = useState('ymd');
            const [rrnOption, setRrnOption] = useState('masked');

            const hasHistory = user.contractHistory && user.contractHistory.length > 0;

            const [inputs, setInputs] = useState({
                docNum: '',
                address: user.address || '',
                detailPeriod: true
            });

            const [showSaveConfirm, setShowSaveConfirm] = useState(false);

            const getNextDocNum = (year) => {
                if (!certificates || certificates.length === 0) return 1;
                const prefix = `제 ${year}-`;
                const sameYearCerts = certificates.filter(c => c.docNum && c.docNum.startsWith(prefix));
                if (sameYearCerts.length === 0) return 1;
                let maxNum = 0;
                sameYearCerts.forEach(c => {
                    try {
                        const parts = c.docNum.replace(prefix, '').replace('호', '');
                        const num = parseInt(parts, 10);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    } catch (e) { }
                });
                return maxNum + 1;
            };

            useEffect(() => {
                const year = targetDate.getFullYear();
                const nextSeq = getNextDocNum(year);
                setInputs(prev => ({ ...prev, docNum: `제 ${year}-${nextSeq}호` }));
            }, [targetDate, certificates]);

            const rrnDisplay = useMemo(() => {
                if (!user.birthDate) return '';
                const parts = user.birthDate.split('-');
                if (parts.length !== 3) return user.birthDate;
                const [yyyy, mm, dd] = parts;
                const rrnFront = `${yyyy.slice(2)}${mm}${dd}`;
                let backFirst = '1';
                const yearNum = parseInt(yyyy);
                if (user.gender === 'female') backFirst = yearNum < 2000 ? '2' : '4';
                else backFirst = yearNum < 2000 ? '1' : '3';

                let rrnBackRest = '******';
                if (rrnOption === 'blank') rrnBackRest = '      ';
                if (rrnOption === 'full' && user.rrnBack && user.rrnBack.length === 7) return `${rrnFront}-${user.rrnBack}`;
                return `${rrnFront}-${backFirst}${rrnBackRest}`;
            }, [user, rrnOption]);

            const finalData = useMemo(() => {
                let list = [];
                if (hasHistory) {
                    user.contractHistory.forEach(h => {
                        list.push({ start: new Date(h.startDate), end: new Date(h.endDate), type: '과거 계약', note: '계약 만료' });
                    });
                }

                const currentStart = new Date(user.joinDate);
                let currentEnd;
                if (isResigned) currentEnd = safeResignDate;
                else {
                    if (docType === '경력증명서') currentEnd = targetDate;
                    else currentEnd = user.contractEndDate ? new Date(user.contractEndDate) : targetDate;
                }

                list.push({ start: currentStart, end: currentEnd, type: '현재', note: isResigned ? '퇴사' : (docType === '재직증명서' ? '재직 중' : '현재') });
                list.sort((a, b) => b.start - a.start);

                let totalDays = 0;
                list.forEach(p => {
                    let calcEnd = p.end;
                    if (p.type === '현재' && !isResigned && p.end > targetDate) calcEnd = targetDate;
                    const diff = calcEnd - p.start;
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
                    totalDays += days > 0 ? days : 0;
                });

                const years = Math.floor(totalDays / 365);
                const months = Math.floor((totalDays % 365) / 30);
                const days = (totalDays % 365) % 30;
                const totalMonths = Math.floor(totalDays / 30);

                let durationStr = '';
                if (durationFormat === 'ymd') durationStr = `${years > 0 ? years + '년 ' : ''}${months > 0 ? months + '개월 ' : ''}${days}일`;
                else if (durationFormat === 'ym') durationStr = `${years > 0 ? years + '년 ' : ''}${months}개월`;
                else if (durationFormat === 'm') durationStr = `${totalMonths}개월`;
                else if (durationFormat === 'd') durationStr = `${totalDays}일`;
                if (durationStr === '') durationStr = '1일';

                const sortedList = [...list].sort((a, b) => a.start - b.start);
                const firstDate = sortedList[0].start;
                const lastDate = sortedList[sortedList.length - 1].end;
                const fmt = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

                let periodStr = "";
                if (list.length > 1) periodStr = "상세 근무 이력 참조";
                else {
                    // '현재' 글자 대신 fmt(targetDate)를 사용하여 오늘 날짜(발급일)가 나오게 수정
                    const endStr = (list[0].type === '현재' && !isResigned) ? fmt(targetDate) : fmt(lastDate);
                    periodStr = `${fmt(firstDate)} ~ ${endStr}`;
                }

                return { periodStr, totalDuration: durationStr, historyList: list };
            }, [user, docType, durationFormat, isResigned, hasHistory, targetDate]);

            const handleSaveRequest = () => {
                setShowSaveConfirm(true);
            };

            const executeSave = () => {
                const snapshot = {
                    id: Date.now(),
                    date: issueDate,
                    issueDateStr: issueDateStr,
                    type: docType,
                    docNum: inputs.docNum,
                    usage: usage,
                    targetUser: { name: user.name, rank: user.rank, birthDate: user.birthDate },
                    address: inputs.address,
                    rrnDisplay: rrnDisplay,
                    institution: footerInfo.institution,
                    issuer: footerInfo.official,
                    periodStr: finalData.periodStr,
                    totalDuration: finalData.totalDuration,
                    detailPeriod: inputs.detailPeriod,
                    historyList: finalData.historyList.map(h => ({ type: h.type, start: h.start.toISOString(), end: h.end.toISOString(), note: h.note }))
                };

                if (onIssue) onIssue(snapshot);
                localStorage.setItem('last_cert_usage', usage);
                onClose();
            };

            return (
                // [핵심 수정] items-center -> items-start로 변경하여 긴 내용이 위로 잘리는 현상 방지
                <div className="fixed inset-0 bg-black/70 z-50 flex justify-center items-start md:items-center p-4 overflow-y-auto">

                    <div className="bg-gray-100 dark:bg-gray-900 w-full max-w-6xl rounded-xl shadow-2xl flex flex-col md:flex-row h-auto md:h-[90vh] md:overflow-hidden animate-fade-in-up relative my-10 md:my-0">

                        {/* 좌측 패널 (설정) */}
                        <div className="w-full md:w-96 bg-white dark:bg-gray-800 border-r dark:border-gray-700 p-6 flex flex-col gap-5 no-print md:overflow-y-auto custom-scrollbar">
                            <div className="flex justify-between items-center border-b pb-4 dark:border-gray-700">
                                <h3 className="font-bold text-lg text-gray-800 dark:text-white flex items-center gap-2"><Printer size={20} /> 증명서 설정</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><X /></button>
                            </div>

                            <div className="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded border border-yellow-100 dark:border-yellow-800">
                                <label className="block text-xs font-bold text-yellow-800 dark:text-yellow-400 mb-1">발급 기준일</label>
                                <input type="date" value={issueDate} onChange={(e) => setIssueDate(e.target.value)} className="w-full border p-2 rounded text-sm font-bold dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
                                <p className="text-[10px] text-gray-500 mt-1 dark:text-gray-400">※ 날짜를 변경하면 문서 번호가 해당 연도 기준으로 갱신됩니다.</p>
                            </div>

g-gray-700 dark:border-gray-600 dark:text-white" /></div></div>

                            <div className="mt-auto pt-4 flex flex-col gap-2">
                                <button onClick={handleSaveRequest} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 shadow flex justify-center items-center gap-2">
                                    <FileText size={18} /> 발급 및 저장 (대장 등록)
                                </button>
                            </div>
                        </div>

                        {/* 우측 미리보기 */}
                        <div className="flex-1 bg-gray-500 p-8 md:overflow-auto flex justify-center items-start">
                            <FitScreenWrapper>
                                <CertificatePaper
                                    docType={docType}
                                    docNum={inputs.docNum}
                                    user={user}
                                    rrnDisplay={rrnDisplay}
                                    address={inputs.address}
                                    institution={footerInfo.institution}
                                    official={footerInfo.official}
                                    stamp={settings.stampApproved}
                                    periodStr={finalData.periodStr}
                                    totalDuration={finalData.totalDuration}

                    {/* 저장 확인 모달 */}
                    {showSaveConfirm && (

                                    <div className="bg-indigo-100 p-2 rounded-full"><FileText size={24} /></div>
                                    <h3 className="text-lg font-bold dark:text-indigo-400">발급 및 저장</h3>
                                </div>
                                <p className="text-gray-600 dark:text-gray-300 mb-6 leading-relaxed">
                                    현재 작성된 내용으로 <strong>{docType}</strong>를 발급하고<br />
                                    발급 대장에 기록하시겠습니까?
                                </p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowSaveConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300">취소</button>
                                    <button onClick={executeSave} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow transition-colors">확인 (발급)</button>
                                </div>
                            </div>
                        </div>
                    )}

            );
