        /* [수정 60] UserManager: 증명서 발급 직후 뷰어 자동 열기 (원스톱 처리) */
        function UserManager({ users, docs, onAdd, onUpdate, onRemove, onReorder, settings, onViewDoc, holidays, fetchHolidays, getLeaveStats, certificates, onAddCertLog, onDeleteCertLog }) {
            const [newUser, setNewUser] = useState({
                name: '', rank: '', joinDate: getToday(), isContract: false,
                gender: 'male', rrnBack: '', email: '',
                resignDate: '', phone: '', birthDate: '', address: '', zone: '', note: '', contractEndDate: '',
                size_top: '', size_bottom: '', size_shoe: '' // <--- [추가]
            });
            const [viewMode, setViewMode] = useState('list');
            const [userFilter, setUserFilter] = useState('active');
            const [isReordering, setIsReordering] = useState(false);

            // 드래그 상태 관리
            const dragItem = useRef(null);
            const [dropTarget, setDropTarget] = useState(null);
            const [draggingId, setDraggingId] = useState(null);

            const [modalUser, setModalUser] = useState(null);
            const [contractModalUser, setContractModalUser] = useState(null);
            const [editUser, setEditUser] = useState(null);
            const [certUser, setCertUser] = useState(null);
            const [viewCertLog, setViewCertLog] = useState(null);
            const [deleteTargetUser, setDeleteTargetUser] = useState(null);
            const [deleteTargetCertId, setDeleteTargetCertId] = useState(null);
            const [enrichedHistory, setEnrichedHistory] = useState([]);
            const [userDocs, setUserDocs] = useState([]);

            const currentYear = new Date().getFullYear();
            const todayStr = new Date().toISOString().split('T')[0];

            const filteredUsers = useMemo(() => {
                return users.filter(u => {
                    if (u.id === 'admin') return false;
                    const isResigned = u.resignDate && u.resignDate <= todayStr;
                    const isExpired = u.isContract && u.contractEndDate && u.contractEndDate < todayStr;
                    const isInactive = isResigned || isExpired;
                    if (userFilter === 'active') return !isInactive;
                    if (userFilter === 'resigned') return isInactive;
                    return true;
                });
            }, [users, userFilter, todayStr]);

            const activeCount = users.filter(u => u.id !== 'admin' && !((u.resignDate && u.resignDate <= todayStr) || (u.isContract && u.contractEndDate && u.contractEndDate < todayStr))).length;
            const inactiveCount = users.filter(u => u.id !== 'admin' && ((u.resignDate && u.resignDate <= todayStr) || (u.isContract && u.contractEndDate && u.contractEndDate < todayStr))).length;

            // [신규] 증명서 발급 후 바로 뷰어 열기 핸들러
            const handleDirectIssue = (newCert) => {
                // 1. 데이터 저장 (App으로 전달)
                onAddCertLog(newCert);

                // 2. 입력 모달 닫기
                setCertUser(null);

                // 3. 뷰어 모달 바로 열기 (방금 만든 문서)
                setViewCertLog(newCert);

                // 4. (선택사항) 배경 탭을 '증명서 대장'으로 전환하여 문맥 유지
                setViewMode('certHistory');
            };

            // --- [PC 마우스 드래그 핸들러] ---
            const handleDragStart = (e, user) => {
                dragItem.current = user;
                setDraggingId(user.id);
                e.dataTransfer.effectAllowed = "move";
                e.currentTarget.style.opacity = "0.4";
            };

            const handleDragOver = (e, targetUser) => {
                e.preventDefault();
                if (!dragItem.current || dragItem.current.id === targetUser.id) return;
                updateDropTarget(e.clientY, e.currentTarget, targetUser);
            };

            const handleDragEnd = (e) => {
                setDraggingId(null);
                executeReorder();
                e.currentTarget.style.opacity = "1";
            };

            // --- [모바일 터치 드래그 핸들러] ---
            const handleTouchStart = (e, user) => {
                if (navigator.vibrate) navigator.vibrate(50);
                dragItem.current = user;
                setDraggingId(user.id);
                document.body.style.overflow = 'hidden';
            };

            const handleTouchMove = (e) => {
                if (e.cancelable) e.preventDefault();
                const touch = e.touches[0];
                const element = document.elementFromPoint(touch.clientX, touch.clientY);
                if (!element) return;

                const row = element.closest('tr') || element.closest('.mobile-user-card');
                if (!row || !row.dataset.id) return;

                const targetId = row.dataset.id;
                if (dragItem.current && targetId === dragItem.current.id) {
                    setDropTarget(null);
                    return;
                }

                const targetUser = filteredUsers.find(u => u.id === targetId);
                if (targetUser) {
                    updateDropTarget(touch.clientY, row, targetUser);
                }
            };

            const handleTouchEnd = (e) => {
                document.body.style.overflow = 'auto';
                setDraggingId(null);
                executeReorder();
            };

            // --- [공통 로직] ---
            const updateDropTarget = (clientY, element, targetUser) => {
                const rect = element.getBoundingClientRect();
                const midY = rect.top + (rect.height / 2);
                const hoverPos = clientY < midY ? 'top' : 'bottom';

                if (!dropTarget || dropTarget.id !== targetUser.id || dropTarget.pos !== hoverPos) {
                    setDropTarget({ id: targetUser.id, pos: hoverPos });
                }
            };

            const executeReorder = () => {
                if (dragItem.current && dropTarget) {
                    const draggedUser = dragItem.current;
                    const targetUserId = dropTarget.id;
                    const position = dropTarget.pos;

                    if (draggedUser.id !== targetUserId) {
                        const newUsers = [...users];
                        const sourceIdx = newUsers.findIndex(u => u.id === draggedUser.id);
                        if (sourceIdx !== -1) {
                            const [removed] = newUsers.splice(sourceIdx, 1);
                            let targetIdx = newUsers.findIndex(u => u.id === targetUserId);
                            if (targetIdx !== -1) {
                                if (position === 'bottom') targetIdx += 1;
                                newUsers.splice(targetIdx, 0, removed);
                                if (onReorder) onReorder(newUsers);
                            }
                        }
                    }
                }
                dragItem.current = null;
                setDropTarget(null);
            };

            const handleDragLeave = (e) => { };

            // ... (기존 통계/파일처리 함수들 유지) ...
            const getYearlyStats = (targetUser) => {
                const yearStr = currentYear.toString();
                let grant = 0, used = 0, remain = 0;
                let counts = { condolence: 0, public: 0, other: 0 };
                if (targetUser.isContract) {
                    let expired = 0;
                    if (targetUser.contractLogs) {
                        Object.entries(targetUser.contractLogs).forEach(([key, log]) => {
                            if (key.startsWith(yearStr)) {
                                if (log.isFullAttendance) {
                                    grant += (log.granted || 0);
                                    if (log.isUsed) used += (log.granted || 0);
                                    else if (log.validUntil && log.validUntil !== '-' && log.validUntil < todayStr) expired += (log.granted || 0);
                                }
                            }
                        });
                    }
                    remain = grant - used - expired;
                } else {
                    let history = processLeaveHistory(targetUser, docs, settings.leaveStandard);
                    if (history) {
                        history.forEach(h => {
                            if (h.grantDate.startsWith(yearStr) || (h.period.startsWith(yearStr) && h.idx.includes('월차'))) {
                                grant += parseFloat(h.days) || 0;
                                used += parseFloat(h.used) || 0;
                            }
                        });
                    }
                    remain = grant - used;
                }
                const userVacations = docs.filter(d => !d.isDeleted && d.authorId === targetUser.id && d.status === 'approved' && d.type === 'vacation' && d.startDate.startsWith(yearStr));
                userVacations.forEach(v => {
                    const days = parseFloat(v.vacationDays) || 0;
                    if (v.leaveType === 'condolence') counts.condolence += days;
                    else if (v.leaveType === 'public') counts.public += days;
                    else if (v.leaveType === 'other') counts.other += days;
                });
                return { grant, used, remain, ...counts };
            };

            useEffect(() => {
                if (modalUser) {
                    const history = processLeaveHistory(modalUser, docs, settings.leaveStandard);
                    const usages = docs.filter(d => !d.isDeleted && d.authorId === modalUser.id && d.status === 'approved' && d.type === 'vacation').sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
                    setUserDocs(usages);
                    setEnrichedHistory(history || []);
                }
            }, [modalUser, docs, settings]);

            // 2. 초기화 함수에도 사이즈 추가 (등록 후 빈 칸 만들기 위함)
            const handleAdd = (e) => { e.preventDefault(); onAdd(newUser); setNewUser({ name: '', rank: '', joinDate: getToday(), isContract: false, gender: 'male', rrnBack: '', email: '', resignDate: '', phone: '', birthDate: '', address: '', zone: '', note: '', contractEndDate: '', size_top: '', size_bottom: '', size_shoe: '' }); };
            const handleImageUpload = (e, userId) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = (ev) => { const user = users.find(u => u.id === userId); if (user) onUpdate({ ...user, signature: ev.target.result }); }; reader.readAsDataURL(file); } };
            const handleEditSave = (updatedUserData) => { onUpdate(updatedUserData); setEditUser(null); };
            const handleRenewContract = (userId, newStart, newEnd) => { const target = users.find(u => u.id === userId); if (!target) return; const historyItem = { period: `${target.joinDate.split('-')[0]}년 계약`, startDate: target.joinDate, endDate: target.contractEndDate, logs: target.contractLogs || {}, archivedAt: new Date().toISOString() }; const updatedUser = { ...target, joinDate: newStart, contractEndDate: newEnd, contractLogs: {}, leaveTotal: 0, contractHistory: [...(target.contractHistory || []), historyItem] }; onUpdate(updatedUser); };
            const handleUndoRenew = (userId) => { const target = users.find(u => u.id === userId); if (!target || !target.contractHistory || target.contractHistory.length === 0) return; const history = [...target.contractHistory]; const lastHistory = history.pop(); const restoredUser = { ...target, joinDate: lastHistory.startDate, contractEndDate: lastHistory.endDate, contractLogs: lastHistory.logs, leaveTotal: 0, contractHistory: history }; let totalGranted = 0; Object.values(lastHistory.logs).forEach(l => { if (l.isFullAttendance) totalGranted += (l.granted || 0); }); restoredUser.leaveTotal = totalGranted; onUpdate(restoredUser); };
            const handleDeleteClick = (user) => { setDeleteTargetUser(user); };

            const confirmCertDelete = () => { if (deleteTargetCertId) { onDeleteCertLog(deleteTargetCertId); setDeleteTargetCertId(null); } };

            return (
                <div className="space-y-6 mb-20">
                    {/* 상단 헤더 */}
                    <div className="flex flex-col md:flex-row justify-between items-center gap-3 md:gap-0">

                        {/* 버튼 그룹 */}
                        <div className="flex bg-gray-200 dark:bg-gray-700 rounded p-1 gap-1 w-full md:w-auto overflow-x-auto">

                                        <div className="text-[10px] text-purple-600 font-bold mb-1 bg-purple-50 inline-block px-2 py-0.5 rounded">업무 시간</div>

                                            {businessHours.map(h => (
                                                <button type="button" key={h} onClick={() => setSelectedHour(h)} className={`py-2 rounded font-bold text-sm transition-all ${selectedHour === h ? 'bg-purple-600 text-white shadow-md scale-105' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200'}`}>{h}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="border-t pt-2 dark:border-gray-700">
                                        <div className="text-[10px] text-gray-400 font-bold mb-1">그 외 시간</div>
                                        <div className="grid grid-cols-4 gap-1.5">
                                            {otherHours.map(h => (
                                                <button type="button" key={h} onClick={() => setSelectedHour(h)} className={`py-1.5 rounded text-xs transition-all ${selectedHour === h ? 'bg-gray-600 text-white font-bold' : 'bg-white border border-gray-200 text-gray-500 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-400'}`}>{h}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="w-1/3 flex flex-col border-l pl-6 dark:border-gray-700">
                                <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Minute (분)</div>
                                <div className="flex flex-col gap-3 flex-1">
                                    <button type="button" onClick={() => setSelectedMinute('00')} className={`flex-1 flex items-center justify-center rounded-lg border-2 transition-all ${selectedMinute === '00' ? 'border-purple-600 bg-purple-50 text-purple-700 font-extrabold text-xl shadow-inner' : 'border-gray-200 hover:border-purple-300 text-gray-600 dark:border-gray-600 dark:text-gray-300'}`}>00분</button>
                                    <button type="button" onClick={() => setSelectedMinute('30')} className={`flex-1 flex items-center justify-center rounded-lg border-2 transition-all ${selectedMinute === '30' ? 'border-purple-600 bg-purple-50 text-purple-700 font-extrabold text-xl shadow-inner' : 'border-gray-200 hover:border-purple-300 text-gray-600 dark:border-gray-600 dark:text-gray-300'}`}>30분</button>
                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                        {['10', '20', '40', '50'].map(m => (
                                            <button type="button" key={m} onClick={() => setSelectedMinute(m)} className={`py-2 rounded text-xs font-medium ${selectedMinute === m ? 'bg-gray-600 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-300'}`}>{m}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center">
                            <div className="text-2xl font-bold text-gray-800 dark:text-white font-mono tracking-wider">{selectedHour} : {selectedMinute}</div>
                            <div className="flex gap-2">
                                <button type="button" onClick={onClose} className="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-bold text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200">취소</button>
                                <button type="button" onClick={handleConfirm} className="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm shadow-md">확인</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* [신규] 화면 폭에 맞춰 내용물 자동 축소 (모바일 A4 미리보기용) */
        const FitScreenWrapper = ({ children }) => {
            const containerRef = useRef(null);
            const [scale, setScale] = useState(1);

            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const containerWidth = containerRef.current.clientWidth;
                        // A4 너비(210mm)는 약 794px (96dpi 기준)
                        const contentWidth = 794;

                        // 화면이 A4보다 작을 때만 축소 (좌우 여백 20px 확보)
                        if (containerWidth > 0 && containerWidth < contentWidth + 20) {
                            const newScale = (containerWidth - 20) / contentWidth;
                            setScale(newScale);
                        } else {
                            setScale(1);
                        }
                    }
                };

                window.addEventListener('resize', handleResize);
                handleResize(); // 초기 실행
                setTimeout(handleResize, 100); // 렌더링 안정화 후 재실행

                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return (
                <div ref={containerRef} className="w-full flex justify-center items-start overflow-hidden origin-top">
                    <div
                        style={{
                            transform: `scale(${scale})`,
                            transformOrigin: 'top center',
                            width: '794px', // 스케일링 기준 너비 고정
                            transition: 'transform 0.2s ease-out'
                        }}
                    >
                        {children}
                    </div>
                </div>
            );
        };


        /* -------------------------------------------------------------------------- */
        /* [수정 4] EventManager: Native Confirm 제거 및 커스텀 모달 적용 (먹통 해결) */
        /* -------------------------------------------------------------------------- */

        /* 초기 상태값 정의 */
        const INITIAL_EVENT_FORM = {
            title: '',
            startDate: '',
            endDate: '',
            startTime: '', endTime: '',
            location: '', target: [], note: ''
        };

        /* [수정 55] EventManager: 모바일 헤더 분리 및 리스트 버튼 하단 배치 */
        function EventManager({ events, setEvents, users }) {
            const [year, setYear] = useState(new Date().getFullYear());

            const [filterMonth, setFilterMonth] = useState('all');
            const [searchKeyword, setSearchKeyword] = useState('');

            const [newEvent, setNewEvent] = useState(INITIAL_EVENT_FORM);
            const [editingId, setEditingId] = useState(null);
            const [timePickerTarget, setTimePickerTarget] = useState(null);
            const [deleteTargetId, setDeleteTargetId] = useState(null);
            // [수정 1] 재직자 목록 정의 (퇴사자/만료자 제외)
            const activeUsers = useMemo(() => {
                // 한국 시간 기준 오늘 날짜 구하기
                const now = new Date();
                const kstDate = new Date(now.getTime() + (9 * 60 * 60 * 1000));
                const todayStr = kstDate.toISOString().split('T')[0];

                return users.filter(u => {
                    if (u.id === 'admin') return false; // 관리자 제외
                    if (u.resignDate && u.resignDate <= todayStr) return false; // 퇴사일이 지났으면 제외
                    if (u.isContract && u.contractEndDate && u.contractEndDate < todayStr) return false; // 계약기간이 끝났으면 제외
                    return true;
                });
            }, [users]);

            const filteredEvents = useMemo(() => {
                return events.filter(e => {
                    if (!e.startDate.startsWith(String(year))) return false;

                    if (filterMonth !== 'all') {
                        const eventMonth = parseInt(e.startDate.split('-')[1]);
                        if (eventMonth !== parseInt(filterMonth)) return false;
                    }

                    if (searchKeyword) {
                        const keyword = searchKeyword.toLowerCase();
                        const title = (e.title || '').toLowerCase();
                        const location = (e.location || '').toLowerCase();
                        const note = (e.note || '').toLowerCase();

                        const targetNames = (Array.isArray(e.target) ? e.target : [])
                            .map(id => {
                                const u = users.find(user => user.id === id);
                                return u ? u.name : '';
                            })
                            .join(' ')
                            .toLowerCase();

                        if (!title.includes(keyword) &&
                            !location.includes(keyword) &&
                            !note.includes(keyword) &&
                            !targetNames.includes(keyword)) return false;
                    }

                    return true;
                }).sort((a, b) => a.startDate.localeCompare(b.startDate));
            }, [events, year, filterMonth, searchKeyword, users]);

            const resetForm = () => {
                setNewEvent({ ...INITIAL_EVENT_FORM });
                setEditingId(null);
            };
            const handleEditStart = () => {
                setEditForm({ ...selectedEvent });
                setIsEditing(true);
            };

            const handleEditSave = (e) => {
                e.preventDefault();
                setEvents(prev => prev.map(evt => evt.id === editForm.id ? editForm : evt));
                setSelectedEvent(editForm);
                setIsEditing(false);
            };

            const handleDeleteEvent = () => {
                setEvents(prev => prev.filter(e => e.id !== selectedEvent.id));
                setShowDeleteConfirm(false);
                setSelectedEvent(null);
            };

            const toggleUser = (userId) => {
                const currentTarget = editForm.target || [];
                const newTarget = currentTarget.includes(userId)
                    ? currentTarget.filter(id => id !== userId)
                    : [...currentTarget, userId];
                setEditForm({ ...editForm, target: newTarget });
            };

            // [수정 2] 전체 선택 시 재직자만 선택되도록 변경
            const handleSelectAll = () => setNewEvent(prev => ({ ...prev, target: activeUsers.map(u => u.id) }));
            const handleDeselectAll = () => setNewEvent(prev => ({ ...prev, target: [] }));

            const handleSave = async (e) => {
                e.preventDefault();
                if (!newEvent.title || !newEvent.startDate || !newEvent.endDate) return;
                if (newEvent.startDate > newEvent.endDate) return;

                if (editingId) {
                    setEvents(prev => prev.map(evt => evt.id === editingId ? { ...evt, ...newEvent } : evt));
                } else {
                    const eventItem = { id: 'evt_' + Date.now(), ...newEvent };
                    setEvents(prev => [...prev, eventItem]);
                }
                resetForm();
            };

            const handleEditClick = (evt) => {
                setEditingId(evt.id);
                let targetArray = evt.target;
                if (typeof targetArray === 'string') targetArray = [];
                setNewEvent({
                    ...INITIAL_EVENT_FORM,
                    ...evt,
                    location: evt.location || '',
                    note: evt.note || '',
                    startTime: evt.startTime || '',
                    endTime: evt.endTime || '',
                    target: Array.isArray(targetArray) ? targetArray : []
                });
                setTimeout(() => {
                    const formEl = document.querySelector('.event-form-container');
                    if (formEl) formEl.scrollIntoView({ behavior: 'smooth' });
                }, 50);
            };

            const handleCancelEdit = () => { resetForm(); };
            const handleDeleteClick = (id) => { setDeleteTargetId(id); };
            const confirmDelete = () => {
                if (deleteTargetId) {
                    setEvents(prev => prev.filter(e => e.id !== deleteTargetId));
                    if (editingId === deleteTargetId) resetForm();
                    setDeleteTargetId(null);
                }
            };

            const handleTimeConfirm = (timeStr) => {
                if (timePickerTarget === 'start') setNewEvent(prev => ({ ...prev, startTime: timeStr }));
                else if (timePickerTarget === 'end') setNewEvent(prev => ({ ...prev, endTime: timeStr }));
                setTimePickerTarget(null);
            };

            const getTargetNames = (targetIds) => {
                if (!Array.isArray(targetIds) || targetIds.length === 0) return '선택안됨';

                // [수정 3] 선택된 인원수가 재직자 수와 같으면 '전직원'으로 표시
                if (targetIds.length === activeUsers.length) return '전직원';

                const names = targetIds.map(id => users.find(user => user.id === id)?.name).filter(n => n);
                if (names.length > 3) return `${names.slice(0, 3).join(', ')} 외 ${names.length - 3}명`;
                return names.join(', ');
            };

            return (
                <div className="space-y-6 relative mb-20">
                    {/* [수정 1] 상단 헤더: 모바일(세로) / PC(가로) 분리 */}
                    <div className="flex flex-col md:flex-row justify-between items-center gap-3 md:gap-0">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2 self-start md:self-center">
                            <Megaphone /> <span className="whitespace-nowrap">행사 일정 관리</span>
                        </h2>

                        {/* 연도 이동 버튼: 모바일에서는 꽉 차게 */}
                        <div className="flex items-center justify-between md:justify-center gap-4 bg-white dark:bg-gray-800 p-2 rounded shadow border dark:border-gray-700 w-full md:w-auto">
                            <button onClick={() => setYear(year - 1)} className="p-2 hover:bg-gray-100 rounded dark:hover:bg-gray-700"><ChevronDown className="rotate-90" /></button>
                            <span className="text-xl font-bold flex-1 text-center md:flex-none md:w-20">{year}년</span>
                            <button onClick={() => setYear(year + 1)} className="p-2 hover:bg-gray-100 rounded dark:hover:bg-gray-700"><ChevronDown className="-rotate-90" /></button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-1 event-form-container">
                            <div className={`bg-white p-6 rounded-lg shadow border dark:bg-gray-800 dark:border-gray-700 sticky top-4 transition-colors ${editingId ? 'border-l-4 border-l-orange-500' : ''}`}>
                                <h3 className="font-bold mb-4 text-lg border-b pb-2 flex items-center gap-2">
                                    <PenTool size={16} /> {editingId ? '행사 정보 수정' : '새 행사 등록'}
                                </h3>
                                <form onSubmit={handleSave} className="space-y-3">
                                    <div>
                                        <label className="block text-xs font-bold mb-1 text-gray-500">행사명 (필수)</label>
                                        <input type="text" value={newEvent.title} onChange={e => setNewEvent({ ...newEvent, title: e.target.value })} className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" required placeholder="예: 시무식" autoComplete="off" />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-bold mb-1 text-gray-500">시작일 (필수)</label>
                                            <input
                                                type="date"
                                                value={newEvent.startDate}
                                                onChange={e => {
                                                    const newStartDate = e.target.value;
                                                    const newEndDate = newStartDate > newEvent.endDate ? newStartDate : newEvent.endDate;
                                                    setNewEvent({ ...newEvent, startDate: newStartDate, endDate: newEndDate });
                                                }}
                                                className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold mb-1 text-gray-500">종료일 (필수)</label>
                                            <input
                                                type="date"
                                                value={newEvent.endDate}
                                                onChange={e => setNewEvent({ ...newEvent, endDate: e.target.value })}
                                                className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-bold mb-1 text-gray-500">시작 시간</label>
                                            <button type="button" onClick={() => setTimePickerTarget('start')} className="w-full border p-2 rounded text-left flex justify-between items-center hover:bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:hover:bg-gray-600 transition-colors">
                                                <span className={newEvent.startTime ? "font-bold" : "text-gray-400"}>{newEvent.startTime || '선택'}</span>
                                                <Clock size={14} className="text-gray-400" />
                                            </button>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold mb-1 text-gray-500">종료 시간</label>
                                            <button type="button" onClick={() => setTimePickerTarget('end')} className="w-full border p-2 rounded text-left flex justify-between items-center hover:bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:hover:bg-gray-600 transition-colors">
                                                <span className={newEvent.endTime ? "font-bold" : "text-gray-400"}>{newEvent.endTime || '선택'}</span>
                                                <Clock size={14} className="text-gray-400" />
                                            </button>
                                        </div>
                                    </div>

                                    <div><label className="block text-xs font-bold mb-1 text-gray-500">장소</label><input type="text" value={newEvent.location} onChange={e => setNewEvent({ ...newEvent, location: e.target.value })} className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="예: 대회의실" autoComplete="off" /></div>

                                    <div className="border p-2 rounded bg-gray-50 dark:bg-gray-700/50 dark:border-gray-600">
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-xs font-bold text-gray-500">참여 대상</label>
                                            <div className="flex gap-1">
                                                <button type="button" onClick={handleSelectAll} className="text-[10px] bg-gray-200 px-2 py-0.5 rounded hover:bg-gray-300 dark:bg-gray-600 dark:text-white">전체선택</button>
                                                <button type="button" onClick={handleDeselectAll} className="text-[10px] bg-gray-200 px-2 py-0.5 rounded hover:bg-gray-300 dark:bg-gray-600 dark:text-white">해제</button>
                                            </div>
                                        </div>
                                        <div className="h-24 overflow-y-auto grid grid-cols-2 gap-1 custom-scrollbar">
                                            {/* [수정 4] 재직자 목록(activeUsers)만 반복해서 보여줌 */}
                                            {activeUsers.map(u => (
                                                <label key={u.id} className="flex items-center gap-1.5 text-xs cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 p-1 rounded">
                                                    <input type="checkbox" checked={Array.isArray(newEvent.target) && newEvent.target.includes(u.id)} onChange={() => toggleUser(u.id)} className="w-3.5 h-3.5 rounded border-gray-300 text-purple-600 focus:ring-purple-500" />
                                                    <span className="truncate dark:text-gray-200">{u.name} <span className="opacity-70 text-[10px]">({u.rank})</span></span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <div><label className="block text-xs font-bold mb-1 text-gray-500">비고 (메모)</label><textarea value={newEvent.note} onChange={e => setNewEvent({ ...newEvent, note: e.target.value })} className="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white h-16" placeholder="상세 내용" autoComplete="off"></textarea></div>

                                    <div className="flex gap-2 pt-2">
                                        {editingId && (
                                            <button type="button" onClick={handleCancelEdit} className="flex-1 bg-gray-400 text-white py-3 rounded font-bold hover:bg-gray-500 shadow transition-colors">취소</button>
                                        )}
                                        <button type="submit" className={`flex-1 text-white py-3 rounded font-bold shadow transition-colors ${editingId ? 'bg-orange-500 hover:bg-orange-600' : 'bg-purple-600 hover:bg-purple-700'}`}>
                                            {editingId ? '수정 완료' : '행사 등록'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-2 bg-white rounded-lg shadow border overflow-hidden dark:bg-gray-800 dark:border-gray-700 flex flex-col h-[650px]">
                            <div className="p-4 border-b bg-gray-50 dark:bg-gray-700 space-y-3">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-bold text-lg">{year}년 등록된 행사 ({filteredEvents.length}건)</h3>
                                </div>

                                {/* 검색 필터 */}
                                <div className="flex flex-col md:flex-row gap-2">
                                    <select
                                        className="border p-2 rounded dark:bg-gray-600 dark:border-gray-500 dark:text-white text-sm font-bold md:w-32"
                                        value={filterMonth}
                                        onChange={(e) => setFilterMonth(e.target.value)}
                                    >
                                        <option value="all">전체 월</option>
                                        {Array.from({ length: 12 }, (_, i) => i + 1).map(m => (
                                            <option key={m} value={m}>{m}월</option>
                                        ))}
                                    </select>

                                    <div className="flex-1 relative">
                                        <input
                                            type="text"
                                            placeholder="행사명, 참여자, 장소 검색..."
                                            className="w-full border p-2 pl-8 rounded dark:bg-gray-600 dark:border-gray-500 dark:text-white text-sm"
                                            value={searchKeyword}
                                            onChange={(e) => setSearchKeyword(e.target.value)}
                                        />
                                        <Search size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" />
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {filteredEvents.length === 0 ? (
                                    <div className="text-center text-gray-400 py-20">검색된 행사가 없습니다.</div>
                                ) : (
                                    filteredEvents.map((evt) => (
                                        <div key={evt.id} className="bg-white border border-l-4 border-l-purple-500 rounded p-4 shadow-sm hover:shadow-md transition-shadow dark:bg-gray-700 dark:border-gray-600 dark:border-l-purple-500">

                                            {/* [수정 2] 모바일에서는 세로, PC는 가로 배치 */}
                                            <div className="flex flex-col md:flex-row md:justify-between md:items-start gap-4 md:gap-0">

                                                {/* 내용 영역 */}
                                                <div className="flex-1 w-full">
                                                    <h4 className="font-bold text-lg text-gray-800 dark:text-white flex items-center gap-2 flex-wrap">
                                                        {evt.title}
                                                        <span className="text-xs font-normal text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-600 px-2 py-0.5 rounded-full">
                                                            참여: {getTargetNames(evt.target)}
                                                        </span>
                                                    </h4>
                                                    <div className="text-sm text-purple-700 dark:text-purple-300 font-bold mt-1 flex items-center gap-2 flex-wrap">
                                                        <Calendar size={14} />
                                                        {evt.startDate} {evt.startDate !== evt.endDate && ` ~ ${evt.endDate}`}
                                                        {(evt.startTime || evt.endTime) && (
                                                            <span className="text-gray-600 dark:text-gray-400 font-normal border-l pl-2 ml-1">
                                                                🕒 {evt.startTime || ''} ~ {evt.endTime || ''}
                                                            </span>
                                                        )}
                                                    </div>
                                                    {(evt.location || evt.note) && (
                                                        <div className="mt-2 text-sm text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-800/50 p-2 rounded">
                                                            {evt.location && <div className="flex items-center gap-1 font-bold">📍 {evt.location}</div>}
                                                            {evt.note && <div className="whitespace-pre-wrap mt-1 text-xs opacity-90">{evt.note}</div>}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* [수정 2] 버튼 영역: 모바일에서는 하단에 꽉 차게, PC는 우측에 */}
                                                <div className="flex gap-2 w-full md:w-auto md:ml-4 border-t md:border-t-0 pt-3 md:pt-0 border-gray-100 dark:border-gray-700">
                                                    <button onClick={() => handleEditClick(evt)} className="flex-1 md:flex-none bg-gray-100 text-gray-600 py-2 md:py-1 px-3 rounded hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-200 text-sm font-bold flex justify-center items-center gap-1">
                                                        <PenTool size={14} /> <span className="md:hidden">수정</span>

                                                    <button onClick={() => handleDeleteClick(evt.id)} className="flex-1 md:flex-none bg-red-50 text-red-500 py-2 md:py-1 px-3 rounded hover:bg-red-100 dark:bg-red-900/30 dark:text-red-300 text-sm font-bold flex justify-center items-center gap-1">
                                                        <Trash2 size={14} /> <span className="md:hidden">삭제</span>
                                                    </button>
                                                </div>
                                            </div>

                            </div>

                    {timePickerTarget && (
                        <TimePickerModal
                            target={timePickerTarget}
                            initialValue={timePickerTarget === 'start' ? newEvent.startTime : newEvent.endTime}
                            onClose={() => setTimePickerTarget(null)}
                            onConfirm={handleTimeConfirm}
