            const handleStepApprove = (docId, approveType = 'normal') => {
                const targetDoc = docs.find(d => d.id === docId);
                if (!targetDoc) return;
                const totalSteps = (targetDoc.approvalLineSnapshot ? targetDoc.approvalLineSnapshot.length : 0) + 1;
                const nextStep = (targetDoc.approvalStep || 0) + 1;

                // 최종 승인 단계라면
                if (nextStep >= totalSteps) {
                    const newStatus = 'approved';
                    const user = users.find(u => u.id === targetDoc.authorId);

                    // 계약직 근태 자동 차감 로직 (기존 유지)
                    if (user && user.isContract && targetDoc.type === 'vacation') {
                        const daysRequired = parseFloat(targetDoc.vacationDays) || 0;
                        if (user.contractLogs) {
                            const today = new Date(); today.setHours(0, 0, 0, 0);
                            const sortedKeys = Object.keys(user.contractLogs).sort();
                            let daysFound = 0; const newLogs = { ...user.contractLogs };
                            for (const key of sortedKeys) {
                                const log = newLogs[key];
                                const isValidDate = log.validUntil && log.validUntil !== '-' ? new Date(log.validUntil) >= today : false;
                                if (log.isFullAttendance && !log.isUsed && isValidDate) {
                                    if (daysFound < daysRequired) { newLogs[key] = { ...log, isUsed: true, usedDocId: docId }; daysFound += (log.granted || 0); }
                                }
                            }
                            setUsers(users.map(u => u.id === user.id ? { ...u, contractLogs: newLogs } : u));
                        }
                    }
                    // [수정] finalApproveType을 무조건 'normal'로 고정 (전결 없음)
                    const updatedDocs = docs.map(d => d.id === docId ? { ...d, status: newStatus, approvedAt: getToday(), approvalStep: totalSteps, finalApproveType: 'normal' } : d);
                    setDocs(updatedDocs);
                } else {
                    // 중간 단계 승인
                    const updatedDocs = docs.map(d => d.id === docId ? { ...d, approvalStep: nextStep } : d);
                    setDocs(updatedDocs);
                }
            };

            // 2. handleRevertStep 함수 수정 (confirm 제거 - DocViewer에서 이미 확인했음)
            const handleRevertStep = (docId) => {


                const targetDoc = docs.find(d => d.id === docId);
                const wasApproved = targetDoc.status === 'approved';
                const updatedDocs = docs.map(d => { if (d.id === docId) { const prevStep = Math.max(0, (d.approvalStep || 0) - 1); return { ...d, status: 'pending', approvalStep: prevStep, approvedAt: null }; } return d; });
                setDocs(updatedDocs);
                if (wasApproved) {
                    const user = users.find(u => u.id === targetDoc.authorId);
                    if (user && user.isContract && user.contractLogs) {
                        const newLogs = { ...user.contractLogs }; let modified = false;
                        Object.keys(newLogs).forEach(key => { if (newLogs[key].usedDocId === docId) { newLogs[key] = { ...newLogs[key], isUsed: false, usedDocId: null }; modified = true; } });
                        if (modified) setUsers(users.map(u => u.id === user.id ? { ...u, contractLogs: newLogs } : u));
                    }
                }
            };


            const handleDeleteDoc = (docId) => {
                // 여기서는 안전하게 confirm을 남겨도 되지만(DocViewer에서 호출), 통일성을 위해 제거 추천
                // 만약 DocViewer에서도 모달을 쓴다면 제거해야 함. 현재는 놔둬도 무방하나 제거 권장.
                // 여기서는 간단히 바로 삭제되게 처리 (DocViewer에서 호출시 바로 휴지통행)
                setDocs(docs.map(d => d.id === docId ? { ...d, isDeleted: true, deletedAt: new Date().toISOString() } : d));
                setSelectedDocId(null);
                setView('dashboard');
            };

            // [수정] 문서 복구 (confirm 제거 -> TrashView에서 모달로 확인 후 호출됨)
            const handleRestoreDoc = (docId) => {
                setDocs(docs.map(d => d.id === docId ? { ...d, isDeleted: false } : d));
            };

            // [수정] 영구 삭제 (최신 상태 참조 보장)
            const handlePermDeleteDoc = (docId) => {
                // docs가 아닌 prevDocs를 사용하여 동시성 문제 방지
                setDocs(prevDocs => prevDocs.filter(d => d.id !== docId));
            };

            // [수정] 휴지통 비우기
            const handleEmptyTrash = () => {
                // 마찬가지로 함수형 업데이트 사용
                setDocs(prevDocs => prevDocs.filter(d => !d.isDeleted));

                // 💡 팁: 전체 비우기 후에는 사용자가 바로 창을 닫을 수 있으므로
                // 여기서 즉시 저장을 유도하거나(구조상 어렵다면)
                // 최소한 2초간 기다려달라는 메시지를 띄우는 게 안전할 수 있습니다.
                // console.log('휴지통 비움: 2초 후 DB에 반영됩니다.');
            };




            const renderContent = () => {
                const selectedDoc = docs.find(d => d.id === selectedDocId);
                if (selectedDoc) return <DocViewer doc={selectedDoc} users={users} settings={settings} onStatusChange={updateDocStatus} onDelete={handleDeleteDoc} onBack={() => setSelectedDocId(null)} holidays={mergedHolidays} fetchHolidays={fetchHolidays} onStepApprove={handleStepApprove} onRevertStep={handleRevertStep} getLeaveStats={getLeaveStats} onEdit={handleEditRequest} />;

                switch (view) {


                    case 'dashboard':
                        return <Dashboard
                            docs={docs}
                            users={users}
                            setView={setView}
                            onSelectDoc={handleReadAndSelectDoc}
                            getLeaveStats={getLeaveStats}
                            holidays={mergedHolidays}
                            fetchHolidays={fetchHolidays}
                            settings={settings}
                        />;
                    case 'write':
                        return (
                            <DocWriter
                                users={users}
                                settings={settings}
                                onSubmit={handleSaveDoc}
                                onCancel={() => { setEditingDoc(null); setView('dashboard'); }}
                                getLeaveStats={getLeaveStats}
                                editTarget={editingDoc}

                                // [핵심] 이미 합쳐진(merged) 휴일 데이터를 'holidays'라는 이름으로 전달
                                holidays={mergedHolidays}
                            />
                        );
                    case 'calendar':
                        return (
                            <TeamCalendar
                                docs={docs}
                                users={users}
                                holidays={mergedHolidays}
                                fetchHolidays={fetchHolidays}
                                onOpenDoc={handleReadAndSelectDoc}
                                events={events}
                                setEvents={setEvents} /* setEvents 추가 */
                            />
                        );
                    case 'users': return <UserManager
                        users={users}
                        docs={docs}
                        onAdd={addUser}
                        onUpdate={updateUser}
                        onRemove={removeUser}
                        /* [핵심 수정] 기존에는 onReorder={setUsers} 라고만 되어 있어 저장이 안 되었습니다. */
                        onReorder={(reorderedUsers) => {
                            // 1. 순서 번호(sortOrder) 재부여 (안전장치)
                            // 드래그나 화살표 이동 후, 확실하게 1번부터 번호를 다시 매겨줍니다.
                            const updatedUsers = reorderedUsers.map((u, index) => ({
                                ...u,
                                sortOrder: index + 1
                            }));

                            // 2. 화면 즉시 갱신
                            setUsers(updatedUsers);

                            // 3. 서버에 저장 요청 (이 부분이 빠져 있었습니다!)
                            fetch('api.php', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ users: updatedUsers })
                            })
                                .then(res => res.json())
                                .then(data => {
                                    if (!data.success) {
                                        window.customAlert("순서 저장 실패: " + (data.message || "오류가 발생했습니다."));
                                    } else {
                                        // (선택사항) 저장 성공 시 콘솔 로그
                                        console.log("순서 저장 완료");
                                    }
                                })
                                .catch(err => {
                                    console.error("Network Error:", err);
                                    window.customAlert("서버 통신 오류로 순서가 저장되지 않았습니다.");
                                });
                        }}
                        settings={settings}
                        onViewDoc={(id) => { handleReadAndSelectDoc(id); }}
                        holidays={mergedHolidays}
                        fetchHolidays={fetchHolidays}
                        getLeaveStats={getLeaveStats}
                        certificates={certificates}
                        onAddCertLog={addCertificateLog}
                        onDeleteCertLog={handleDeleteCertLog}
                    />;
                    case 'meeting_minutes': // [추가] 회의록 뷰
                        return <MeetingMinutes
                            users={users}
                            meetingMinutes={meetingMinutes}
                            setMeetingMinutes={saveMeetingMinutes}
                            settings={settings}
                            setSettings={setSettings}
                        />;
                    case 'events': return <EventManager events={events} setEvents={setEvents} users={users} />;
                    case 'attendance': return (
                        <AttendanceManager
                            users={users}
                            attendanceLogs={attendanceLogs}
                            setAttendanceLogs={saveAttendanceLogs}

                            // 이 부분들이 위 1번에서 추가한 매개변수 이름과 똑같아야 합니다.
                            dailyLogs={dailyLogs}
                            setDailyLogs={saveDailyLogs}

                            dailyWorkerNames={dailyWorkerNames}
                            setDailyWorkerNames={saveDailyWorkerNames}

                            attendanceNotes={attendanceNotes}
                            setAttendanceNotes={saveAttendanceNotes}

                            holidays={mergedHolidays}
                            customHolidays={customHolidays}
                            docs={docs}
                            settings={settings}
                            getLeaveStats={getLeaveStats}

                            /* ▼▼▼ [수정] 식대 관련 데이터 전달 (Map 전달) ▼▼▼ */
                            mealConfigMap={mealConfigMap}
                            mealData={mealData}
                            onUpdateSettings={saveMealSettings}
                            onUpdateMeal={saveMealCount}
                        />
                    );

                    // setUsers 함수를 onUpdateUsers라는 이름으로 전달합니다.
                    case 'report': return <MonthlyReport docs={docs} users={users} onUpdateUsers={setUsers} reportFilter={reportFilter} onUpdateReportFilter={setReportFilter} />;
                    case 'holidays': return <HolidayManager publicHolidays={publicHolidays} customHolidays={customHolidays} setCustomHolidays={setCustomHolidays} fetchHolidays={fetchHolidays} />;
                    case 'settings': return <SettingsPage settings={settings} setSettings={setSettings} users={users} setUsers={setUsers} onChangePassword={() => setShowPwModal(true)} />;
                    case 'trash': return <TrashView docs={docs} onRestore={handleRestoreDoc} onPermDelete={handlePermDeleteDoc} onEmptyTrash={handleEmptyTrash} onBack={() => setView('dashboard')} />;
                    default: return <Dashboard docs={docs} />;
                }
            };



            // [모바일 메뉴 닫기 헬퍼]
            const handleMobileNavClick = (viewName) => {
                setView(viewName);
                setSelectedDocId(null);
                setEditingDoc(null);
                if (window.innerWidth < 768) setIsSidebarOpen(false);
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden dark:bg-gray-900 dark:text-gray-100">
                    <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => { }} />

                    <CustomTitleBar
                        isSidebarOpen={isSidebarOpen}
                        setIsSidebarOpen={setIsSidebarOpen}
                        darkMode={darkMode}
                        toggleDarkMode={toggleDarkMode}
                        isLoggedIn={isLoggedIn}
                    />

                    {/* ▼▼▼ [핵심 수정] 여기에 pt-[50px] md:pt-[40px] 추가 ▼▼▼ */}
                    <div className="flex flex-1 overflow-hidden relative pt-[50px] md:pt-[40px]">

                        {!isLoggedIn ? (
                            <div className="w-full h-full flex items-center justify-center bg-slate-900 px-4">
                                <LoginView onLogin={() => setIsLoggedIn(true)} savedPassword={adminPassword} />
                            </div>
                        ) : (
                            <>
                                {/* [모바일 전용] 뒷배경 (Backdrop) */}
                                <div
                                    className={`fixed inset-0 bg-black/50 z-40 transition-opacity duration-300 md:hidden ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
                                    onClick={() => setIsSidebarOpen(false)}
                                ></div>

                                {/* [반응형 사이드바] */}
                                <div
                                    className={`
                                        bg-slate-800 text-white flex flex-col shadow-2xl dark:bg-slate-900 no-print
                                        transition-all duration-300 ease-in-out

                                        /* 모바일: 화면 전체 덮기 (Top 0부터 시작) */
                                        fixed inset-y-0 left-0 z-50 h-full w-64
                                        ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}

                                        /* PC: 흐름에 맞게 배치 (상단 여백 적용됨) */
                                        md:relative md:translate-x-0
                                        ${isSidebarOpen ? 'md:w-64 md:opacity-100' : 'md:w-0 md:opacity-0 md:overflow-hidden'}
                                    `}
                                    style={{ top: '0' }}
                                >
                                    {/* 모바일일 때만 내부 패딩으로 로고 영역 확보 */}
                                    <div className="flex flex-col h-full pt-[50px] md:pt-0">

                                        <div className="p-6 border-b border-slate-700 flex flex-col items-center justify-center h-32 shrink-0">
                                            <h1 className="text-xl font-bold text-center tracking-wider">근태 관리 시스템</h1>
                                            <p className="text-xs text-center text-slate-400 mt-1">한국맥꾸룸</p>
                                        </div>

                                        <nav className="flex-1 px-2 space-y-1 mt-4 overflow-y-auto custom-scrollbar">
                                            <div className="relative">
                                                <NavButton icon={FileText} label="문서함" active={view === 'dashboard'} onClick={() => handleMobileNavClick('dashboard')} />
                                                {unreadCount > 0 && <span className="absolute top-3 right-4 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full animate-bounce shadow-sm">{unreadCount}</span>}
                                            </div>
                                            <NavButton icon={Layout} label="통합 캘린더" active={view === 'calendar'} onClick={() => handleMobileNavClick('calendar')} />
                                            <NavButton icon={Printer} label="리포트" active={view === 'report'} onClick={() => handleMobileNavClick('report')} />
                                            <NavButton icon={PenTool} label="기안 작성" active={view === 'write'} onClick={() => handleMobileNavClick('write')} />
                                            <NavButton icon={Users} label="사원 관리" active={view === 'users'} onClick={() => handleMobileNavClick('users')} />
                                            <NavButton icon={ClipboardList} label="회의록" active={view === 'meeting_minutes'} onClick={() => handleMobileNavClick('meeting_minutes')} />
                                            <NavButton icon={Megaphone} label="행사 관리" active={view === 'events'} onClick={() => handleMobileNavClick('events')} />
                                            <NavButton icon={Clipboard} label="출근부" active={view === 'attendance'} onClick={() => handleMobileNavClick('attendance')} />
                                            <NavButton icon={Calendar} label="휴일 관리" active={view === 'holidays'} onClick={() => handleMobileNavClick('holidays')} />
                                            <NavButton icon={Settings} label="설정" active={view === 'settings'} onClick={() => handleMobileNavClick('settings')} />




                                        </nav>
                                    </div>
                                </div>

                                {/* 메인 컨텐츠 */}
                                <main className="flex-1 overflow-y-auto bg-gray-50 p-4 md:p-8 dark:bg-gray-900 w-full relative">
                                    {renderContent()}
                                </main>
                            </>
                        )}
                    </div>

                    {showPwModal && <ChangePasswordModal onClose={() => setShowPwModal(false)} onSave={(hash) => setAdminPassword(hash)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <React.Fragment>
                <CustomDialog />
                <App />
            </React.Fragment>
        );
    </script>

    <script>
        (function () {
            const A4_HEIGHT_PX = 1123; // A4 세로 높이 (약 297mm의 픽셀값 @ 96dpi)

            window.addEventListener('beforeprint', () => {
                const papers = document.querySelectorAll('.paper');
                if (!papers || papers.length === 0) return;

                papers.forEach(paper => {
                    // 1. 인쇄 전 줌(Zoom) 초기화
                    paper.style.zoom = 1;

                    // 2. 현재 문서의 높이 측정
                    const contentHeight = paper.scrollHeight;

                    // 3. 내용이 A4 높이보다 크면, 비율을 계산해서 강제로 축소 (큰글씨 모드 포함 모든 경우 적용)
                    if (contentHeight > A4_HEIGHT_PX) {
                        const scale = (A4_HEIGHT_PX / contentHeight) * 0.98; // 0.98은 여백 확보용 안전 계수
                        paper.style.zoom = scale;
                    }
                });
            });

            // 4. 인쇄 후(또는 취소 후) 웹 화면은 원래대로 복구
            window.addEventListener('afterprint', () => {
                const papers = document.querySelectorAll('.paper');
                papers.forEach(paper => {
                    paper.style.zoom = 1;
                });
            });
        })();
    </script>

</body>

</html>
